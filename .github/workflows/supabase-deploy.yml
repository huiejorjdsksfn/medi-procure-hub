# ═══════════════════════════════════════════════════════════════════════
# ProcurBosse — Supabase DB Migration Auto-Deploy
# Runs migrations on every push to main
# ═══════════════════════════════════════════════════════════════════════
name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref yvjfehnzbzjliizjvuhq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations to production
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify success
        run: echo "✅ Migrations deployed to yvjfehnzbzjliizjvuhq"
