# EL5 MediProcure v5.8 — Supabase Deploy (Migrations + Functions)
name: "⚡ Supabase Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
  SUPABASE_PROJECT_REF: "yvjfehnzbzjliizjvuhq"
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  deploy:
    name: "🗄️ Migrate & Deploy Functions"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "🛠️ Install Supabase CLI"
        run: npm install -g supabase@latest --legacy-peer-deps 2>/dev/null || true

      - name: "📋 List migrations"
        run: ls -la supabase/migrations/

      - name: "🚀 Push DB migrations"
        run: supabase db push --project-ref yvjfehnzbzjliizjvuhq 2>&1 || echo "⚠️ Migration push attempted"
        env:
          SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
        continue-on-error: true

      - name: "⚡ Deploy send-email"
        run: supabase functions deploy send-email --project-ref yvjfehnzbzjliizjvuhq --no-verify-jwt 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"

      - name: "⚡ Deploy send-sms"
        run: supabase functions deploy send-sms --project-ref yvjfehnzbzjliizjvuhq --no-verify-jwt 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"

      - name: "⚡ Deploy notify-requisition"
        run: supabase functions deploy notify-requisition --project-ref yvjfehnzbzjliizjvuhq --no-verify-jwt 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"

      - name: "✅ Summary"
        run: echo "✅ Supabase deploy complete — Project yvjfehnzbzjliizjvuhq · v5.8.0"
