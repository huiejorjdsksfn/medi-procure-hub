name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v1.0.1). Leave blank to skip creating a GitHub Release.'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android-release.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode release keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/procurbosse-release.keystore

      - name: Write keystore.properties
        run: |
          cat > android/app/keystore.properties << EOF
          storeFile=procurbosse-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK (direct install) and AAB (Play Store, optional)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Publish GitHub Release with APK
        if: ${{ github.event.inputs.version_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ProcurBosse ${{ github.event.inputs.version_tag }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
          body: |
            Android release build of ProcurBosse (EL5 MediProcure).

            Install: download `app-release.apk` below, open it on your
            Android device, and allow "install from unknown sources"
            when prompted (only needs to be enabled once).

      - name: Clean up signing material
        if: always()
        run: |
          rm -f android/app/procurbosse-release.keystore
          rm -f android/app/keystore.properties
