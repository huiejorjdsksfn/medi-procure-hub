name: ProcurBosse v6 EXE
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 6.0.0)"
        required: false
        default: "6.0.0"
permissions:
  contents: write
env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
jobs:

  web:
    name: "Build Web — Vite"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --legacy-peer-deps
      - name: Write .env
        run: |
          cat > .env << ENVEOF
          VITE_SUPABASE_URL=https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc
          VITE_SUPABASE_PROJECT_ID=yvjfehnzbzjliizjvuhq
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_APP_VERSION=6.0.0
          ENVEOF
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPA_KEY }}
          VITE_SUPABASE_PROJECT_ID: yvjfehnzbzjliizjvuhq
          VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
          VITE_SYSTEM_NAME: "EL5 MediProcure"
      - name: Verify build output
        run: |
          ls -lh dist/
          [ -f dist/index.html ] || (echo "ERROR: dist/index.html missing!" && exit 1)
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-v6
          path: dist/
          retention-days: 1
          if-no-files-found: error

  build:
    name: "v6 Win6 EXE (20)"
    runs-on: windows-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist-v6
          path: dist/
      - name: Verify dist downloaded
        shell: bash
        run: |
          ls -lh dist/ || (echo "dist/ missing!" && exit 1)
          [ -f dist/index.html ] || (echo "index.html missing!" && exit 1)
      - name: Install dependencies
        shell: bash
        run: npm ci --no-audit --legacy-peer-deps
      - name: Set version
        id: ver
        shell: bash
        run: |
          INP="${{ github.event.inputs.version }}"
          VER="${{INP:-6.0.${{ github.run_number }}}}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VER';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Build version: $VER"
      - name: Build v6 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
      - name: Rename EXE artifact
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd dist-electron
          EXE=$(ls *.exe 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then echo "No EXE produced!" && ls -la && exit 1; fi
          mv "$EXE" "ProcurBosse-v6.${VER}-Win-x64-Setup.exe"
          echo "Renamed to: $(ls *.exe)"
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v6-exe
          path: dist-electron/ProcurBosse-v6*.exe
          retention-days: 60
          if-no-files-found: error
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v6-build-${{ github.run_number }}"
          name: "ProcurBosse v6 — Build #${{ github.run_number }}"
          body: |
            ## ProcurBosse v6 — EL5 MediProcure

            Accountant Workspace · ERP Sync · GL Journal · Payment Proposals

            **Installation:** Right-click .exe → Run as Administrator

            **Build:** `${{ github.sha }}` | Run #${{ github.run_number }}
          files: dist-electron/ProcurBosse-v6*.exe
          draft: false
          prerelease: false
