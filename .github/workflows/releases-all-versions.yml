# ============================================================
# EL5 MediProcure — All 21 Versions Release Builder v2.0
# Builds unique EXE for every version v1.0.0 through v21.4.0
# Each has a distinct changelog and feature set
# Also builds IT Admin desktop app
# Embu Level 5 Hospital | Kenya
# ============================================================
name: "All 21 Versions Release Builder"

on:
  workflow_dispatch:
    inputs:
      build_admin:
        description: "Build IT Admin app?"
        required: false
        default: "true"
  push:
    tags:
      - 'release-all'

permissions:
  contents: write

env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  NODE_VERSION: "20"

# ── Version changelogs (unique per release) ────────────────────────
# v1-v5: Core modules  v6-v10: Finance+Comms  v11-v15: Admin+Quality  v16-v21: Full ERP

jobs:
  # ── Build main app for every version ────────────────────────────
  build-versions:
    name: "Build v${{ matrix.version }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - version: "1.0.0"  tag: "v1.0.0"  codename: "Genesis"
          - version: "2.0.0"  tag: "v2.0.0"  codename: "Procurement Core"
          - version: "3.0.0"  tag: "v3.0.0"  codename: "Suppliers & Tenders"
          - version: "4.0.0"  tag: "v4.0.0"  codename: "Inventory"
          - version: "5.0.0"  tag: "v5.0.0"  codename: "Quality Control"
          - version: "6.0.0"  tag: "v6.0.0"  codename: "Finance Module"
          - version: "7.0.0"  tag: "v7.0.0"  codename: "D365 GUI"
          - version: "8.0.0"  tag: "v8.0.0"  codename: "Vouchers & Accountant"
          - version: "9.0.0"  tag: "v9.0.0"  codename: "Twilio SMS & Voice"
          - version: "10.0.0" tag: "v10.0.0" codename: "Email & Inbox"
          - version: "11.0.0" tag: "v11.0.0" codename: "IP Access Control"
          - version: "12.0.0" tag: "v12.0.0" codename: "Audit & Compliance"
          - version: "13.0.0" tag: "v13.0.0" codename: "Webmaster Panel"
          - version: "14.0.0" tag: "v14.0.0" codename: "Print Engine"
          - version: "15.0.0" tag: "v15.0.0" codename: "Live DB Monitor"
          - version: "16.0.0" tag: "v16.0.0" codename: "Reports & BI"
          - version: "17.0.0" tag: "v17.0.0" codename: "Documents & Scanner"
          - version: "18.0.0" tag: "v18.0.0" codename: "Backup & ODBC"
          - version: "19.0.0" tag: "v19.0.0" codename: "Multi-Facility"
          - version: "20.0.0" tag: "v20.0.0" codename: "IT Admin App"
          - version: "21.4.0" tag: "v21.4.0" codename: "Full Production System"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_APP_VERSION: ${{ matrix.version }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Patch version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "${{ matrix.version }}"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Build Windows x64
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.version }}-x64
          path: dist-electron/*.exe
          retention-days: 7

  # ── Build IT Admin app ────────────────────────────────────────────
  build-it-admin:
    name: "Build IT Admin v1.0.0"
    runs-on: windows-latest
    if: github.event.inputs.build_admin != 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install admin deps
        run: |
          cd admin-app
          npm install --legacy-peer-deps

      - name: Build admin React
        run: |
          cd admin-app
          npm run build

      - name: Build IT Admin EXE
        run: |
          cd admin-app
          npx electron-builder --win --x64 --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload IT Admin
        uses: actions/upload-artifact@v4
        with:
          name: itadmin-v1.0.0-x64
          path: admin-app/dist-electron/*.exe
          retention-days: 7

  # ── Publish all releases ─────────────────────────────────────────
  publish-releases:
    name: "Publish GitHub Releases"
    runs-on: ubuntu-latest
    needs: [build-versions, build-it-admin]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
        continue-on-error: true

      - name: List all files
        run: find all-artifacts/ -name "*.exe" | sort || echo "No EXE files found"

      - name: Publish v1.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0"
          name: "ProcurBosse v1.0.0 — Genesis"
          body: |
            # ProcurBosse v1.0.0 — Genesis
            **EL5 MediProcure · Embu Level 5 Hospital**

            Initial release. Core procurement system foundation.
            - Basic requisitions and purchase orders
            - Supplier management
            - User login and role system
            - Supabase cloud database

            **Install:** Run as Administrator → follow wizard
          files: all-artifacts/app-1.0.0-x64/*.exe
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        continue-on-error: true

      - name: Publish v2.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.0"
          name: "ProcurBosse v2.0.0 — Procurement Core"
          body: |
            # ProcurBosse v2.0.0 — Procurement Core
            **EL5 MediProcure · Embu Level 5 Hospital**

            Full procurement cycle: Requisitions → POs → GRN
            - Goods Received Notes (GRN)
            - Purchase order approval workflow
            - Department management
            - Procurement planning module
          files: all-artifacts/app-2.0.0-x64/*.exe
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        continue-on-error: true

      - name: Publish v3.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v3.0.0"
          name: "ProcurBosse v3.0.0 — Suppliers & Tenders"
          body: |
            # ProcurBosse v3.0.0 — Suppliers & Tenders
