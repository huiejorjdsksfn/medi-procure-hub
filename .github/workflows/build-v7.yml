name: Build ProcurBosse v7

on:
  push:
    branches: [main]
    tags:
      - 'v7.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (default 7.0.0)'
        required: false
        default: '7.0.0'

permissions:
  contents: write

env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  build-web:
    name: "Build Web App"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPA_KEY }}
      - run: ls -lh dist/ && du -sh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-v7
          path: dist/
          retention-days: 1

  build-v7-exe:
    name: "ProcurBosse v7 - Win10/11 x64"
    runs-on: windows-latest
    needs: build-web
    outputs:
      version: ${{ steps.setver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist-v7
          path: dist/
      - run: npm ci --no-audit
        shell: bash
      - name: Set version v7
        id: setver
        shell: python
        run: |
          import os, json
          inp = "${{ github.event.inputs.version }}".strip()
          run = "${{ github.run_number }}"
          ver = inp if inp and inp != "" else f"7.0.{run}"
          pkg = json.loads(open("package.json").read())
          pkg["version"] = ver
          open("package.json","w").write(json.dumps(pkg, indent=2))
          gho = os.environ.get("GITHUB_OUTPUT","")
          if gho: open(gho,"a").write(f"version={ver}\n")
          print(f"ProcurBosse v7 = {ver}")
      - name: Build v7 x64 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename to v7
        shell: python
        run: |
          import os, glob, shutil
          ver = "${{ steps.setver.outputs.version }}"
          exes = glob.glob("dist-electron/*.exe")
          if not exes: raise SystemExit("No EXE found!")
          src = max(exes, key=os.path.getmtime)
          dst = f"dist-electron/ProcurBosse-v7.{ver}-Win10-x64-Setup.exe"
          shutil.move(src, dst)
          print(f"v7 EXE: {os.path.basename(dst)} ({os.path.getsize(dst)//1024//1024}MB)")
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v7-x64
          path: dist-electron/ProcurBosse-v7.*.exe
          retention-days: 60
          if-no-files-found: error
      - name: Create Release v7
        uses: softprops/action-gh-release@v2
        with:
          tag_name: procurbosse-v7-build-${{ github.run_number }}
          name: "ProcurBosse v7 Build #${{ github.run_number }}"
          body: |
            ## ProcurBosse v7 — EL5 MediProcure

            Windows 10/11 x64 — Right-click → Run as Administrator

            **New in v7:**
            - All v6 features
            - Cross-platform (Win/Mac/Linux)
            - Kenya IFMIS integration
            - HL7/FHIR support
            - Blockchain audit trail

            Built from `${{ github.sha }}` Build #${{ github.run_number }}
          files: dist-electron/ProcurBosse-v7.*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
