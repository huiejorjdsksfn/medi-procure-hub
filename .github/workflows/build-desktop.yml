name: ProcurBosse Desktop
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
env:
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20', cache: npm}
      - run: npm ci --no-audit
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: yvjfehnzbzjliizjvuhq
          VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
          VITE_SYSTEM_NAME: "EL5 MediProcure"
          VITE_APP_VERSION: "2.0.0" 
      - uses: actions/upload-artifact@v4
        with: {name: web-desk, path: dist/, retention-days: 1}
  build:
    needs: web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20', cache: npm}
      - uses: actions/download-artifact@v4
        with: {name: web-desk, path: dist/}
      - run: npm ci --no-audit
        shell: bash
      - run: npx electron-builder --win --x64
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with: {name: desktop, path: dist-electron/*.exe, if-no-files-found: warn}
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: desk-b${{ github.run_number }}
          name: ProcurBosse Desktop Build ${{ github.run_number }}
          body: Windows 10/11 x64. Right-click → Run as Administrator. ${{ github.sha }}
          files: dist-electron/*.exe
