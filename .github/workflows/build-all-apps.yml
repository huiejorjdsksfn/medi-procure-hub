name: Build All Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build main app
        run: npx vite build --outDir web
        env:
          CI: 'false'
          VITE_SUPABASE_URL: https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build admin app
        run: npx vite build --config vite.config.admin.ts
        env:
          CI: 'false'
          VITE_SUPABASE_URL: https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build kiosk app
        run: npx vite build --config vite.config.kiosk.ts
        env:
          CI: 'false'
          VITE_SUPABASE_URL: https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Build user app
        run: npx vite build --config vite.config.user.ts
        env:
          CI: 'false'
          VITE_SUPABASE_URL: https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Assemble final web folder
        run: |
          cp -r web-admin web/admin
          cp -r web-kiosk web/kiosk
          cp -r web-user web/user
          echo "All apps assembled in web/"
          ls web/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-web-all-apps
          path: web/
          retention-days: 7
