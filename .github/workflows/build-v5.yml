name: ProcurBosse v5 EXE

on:
  push:
    branches: [main]
    tags:
      - 'v5.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (default 5.0.0)'
        default: '5.0.0'
        required: false

permissions:
  contents: write

env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPA_KEY }}
      - run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: web-v5
          path: dist/
          retention-days: 1

  build-v5:
    name: ProcurBosse v5 Win10/11 x64
    runs-on: windows-latest
    needs: build-web
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-v5
          path: dist/
      - run: npm ci --no-audit
        shell: bash
      - name: Set version
        id: ver
        shell: bash
        run: |
          INP="${{ github.event.inputs.version }}"
          if [ -n "$INP" ]; then VER="$INP"; else VER="5.0.${{ github.run_number }}"; fi
          node -e "const p=require('./package.json');p.version='$VER';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2))"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "ProcurBosse v5 = $VER"
      - name: Build v5 x64 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename EXE
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd dist-electron
          EXE=$(ls *.exe 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then echo "No EXE found!"; exit 1; fi
          mv "$EXE" "ProcurBosse-v5.${VER}-Win10-x64-Setup.exe"
          echo "OK: $(ls *.exe)"
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v5-x64
          path: dist-electron/ProcurBosse-v5.*.exe
          retention-days: 60
          if-no-files-found: error
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: procurbosse-v5-build-${{ github.run_number }}
          name: "ProcurBosse v5 Build #${{ github.run_number }}"
          body: |
            ProcurBosse v5 - EL5 MediProcure Windows x64
            New: QR codes, bulk import, offline sync, Kiswahili
            Right-click .exe -> Run as Administrator
            Commit: `${{ github.sha }}`
          files: dist-electron/ProcurBosse-v5.*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
