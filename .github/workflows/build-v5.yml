name: ProcurBosse v5 EXE
on:
  push:
    branches: [main]
    tags: ['v5.*']
  workflow_dispatch:
    inputs:
      version:
        description: Version
        default: '5.0.0'
        required: false
permissions:
  contents: write
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit
      - run: npm run build
        env:
          VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
          VITE_SUPABASE_PROJECT_ID: yvjfehnzbzjliizjvuhq
      - uses: actions/upload-artifact@v4
        with:
          name: web-v5
          path: dist/
          retention-days: 1
  build:
    needs: web
    runs-on: windows-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-v5
          path: dist/
      - run: npm ci --no-audit
        shell: bash
      - id: v
        shell: bash
        run: |
          INP="${{ github.event.inputs.version }}"
          VER="${INP:-5.0.${{ github.run_number }}}"
          node -e "const p=require('./package.json');p.version='$VER';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2))"
          echo "ver=$VER" >> $GITHUB_OUTPUT
      - name: Build v5 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - shell: bash
        run: |
          cd dist-electron
          mv "$(ls *.exe|head -1)" "ProcurBosse-v5.${{ steps.v.outputs.ver }}-Win10-x64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: v5-exe
          path: dist-electron/ProcurBosse-v5.*.exe
          if-no-files-found: error
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v5-b${{ github.run_number }}
          name: ProcurBosse v5 Build ${{ github.run_number }}
          body: |
            ProcurBosse v5 — QR codes · bulk import · offline sync · Kiswahili
            Right-click .exe → Run as Administrator
            ${{ github.sha }}
          files: dist-electron/ProcurBosse-v5.*.exe
