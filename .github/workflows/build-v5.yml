name: ProcurBosse v5 EXE
on:
  push:
    branches: [main]
    tags: ['v5.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (default 5.0.0)'
        required: false
        default: '5.0.0'
permissions:
  contents: write
env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
jobs:

  web:
    name: Build Web (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPA_KEY }}
          VITE_SUPABASE_PROJECT_ID: yvjfehnzbzjliizjvuhq
      - run: ls -lh dist/
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-v5
          path: dist/
          retention-days: 1

  build:
    name: v5 Win10/11 x64
    runs-on: windows-latest
    needs: web
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist-v5
          path: dist/
      - run: npm ci --no-audit
        shell: bash
      - name: Set version
        id: ver
        shell: bash
        run: |
          INP="${{ github.event.inputs.version }}"
          VER="${INP:-5.0.${{ github.run_number }}}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VER';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "ProcurBosse v5 = $VER"
      - name: Build v5 x64 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename to v5
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd dist-electron
          EXE=$(ls *.exe 2>/dev/null | head -1)
          [ -z "$EXE" ] && echo "No EXE!" && exit 1
          mv "$EXE" "ProcurBosse-v5.${VER}-Win10-x64-Setup.exe"
          echo "EXE: $(ls *.exe)"
      - name: Upload v5 EXE
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v5-exe
          path: dist-electron/ProcurBosse-v5.*.exe
          retention-days: 60
          if-no-files-found: error
      - name: Create GitHub Release v5
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v5-build-${{ github.run_number }}
          name: "ProcurBosse v5 Build #${{ github.run_number }}"
          body: |
            **ProcurBosse v5** — EL5 MediProcure · Embu Level 5 Hospital

            ✨ **QR codes · Bulk import · Offline sync · Kiswahili**

            Right-click .exe → Run as Administrator → Follow wizard

            Commit: `${{ github.sha }}` · Build #${{ github.run_number }}
          files: dist-electron/ProcurBosse-v5.*.exe
          draft: false
          prerelease: false
