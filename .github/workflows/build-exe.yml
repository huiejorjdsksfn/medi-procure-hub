name: Build ProcurBosse v1 and v2 EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (e.g. 2.1.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  build-web:
    name: "Build Web App"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPA_KEY }}
      - run: ls -lh dist/ && du -sh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-main
          path: dist/
          retention-days: 1

  build-v2-x64:
    name: "ProcurBosse v2 - Win10/11 x64"
    runs-on: windows-latest
    needs: build-web
    outputs:
      version: ${{ steps.setver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist-main
          path: dist/
      - run: npm ci --no-audit
        shell: bash
      - name: Set version
        id: setver
        shell: python
        run: |
          import os, json
          override = "${{ github.event.inputs.version_override }}".strip()
          run = "${{ github.run_number }}"
          ver = override if override else f"2.0.{run}"
          pkg = json.loads(open("package.json").read())
          pkg["version"] = ver
          open("package.json","w").write(json.dumps(pkg, indent=2))
          gho = os.environ.get("GITHUB_OUTPUT","")
          if gho: open(gho,"a").write(f"version={ver}\n")
          print(f"ProcurBosse v2 = {ver}")
      - name: Build x64 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename
        shell: python
        run: |
          import os, glob, shutil
          ver = "${{ steps.setver.outputs.version }}"
          exes = glob.glob("dist-electron/*.exe")
          if not exes: raise SystemExit("No EXE found!")
          src = max(exes, key=os.path.getmtime)
          dst = f"dist-electron/ProcurBosse-v{ver}-Win10-x64-Setup.exe"
          shutil.move(src, dst)
          print(f"OK {os.path.basename(dst)} ({os.path.getsize(dst)//1024//1024}MB)")
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v2-x64
          path: dist-electron/ProcurBosse-*-Win10-x64-Setup.exe
          retention-days: 30
          if-no-files-found: error

  build-v1-ia32:
    name: "ProcurBosse v1 - Win7/8 ia32"
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist-main
          path: dist/
      - name: Pin Electron 22 LTS
        shell: python
        run: |
          import json
          run = "${{ github.run_number }}"
          pkg = json.loads(open("package.json").read())
          pkg.setdefault("devDependencies",{})["electron"] = "22.3.27"
          pkg["version"] = f"1.0.{run}"
          open("package.json","w").write(json.dumps(pkg, indent=2))
      - run: npm install --no-audit --legacy-peer-deps
        shell: bash
      - name: Patch ia32 name
        shell: python
        run: |
          cfg = open("electron-builder.yml").read()
          cfg = cfg.replace('artifactName: "ProcurBosse-v${{version}}-${{arch}}-Setup.exe"','artifactName: "ProcurBosse-v${{version}}-Win7-ia32-Setup.exe"')
          open("electron-builder.yml","w").write(cfg)
      - name: Build ia32 EXE
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v1-ia32
          path: dist-electron/ProcurBosse-*Win7*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: "GitHub Release + ZIP"
    runs-on: ubuntu-latest
    needs: [build-v2-x64, build-v1-ia32]
    if: always() && needs.build-v2-x64.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-v2-x64
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-v1-ia32
          path: release/
        continue-on-error: true
      - run: ls -lh release/ || echo "No release files"
      - name: Create ZIP
        shell: python
        run: |
          import zipfile, os, glob
          from datetime import datetime
          ver = "${{ needs.build-v2-x64.outputs.version }}"
          ts = datetime.now().strftime("%Y%m%d")
          zip_name = f"ProcurBosse_v{ver}_{ts}_Windows.zip"
          readme = f"ProcurBosse v{ver} - EL5 MediProcure\nBuilt: {datetime.now().strftime('%Y-%m-%d')}\n"
          with zipfile.ZipFile(zip_name,'w',zipfile.ZIP_DEFLATED,compresslevel=9) as zf:
            zf.writestr("README.txt", readme)
            for exe in glob.glob("release/*.exe"):
              print(f"Adding {os.path.basename(exe)}")
              zf.write(exe, os.path.basename(exe))
          print(f"ZIP: {zip_name}")
          open("zip_name.txt","w").write(zip_name)
      - name: Set tag
        id: tag
        run: echo "tag=procurbosse-v${{ needs.build-v2-x64.outputs.version }}-build-${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ProcurBosse v${{ needs.build-v2-x64.outputs.version }} Build #${{ github.run_number }}"
          body: |
            ## ProcurBosse Desktop — EL5 MediProcure

            | File | Windows | Arch |
            |------|---------|------|
            | ProcurBosse-v2.x-Win10-x64 | 10/11 | x64 Recommended |
            | ProcurBosse-v1.x-Win7-ia32 | 7/8/10 | ia32 Legacy |

            Right-click .exe → Run as Administrator → Follow wizard

            Built from `${{ github.sha }}` Build #${{ github.run_number }}
          files: |
            release/*.exe
            ProcurBosse_*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
