# ─────────────────────────────────────────────────────────────────────────────
# ProcurBosse — Auto-build Windows .exe on every push to main
#
# Produces:
#   • ProcurBosse-v2.x.x-x64-Setup.exe   (Windows 10/11, 64-bit — recommended)
#   • ProcurBosse-v2.x.x-ia32-Setup.exe  (Windows 7/8/8.1, 32-bit compatible)
#
# Also builds v1 (legacy) exe on demand via workflow_dispatch
#
# Download from: GitHub → Releases → Assets
# ─────────────────────────────────────────────────────────────────────────────
name: Build ProcurBosse Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_v1:
        description: 'Also build v1 legacy EXE?'
        type: boolean
        default: false
        required: false
      version_override:
        description: 'Override version (e.g. 2.1.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  # ── STEP 1: Build React/Vite web app on Linux (fast) ───────────────────────
  build-web:
    name: "Build Web App"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app (Vite)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Show dist contents
        run: |
          echo "=== dist size ==="
          du -sh dist/
          echo "=== dist files ==="
          ls dist/assets/ | head -10

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ── STEP 2: Build Windows EXE (v2 — current) ──────────────────────────────
  build-exe-v2:
    name: "Build ProcurBosse v2 EXE (Windows)"
    runs-on: windows-latest
    needs: build-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install all dependencies (including Electron binary)
        run: npm ci
        shell: bash

      - name: Set app version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version_override }}"
          if [ -z "$VERSION" ]; then
            VERSION="2.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm version "$VERSION" --no-git-tag-version --allow-same-version 2>/dev/null || true
          echo "Building ProcurBosse version: $VERSION"

      - name: Build x64 installer (Windows 10/11)
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder

      - name: Build ia32 installer (Windows 7/8)
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List built files
        shell: bash
        run: |
          echo "=== Built installers ==="
          ls -lh dist-electron/*.exe 2>/dev/null || echo "No exe files found"
          ls -lh dist-electron/ 2>/dev/null || echo "dist-electron empty"

      - name: Upload v2 EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v2-windows
          path: |
            dist-electron/*-Setup.exe
            dist-electron/*.blockmap
          retention-days: 30
          if-no-files-found: warn

  # ── STEP 3 (optional): Build v1 legacy EXE ────────────────────────────────
  build-exe-v1:
    name: "Build ProcurBosse v1 EXE (Legacy)"
    runs-on: windows-latest
    needs: build-web
    if: ${{ github.event.inputs.build_v1 == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm ci
        shell: bash
      - name: Set v1 version
        shell: bash
        run: |
          npm version "1.0.${{ github.run_number }}" --no-git-tag-version --allow-same-version 2>/dev/null || true
          echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Build v1 x64
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v1-windows
          path: dist-electron/*-Setup.exe
          retention-days: 30

  # ── STEP 4: Create GitHub Release with download links ─────────────────────
  release:
    name: "Publish GitHub Release"
    runs-on: ubuntu-latest
    needs: build-exe-v2
    steps:
      - uses: actions/checkout@v4

      - name: Download v2 EXE
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-v2-windows
          path: release/
        continue-on-error: true

      - name: Download v1 EXE (if built)
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-v1-windows
          path: release/
        continue-on-error: true

      - name: Show release files
        run: ls -lh release/ || echo "No release files"

      - name: Determine tag
        id: tag
        run: |
          TAG="v2.0-build-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ProcurBosse ${{ steps.tag.outputs.tag }} — EL5 MediProcure"
          body: |
            ## ProcurBosse Desktop Installer

            ### ⬇️ Download

            | File | OS | Architecture | Notes |
            |------|----|------|-------|
            | `*-x64-Setup.exe` | Windows 10 / 11 | 64-bit | **Recommended** |
            | `*-ia32-Setup.exe` | Windows 7 / 8 / 8.1 / 10 | 32-bit | Legacy support |

            ### Installation Steps
            1. Download the appropriate `.exe` for your Windows version
            2. Right-click → **Run as Administrator**
            3. Follow the setup wizard (choose install folder)
            4. Launch via Desktop shortcut or Start Menu → **EL5 MediProcure → ProcurBosse**

            ### System Requirements
            - Windows 7 SP1 or later *(32-bit or 64-bit)*
            - Internet connection *(connects live to Embu Level 5 Hospital Supabase database)*
            - 300 MB free disk space
            - 2 GB RAM minimum

            ### What's Included (All 40+ ERP Modules)
            - ✅ Procurement (Requisitions, Purchase Orders, GRN, Suppliers, Tenders, Contracts)
            - ✅ Finance (Vouchers, Budgets, Chart of Accounts, Fixed Assets)
            - ✅ Inventory & Quality (Items, Categories, QC Inspections, NCR)
            - ✅ Reports & Documents (Excel export, PDF print, Audit log)
            - ✅ Mail & Notifications (Internal + SMTP email)
            - ✅ Admin (Users, Settings, Database Admin, Webmaster)
            - ✅ Real-time sync via Supabase
            - ✅ Auto-update checker (notifies when new version released)
            - ✅ IP Network restriction support
            - ✅ Role-based access (Admin, Manager, Officer, Requisitioner, DB Admin)

            ### Database
            Connected live to: `yvjfehnzbzjliizjvuhq.supabase.co`
            Repo: https://github.com/huiejorjdsksfn/medi-procure-hub

            ---
            Built from commit: `${{ github.sha }}`
            Build: #${{ github.run_number }} · ${{ github.run_id }}

          files: release/*.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
