name: ProcurBosse v1+v2 EXE
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version override
        required: false
        default: ''
permissions:
  contents: write
env:
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - run: npm ci --no-audit
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: yvjfehnzbzjliizjvuhq
          VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
          VITE_SYSTEM_NAME: "EL5 MediProcure"
          VITE_APP_VERSION: "2.0.0" 
      - uses: actions/upload-artifact@v4
        with: { name: web, path: dist/, retention-days: 1 }
  v2:
    needs: web
    runs-on: windows-latest
    outputs:
      ver: ${{ steps.v.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }
      - uses: actions/download-artifact@v4
        with: { name: web, path: dist/ }
      - run: npm ci --no-audit
        shell: bash
      - id: v
        shell: bash
        run: |
          I="${{ github.event.inputs.version }}"
          V="${I:-2.0.${{ github.run_number }}}"
          node -e "const p=require('./package.json');p.version='$V';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2))"
          echo "ver=$V" >> $GITHUB_OUTPUT
      - run: npx electron-builder --win --x64
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - shell: bash
        run: |
          V="${{ steps.v.outputs.ver }}"
          cd dist-electron
          mv "$(ls *.exe|head -1)" "ProcurBosse-v2.${V}-Win10-x64.exe"
      - uses: actions/upload-artifact@v4
        with: { name: v2, path: dist-electron/ProcurBosse-v2.*.exe, if-no-files-found: error }
  v1:
    needs: web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - uses: actions/download-artifact@v4
        with: { name: web, path: dist/ }
      - shell: bash
        run: |
          R="${{ github.run_number }}"
          node -e "const p=require('./package.json');p.devDependencies.electron='22.3.27';p.version='1.0.${R}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2))"
      - run: npm install --no-audit --legacy-peer-deps
        shell: bash
      - shell: pwsh
        run: |
          $c=Get-Content electron-builder.yml -Raw
          $c=$c -replace [regex]::Escape('ProcurBosse-v${version}-${arch}-Setup.exe'),'ProcurBosse-v1.${version}-Win7-ia32.exe'
          Set-Content electron-builder.yml $c
      - run: npx electron-builder --win --ia32
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with: { name: v1, path: dist-electron/ProcurBosse-v1.*.exe, if-no-files-found: warn }
  release:
    needs: [v2, v1]
    if: always() && needs.v2.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: v2, path: pkg/ }
      - uses: actions/download-artifact@v4
        with: { name: v1, path: pkg/ }
        continue-on-error: true
      - run: |
          V="${{ needs.v2.outputs.ver }}"
          zip -j "ProcurBosse_v${V}_$(date +%Y%m%d).zip" pkg/*.exe || true
          ls -lh pkg/ ProcurBosse_*.zip 2>/dev/null
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.v2.outputs.ver }}-b${{ github.run_number }}
          name: ProcurBosse v${{ needs.v2.outputs.ver }} — Win10 x64 + Win7 ia32
          body: |
            ## EL5 MediProcure — Windows Installers
            | File | OS | Arch |
            |------|----|------|
            | ProcurBosse-v2.*-Win10-x64.exe | Windows 10/11 | 64-bit ✅ |
            | ProcurBosse-v1.*-Win7-ia32.exe | Windows 7/8/10 | 32-bit |
            Right-click → Run as Administrator → Follow wizard
            Build `${{ github.sha }}`
          files: |
            pkg/*.exe
            ProcurBosse_*.zip
          make_latest: true
