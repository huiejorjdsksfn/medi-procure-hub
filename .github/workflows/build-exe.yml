name: ProcurBosse v1+v2 Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version number
        default: ''
        required: false

permissions:
  contents: write

env:
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPA_KEY }}
      - run: ls -lh dist/ && du -sh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  build-v2:
    name: ProcurBosse v2 Win10/11 x64
    runs-on: windows-latest
    needs: build-web
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm ci --no-audit
        shell: bash
      - name: Set version
        id: ver
        shell: bash
        run: |
          INP="${{ github.event.inputs.version }}"
          if [ -n "$INP" ]; then VER="$INP"; else VER="2.0.${{ github.run_number }}"; fi
          node -e "const p=require('./package.json');p.version='$VER';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2))"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"
      - name: Build x64 EXE
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename EXE
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cd dist-electron
          EXE=$(ls *.exe 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then echo "ERROR: No EXE found!"; exit 1; fi
          mv "$EXE" "ProcurBosse-v2.${VER}-Win10-x64-Setup.exe"
          echo "Renamed: $(ls *.exe)"
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v2-x64
          path: dist-electron/ProcurBosse-v2.*.exe
          retention-days: 30
          if-no-files-found: error

  build-v1:
    name: ProcurBosse v1 Win7/8 ia32
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Pin Electron 22 LTS and set v1 version
        shell: bash
        run: |
          RUN="${{ github.run_number }}"
          node -e "const p=require('./package.json');p.devDependencies.electron='22.3.27';p.version='1.0.${RUN}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2))"
          echo "Pinned Electron 22.3.27, version=1.0.${RUN}"
      - run: npm install --no-audit --legacy-peer-deps
        shell: bash
      - name: Patch artifact name for ia32
        shell: pwsh
        run: |
          $cfg = Get-Content electron-builder.yml -Raw
          $cfg = $cfg -replace 'ProcurBosse-v\$\{version\}-\$\{arch\}-Setup\.exe', 'ProcurBosse-v1.\${version}-Win7-ia32-Setup.exe'
          Set-Content electron-builder.yml $cfg
          Select-String -Path electron-builder.yml -Pattern "artifactName"
      - name: Build ia32 EXE
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: List output
        shell: bash
        run: ls -lh dist-electron/ 2>/dev/null || echo "No dist-electron output"
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v1-ia32
          path: dist-electron/ProcurBosse-v1.*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: GitHub Release + ZIP
    runs-on: ubuntu-latest
    needs: [build-v2, build-v1]
    if: always() && needs.build-v2.result == 'success'
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-v2-x64
          path: release/
      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-v1-ia32
          path: release/
        continue-on-error: true
      - run: ls -lh release/
      - name: Create ZIP
        run: |
          VER="${{ needs.build-v2.outputs.version }}"
          TS=$(date +%Y%m%d)
          ZIPNAME="ProcurBosse_v${VER}_${TS}_Windows.zip"
          zip -j "$ZIPNAME" release/*.exe && echo "ZIP: $ZIPNAME" || echo "No EXEs to zip"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-v2.outputs.version }}-build-${{ github.run_number }}
          name: "ProcurBosse v${{ needs.build-v2.outputs.version }} — Win10 x64 + Win7 ia32"
          body: |
            ## ProcurBosse Windows Installers

            | File | Windows | Architecture |
            |------|---------|------|
            | `ProcurBosse-v2.*-Win10-x64-Setup.exe` | **10/11** | 64-bit — Recommended |
            | `ProcurBosse-v1.*-Win7-ia32-Setup.exe` | **7/8/10** | 32-bit — Legacy |

            **Install:** Right-click .exe → Run as Administrator → Follow wizard

            Commit: `${{ github.sha }}` · Build #${{ github.run_number }}
          files: |
            release/*.exe
            ProcurBosse_*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
