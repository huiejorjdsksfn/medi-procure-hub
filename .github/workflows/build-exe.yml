name: Build Windows EXE — ProcurBosse
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
  VITE_SUPABASE_PROJECT_ID: "yvjfehnzbzjliizjvuhq"
  VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
  VITE_SYSTEM_NAME: "EL5 MediProcure"

jobs:
  build-win-x64:
    name: Windows 10/11 x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Write env
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL="https://yvjfehnzbzjliizjvuhq.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
          EOF
      - run: npm install --legacy-peer-deps
      - run: npm version 2.0.0 --no-git-tag-version --allow-same-version
      - run: npm run build
      - name: Build x64 EXE
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true" }
        run: npx electron-builder --win --x64 --config electron-builder.yml
      - uses: actions/upload-artifact@v4
        with: { name: win-x64, path: dist-electron/*.exe, retention-days: 30 }

  build-win-ia32:
    name: Windows 7/8 ia32 (Legacy)
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm' }
      - name: Write env
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL="https://yvjfehnzbzjliizjvuhq.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
          EOF
      - run: npm install --legacy-peer-deps
      - run: npm version 1.0.0 --no-git-tag-version --allow-same-version
      - name: Patch artifact name for ia32
        shell: python
        run: |
          import re
          with open('electron-builder.yml') as f: c = f.read()
          c = re.sub(r'artifactName:.*', 'artifactName: "ProcurBosse-v1-Win7-ia32-Setup.exe"', c)
          with open('electron-builder.yml','w') as f: f.write(c)
      - run: npm run build
      - name: Build ia32 EXE
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true" }
        run: npx electron-builder --win --ia32 --config electron-builder.yml
      - uses: actions/upload-artifact@v4
        with: { name: win-ia32, path: dist-electron/*.exe, retention-days: 30 }

  release:
    name: GitHub Release
    needs: [build-win-x64, build-win-ia32]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: win-x64, path: release/ }
      - uses: actions/download-artifact@v4
        with: { name: win-ia32, path: release/ }
      - run: ls -lh release/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.0-build${{ github.run_number }}"
          name: "ProcurBosse v2.0.0 — EL5 MediProcure (Build ${{ github.run_number }})"
          body: |
            ## ProcurBosse v2.0.0 — Embu Level 5 Hospital ERP

            | File | OS | Arch |
            |------|----|------|
            | `ProcurBosse-v2.0.0-x64-Setup.exe` | Windows 10/11 | x64 ✅ Recommended |
            | `ProcurBosse-v1-Win7-ia32-Setup.exe` | Windows 7/8/10 | ia32 Legacy |

            **What's new:** White nav theme • GUI Editor • PWA install • Twilio SMS • IP whitelist • Full requisition forms with items • All pages light theme
          files: release/*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
