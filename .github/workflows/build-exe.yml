name: Build ProcurBosse Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_v1:
        description: 'Build v1 Win7/ia32?'
        type: boolean
        default: true
      version_override:
        description: 'Version override (e.g. 2.1.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  # ─── Step 1: Build React/Vite web on Linux ──────────────────────────────────
  build-web:
    name: "Build Web App"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.SUPABASE_KEY }}
      - run: echo "=== dist ===" && ls -lh dist/ && du -sh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ─── Step 2: Build v2 EXE ─ Windows 10/11 x64 ──────────────────────────────
  build-v2:
    name: "ProcurBosse v2 - Win10/11 x64"
    runs-on: windows-latest
    needs: build-web
    outputs:
      version: ${{ steps.setver.outputs.version }}
      exe_name: ${{ steps.rename.outputs.exe_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Install deps
        run: npm ci --no-audit
        shell: bash
      - name: Set version
        id: setver
        shell: python
        run: |
          import os, json
          override = r"${{ github.event.inputs.version_override }}".strip()
          run = "${{ github.run_number }}"
          ver = override if override else f"2.0.{run}"
          pkg = json.loads(open("package.json").read())
          pkg["version"] = ver
          open("package.json","w").write(json.dumps(pkg, indent=2))
          with open(os.environ["GITHUB_OUTPUT"],"a") as f:
            f.write(f"version={ver}\n")
          print(f"Set version: {ver}")
      - name: Build x64
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename EXE
        id: rename
        shell: python
        run: |
          import os, glob, shutil
          ver = "${{ steps.setver.outputs.version }}"
          exes = glob.glob("dist-electron/*.exe")
          print(f"Found: {exes}")
          if not exes:
              print("ERROR: No EXE produced!")
              raise SystemExit(1)
          src = max(exes, key=os.path.getmtime)
          name = f"ProcurBosse-v{ver}-Win10-x64-Setup.exe"
          shutil.move(src, f"dist-electron/{name}")
          sz = os.path.getsize(f"dist-electron/{name}") // 1024 // 1024
          print(f"  {name} ({sz} MB)")
          with open(os.environ["GITHUB_OUTPUT"],"a") as f:
              f.write(f"exe_name={name}\n")
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v2-x64
          path: dist-electron/ProcurBosse-*-Win10-x64-Setup.exe
          retention-days: 30
          if-no-files-found: error

  # ─── Step 3: Build v1 EXE ─ Windows 7/8/10 ia32 ───────────────────────────
  build-v1:
    name: "ProcurBosse v1 - Win7/8 ia32"
    runs-on: windows-latest
    needs: build-web
    if: ${{ github.event_name == 'push' || github.event.inputs.build_v1 == 'true' }}
    outputs:
      exe_name: ${{ steps.rename1.outputs.exe_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Pin Electron 22 LTS for Win7
        shell: python
        run: |
          import json
          run = "${{ github.run_number }}"
          pkg = json.loads(open("package.json").read())
          pkg.setdefault("devDependencies",{})["electron"] = "22.3.27"
          pkg["version"] = f"1.0.{run}"
          open("package.json","w").write(json.dumps(pkg, indent=2))
          print(f"Electron=22.3.27 version=1.0.{run}")
      - name: Install deps (Electron 22)
        shell: bash
        run: npm install --no-audit
      - name: Build ia32
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename EXE
        id: rename1
        shell: python
        run: |
          import os, glob, shutil
          run = "${{ github.run_number }}"
          ver = f"1.0.{run}"
          exes = glob.glob("dist-electron/*.exe")
          print(f"Found: {exes}")
          if exes:
              src = max(exes, key=os.path.getmtime)
              name = f"ProcurBosse-v{ver}-Win7-ia32-Setup.exe"
              shutil.move(src, f"dist-electron/{name}")
              sz = os.path.getsize(f"dist-electron/{name}") // 1024 // 1024
              print(f"  {name} ({sz} MB)")
              with open(os.environ["GITHUB_OUTPUT"],"a") as f:
                  f.write(f"exe_name={name}\n")
          else:
              print("WARNING: No EXE found (ia32 build may have failed)")
              with open(os.environ["GITHUB_OUTPUT"],"a") as f:
                  f.write("exe_name=\n")
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v1-ia32
          path: dist-electron/ProcurBosse-*-Win7-ia32-Setup.exe
          retention-days: 30
          if-no-files-found: warn

  # ─── Step 4: Package ZIP + GitHub Release ──────────────────────────────────
  release:
    name: "ZIP Package & GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-v2, build-v1]
    if: always() && needs.build-v2.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download v2
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-v2-x64
          path: release/
      - name: Download v1
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-v1-ia32
          path: release/
        continue-on-error: true
      - name: List files
        run: ls -lh release/ || echo "Empty"
      - name: Create ZIP with README
        shell: python
        run: |
          import zipfile, os, glob
          from datetime import datetime, timezone

          ver = "${{ needs.build-v2.outputs.version }}"
          run = "${{ github.run_number }}"
          sha = "${{ github.sha }}"[:8]
          ts  = datetime.now(timezone.utc).strftime("%Y%m%d")
          zip_name = f"ProcurBosse_v{ver}_{ts}_Windows_AllVersions.zip"

          readme = f"""ProcurBosse — EL5 MediProcure Hospital ERP
Windows Desktop Installer Package
