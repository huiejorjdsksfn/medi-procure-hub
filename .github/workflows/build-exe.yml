# ProcurBosse — Auto-build Windows .exe on every push to main
# v2 = Windows 10/11 x64 | v1 = Windows 7/8/10 ia32 (Electron 22 LTS)
name: Build ProcurBosse Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_v1:
        description: 'Also build v1 legacy EXE (Win7/8)?'
        type: boolean
        default: true
        required: false
      version_override:
        description: 'Override version (e.g. 2.1.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:
  build-web:
    name: "Build Web App (Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit
      - name: Build React app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: Verify dist
        run: du -sh dist/ && ls dist/
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  build-exe-v2:
    name: "ProcurBosse v2 — Win10/11 x64"
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Install dependencies
        run: npm ci --no-audit
        shell: bash
      - name: Set version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            VERSION="2.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$VERSION';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
      - name: Build x64 installer
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename output
        shell: bash
        run: |
          cd dist-electron
          for f in *.exe; do [ -f "$f" ] && mv "$f" "ProcurBosse-v${{ env.VERSION }}-Win10-x64-Setup.exe" && break; done
          ls -lh
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v2-win64
          path: dist-electron/ProcurBosse-*.exe
          retention-days: 30
          if-no-files-found: warn

  build-exe-v1:
    name: "ProcurBosse v1 — Win7/8/10 ia32 (Legacy)"
    runs-on: windows-latest
    needs: build-web
    if: ${{ github.event_name == 'push' || github.event.inputs.build_v1 == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Pin Electron 22 LTS for Windows 7 support
        shell: bash
        run: |
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.devDependencies=p.devDependencies||{};
            p.devDependencies['electron']='22.3.27';
            p.version='1.0.${{ github.run_number }}';
            fs.writeFileSync('package.json',JSON.stringify(p,null,2));
            console.log('Pinned Electron 22.3.27 for Win7 support');
          "
          echo "V1_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV
      - name: Install with Electron 22
        shell: bash
        run: npm install --no-audit
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: Build ia32 installer (Windows 7/8/10)
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Rename output
        shell: bash
        run: |
          cd dist-electron
          for f in *.exe; do [ -f "$f" ] && mv "$f" "ProcurBosse-v${{ env.V1_VERSION }}-Win7-ia32-Setup.exe" && break; done
          ls -lh || echo "No exe found"
      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-v1-win7
          path: dist-electron/ProcurBosse-*Win7*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: "Publish GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-exe-v2, build-exe-v1]
    if: always() && needs.build-exe-v2.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-v2-win64
          path: release/
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-v1-win7
          path: release/
        continue-on-error: true
      - run: ls -lh release/ || echo "No release files"
      - name: Set tag
        id: tag
        run: echo "tag=v2.0-build-${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ProcurBosse ${{ steps.tag.outputs.tag }} — EL5 MediProcure"
          body: |
            ## 🏥 ProcurBosse Desktop — Embu Level 5 Hospital ERP

            | File | Windows | Arch | Note |
            |------|---------|------|------|
            | `ProcurBosse-v2.x-Win10-x64-Setup.exe` | **10 / 11** | 64-bit | ✅ Recommended |
            | `ProcurBosse-v1.x-Win7-ia32-Setup.exe` | **7 / 8 / 8.1 / 10** | 32-bit | ✅ Legacy PCs |

            **Install:** Right-click → Run as Administrator → follow wizard

            **Requirements:** Internet connection · 300 MB disk · 2 GB RAM minimum

            **Modules:** Procurement · Finance · Inventory · Quality · Admin · Email · Documents · ODBC/SQL Server

            Built from `${{ github.sha }}` · Build #${{ github.run_number }}
          files: release/*.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
