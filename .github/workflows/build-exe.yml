──────────────────────────────────────────────────────────────
IT Department — Embu Level 5 Hospital
Email: it@embu.health.go.ke
"""
          with zipfile.ZipFile(zip_name, "w", zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              zf.writestr("README.txt", readme)
              for exe in sorted(glob.glob("release/*.exe")):
                  name = os.path.basename(exe)
                  sz   = os.path.getsize(exe) // 1024 // 1024
                  print(f"  Adding {name} ({sz} MB)")
                  zf.write(exe, name)
          final_sz = os.path.getsize(zip_name) // 1024 // 1024
          print(f"\nZIP: {zip_name} ({final_sz} MB)")
          open("zip_name.txt","w").write(zip_name)

      - name: Set tag
        id: tag
        run: |
          VER="${{ needs.build-v2.outputs.version }}"
          TAG="v${VER}-build-${{ github.run_number }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "ver=${VER}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ProcurBosse ${{ steps.tag.outputs.tag }} — EL5 MediProcure"
          body: |
            ## 🏥 ProcurBosse — Embu Level 5 Hospital ERP

            ### ⬇️ Downloads

            | File | Windows | Arch | Notes |
            |------|---------|------|-------|
            | `ProcurBosse-v${{ steps.tag.outputs.ver }}-Win10-x64-Setup.exe` | **10 / 11** | 64-bit | ✅ Recommended |
            | `ProcurBosse-v1.0.*-Win7-ia32-Setup.exe` | **7 / 8 / 8.1 / 10** | 32-bit | ✅ Legacy PCs |
            | `ProcurBosse_v${{ steps.tag.outputs.ver }}_*_Windows_AllVersions.zip` | **All** | Both | 📦 Full package |

            ### 📦 Full Package (ZIP)
            Download the ZIP for both installers + README with DLL info.

            ### 🖥️ Installation
            1. **Right-click** the `.exe` → **Run as Administrator**
            2. Follow the setup wizard
            3. Launch from **Desktop** or **Start Menu → EL5 MediProcure → ProcurBosse**

            ### ⚙️ What's New This Build
            - ✅ Twilio SMS notifications (approvals, alerts, login alerts)
            - ✅ IP restriction enforcement (network whitelist + access logs)
            - ✅ procurement_plans schema fixed (category, title, description, dates)
            - ✅ goods_received_items table added
            - ✅ Official Embu County Government print letterhead
            - ✅ Python build script (`build_procurbosse.py`)
            - ✅ All 40+ ERP modules fully operational

            ### 💻 Requirements
            - Internet connection (live Supabase database)
            - Windows 7 SP1 or later
            - 2–4 GB RAM · 350–500 MB disk

            ---
            Built from [`${{ github.sha }}`](https://github.com/huiejorjdsksfn/medi-procure-hub/commit/${{ github.sha }}) · Build #${{ github.run_number }}
          files: |
            release/*.exe
            ProcurBosse_*.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
