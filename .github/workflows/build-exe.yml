# ═══════════════════════════════════════════════════════════════════════
# ProcurBosse — Windows EXE Builder
# Builds BOTH versions on every push to main:
#   v1 → Windows 7/8/10  (ia32, 32-bit)
#   v2 → Windows 10/11   (x64, 64-bit)
# Auto-publishes to GitHub Releases
# ═══════════════════════════════════════════════════════════════════════
name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 2.1.0)'
        required: false

permissions:
  contents: write

jobs:
  # ── Job 1: Build x64 (Windows 10/11) ────────────────────────────────
  build-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version
        shell: bash
        run: |
          VER="${{ github.event.inputs.version || '2.0.0' }}"
          npm version $VER --no-git-tag-version --allow-same-version
          echo "APP_VERSION=$VER" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React/Vite app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Build Electron x64 EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --config electron-builder.yml

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcurBosse-x64-Setup
          path: dist-electron/*.exe
          retention-days: 30

  # ── Job 2: Build ia32 (Windows 7/8) ─────────────────────────────────
  build-ia32:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set version (ia32 = v1.x)
        shell: bash
        run: |
          VER="1.0.0"
          npm version $VER --no-git-tag-version --allow-same-version
          echo "APP_VERSION=$VER" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React/Vite app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Patch electron-builder for ia32 artifact name
        shell: bash
        run: |
          python3 -c "
          import yaml, sys
          with open('electron-builder.yml') as f: c = yaml.safe_load(f)
          c['nsis']['artifactName'] = 'ProcurBosse-v1-Win7-ia32-Setup.exe'
          with open('electron-builder.yml','w') as f: yaml.dump(c,f,default_flow_style=False)
          print('patched')
          "

      - name: Build Electron ia32 EXE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --ia32 --config electron-builder.yml

      - name: Upload ia32 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProcurBosse-ia32-Setup
          path: dist-electron/*.exe
          retention-days: 30

  # ── Job 3: Create GitHub Release with both EXEs ──────────────────────
  release:
    needs: [build-x64, build-ia32]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ProcurBosse-x64-Setup
          path: release-files/

      - name: Download ia32 artifact
        uses: actions/download-artifact@v4
        with:
          name: ProcurBosse-ia32-Setup
          path: release-files/

      - name: List release files
        run: ls -lh release-files/

      - name: Get version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-build${{ github.run_number }}
          name: "ProcurBosse v${{ steps.ver.outputs.version }} — EL5 MediProcure"
          body: |
            ## ProcurBosse v${{ steps.ver.outputs.version }} — Embu Level 5 Hospital ERP

            ### 📦 Downloads

            | File | OS | Architecture |
            |------|-----|------|
            | `ProcurBosse-v2-x64-Setup.exe` | Windows 10/11 | 64-bit ✅ **Recommended** |
            | `ProcurBosse-v1-Win7-ia32-Setup.exe` | Windows 7/8/10 | 32-bit Legacy |

            ### 🚀 Installation
            1. Download the correct EXE for your Windows version
            2. Run `INSTALL_ProcurBosse.bat` or double-click the EXE
            3. Launch from Desktop shortcut

            ### ✅ Changes in this build
            - Fixed `useSystemSettings` crash in Admin Panel & Settings
            - All printouts redesigned to match Embu County Government official letterhead
            - Dark navy UI — no more white page flashes
            - Fixed `/documents/editor` nested route crash
            - Realtime DB subscriptions enabled on all 38 tables
            - Full RLS auth policies applied to all tables
            - Auto-create user profile on signup
            - Windows 7 compatibility fixes in Electron

            ### 🗄️ Database
            - Supabase: `yvjfehnzbzjliizjvuhq.supabase.co`
            - Realtime enabled on all core tables
            - RLS policies: role-based access control enforced

          files: release-files/*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
