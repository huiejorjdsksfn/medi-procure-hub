name: Release

# Builds the Electron Windows installer and publishes a GitHub Release on:
#   - every push to main (as a rolling pre-release tagged "main-<sha>")
#   - every version tag push (v*.*.*) as a stable release
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web bundle
        run: npm run build

      - name: Run smoke tests
        run: npm test --if-present

      - name: Build Electron Windows installer
        run: npm run electron:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksums
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Get-ChildItem dist -Filter *.exe | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              "$hash  $($_.Name)" | Out-File -Append -Encoding ascii dist/SHA256SUMS.txt
            }
          }

      - name: Publish stable release (tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true

      - name: Publish rolling pre-release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          name: "Rolling build ${{ github.sha }}"
          prerelease: true
          files: |
            dist/*.exe
            dist/SHA256SUMS.txt