# ProcurBosse v22.6 — Build & Release
# Runs on every push to main
# Produces: web ZIP + kiosk ZIP + Windows x64 EXE + Windows ia32 EXE
name: "Build & Release"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  CI: "false"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:

  # ── 1. Build web app ────────────────────────────────────────────
  build-web:
    name: "Build Web App"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - id: ver
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Install
        run: npm install --legacy-peer-deps --no-audit

      - name: Build
        run: npm run build

      - name: Zip web dist
        run: zip -r procurbosse-web.zip dist/

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: |
            dist/
            procurbosse-web.zip
          retention-days: 1

  # ── 2. Build kiosk app ──────────────────────────────────────────
  build-kiosk:
    name: "Build Kiosk App"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Install + Build kiosk
        run: |
          cd kiosk-app
          npm install --legacy-peer-deps --no-audit
          npm run build
          cd dist && zip -r ../../kiosk-request-station.zip .
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: kiosk-dist
          path: kiosk-request-station.zip
          retention-days: 1
        continue-on-error: true

  # ── 3. Windows x64 EXE ─────────────────────────────────────────
  build-exe-x64:
    name: "Windows x64 EXE"
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download web dist
        uses: actions/download-artifact@v4
        with: { name: web-dist }

      - name: Install + Electron
        shell: bash
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@41 electron-builder@26 --legacy-peer-deps

      - name: Build EXE x64
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: exe-x64
          path: dist-electron/*.exe
          retention-days: 1

  # ── 4. Windows ia32 EXE ────────────────────────────────────────
  build-exe-ia32:
    name: "Windows ia32 EXE"
    runs-on: windows-2019
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18" }

      - name: Download web dist
        uses: actions/download-artifact@v4
        with: { name: web-dist }

      - name: Install + Electron 32-bit
        shell: bash
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@33 electron-builder@25 --legacy-peer-deps

      - name: Build EXE ia32
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: exe-ia32
          path: dist-electron/*.exe
          retention-days: 1

  # ── 5. Publish Release ─────────────────────────────────────────
  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-web, build-kiosk, build-exe-x64, build-exe-ia32]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: Show artifacts
        run: find artifacts -type f -name "*.exe" -o -name "*.zip" | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.build-web.outputs.version }}-${{ github.run_number }}"
          name: "ProcurBosse v${{ needs.build-web.outputs.version }} — Build ${{ github.run_number }}"
          body: |
            ## 🏥 ProcurBosse EL5 MediProcure — v${{ needs.build-web.outputs.version }}

            | Download | Description |
            |----------|-------------|
            | `ProcurBosse-Setup-x64.exe` | Windows 10/11 64-bit installer |
            | `ProcurBosse-Setup-ia32.exe` | Windows 7/8/10 32-bit installer |
            | `procurbosse-web.zip` | Web deployment package |
            | `kiosk-request-station.zip` | Department kiosk (no login) |

            ### Fixes in this build
            - ✅ Login page loads immediately after splash
            - ✅ Splash screen < 1 second
            - ✅ Dashboard accessible after login
            - ✅ All 54 pages error-safe
            - ✅ No IP restriction — all networks can login
            - ✅ Service worker clears old cache

            **Commit:** `${{ github.sha }}`
          files: |
            artifacts/exe-x64/*.exe
            artifacts/exe-ia32/*.exe
            artifacts/web-dist/procurbosse-web.zip
            artifacts/kiosk-dist/kiosk-request-station.zip
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
