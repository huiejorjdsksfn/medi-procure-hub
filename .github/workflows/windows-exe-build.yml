# ProcurBosse v9.6 — Windows EXE Build & Release (ALL architectures)
# Embu Level 5 Hospital | Embu County Government | Kenya
name: "🖥️ Windows EXE — All Builds v9.6"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: "9.6.0"
  NODE_VERSION: "20"
  CI: "false"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:

  build-web:
    name: "🌐 Web Build"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      build_id: ${{ steps.ver.outputs.build_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - id: ver
        run: |
          VER="${{ env.APP_VERSION }}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "build_id=v${VER}-$(date +%Y%m%d%H%M)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install
        run: npm install --legacy-peer-deps --no-audit

      - name: Write .env
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL=https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_APP_VERSION=9.6.0
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=+16812972643
          EOF

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          ls -lh dist/assets/index-*.js | head -3
          [ -f dist/index.html ] && echo "✅ index.html OK" || exit 1
          echo "Total: $(du -sh dist/ | cut -f1)"

      - name: Package web ZIP
        run: cd dist && zip -r ../ProcurBosse-v${{ env.APP_VERSION }}-Web.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.ver.outputs.build_id }}
          path: |
            dist/
            ProcurBosse-v${{ env.APP_VERSION }}-Web.zip
          retention-days: 2

  build-exe-x64:
    name: "💻 Windows x64 (Win10/11)"
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.build-web.outputs.build_id }}
          path: ./

      - name: Install deps + Electron
        shell: bash
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@41 electron-builder@26 --legacy-peer-deps

      - name: Write builder config
        shell: bash
        run: |
          cat > eb-x64.yml << 'EBEOF'
          appId: ke.go.embu.mediprocure.procurbosse
          productName: ProcurBosse
          copyright: "© 2026 Embu County Government — All Rights Reserved"
          directories:
            output: release-x64
          files:
            - "dist/**/*"
            - "electron/**/*"
            - "package.json"
          win:
            icon: public/icon.png
            verifyUpdateCodeSignature: false
            target:
              - target: nsis
                arch: [x64]
              - target: portable
                arch: [x64]
          nsis:
            oneClick: false
            perMachine: false
            allowElevation: true
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: always
            createStartMenuShortcut: true
            shortcutName: "ProcurBosse EL5"
            artifactName: "ProcurBosse-v${{ env.APP_VERSION }}-x64-Setup.exe"
          portable:
            artifactName: "ProcurBosse-v${{ env.APP_VERSION }}-x64-Portable.exe"
          asar: true
          compression: maximum
          EBEOF

      - name: Build x64 EXE
        shell: bash
        run: npx electron-builder build --config eb-x64.yml --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: List output
        shell: bash
        run: find release-x64 -name "*.exe" 2>/dev/null || echo "No EXE found"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-x64-${{ needs.build-web.outputs.build_id }}
          path: release-x64/*.exe
          retention-days: 30
          if-no-files-found: warn

  build-exe-ia32:
    name: "💻 Windows ia32 (Win7/8/10 32-bit)"
    runs-on: windows-2019
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18" }

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.build-web.outputs.build_id }}
          path: ./

      - name: Install deps + Electron 33
        shell: bash
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@33 electron-builder@25 --legacy-peer-deps

      - name: Write builder config
        shell: bash
        run: |
          cat > eb-ia32.yml << 'EBEOF'
          appId: ke.go.embu.mediprocure.procurbosse
          productName: ProcurBosse
          copyright: "© 2026 Embu County Government — All Rights Reserved"
          directories:
            output: release-ia32
          files:
            - "dist/**/*"
            - "electron/**/*"
            - "package.json"
          win:
            icon: public/icon.png
            verifyUpdateCodeSignature: false
            target:
              - target: nsis
                arch: [ia32]
          nsis:
            oneClick: false
            perMachine: false
            allowElevation: true
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: always
            createStartMenuShortcut: true
            shortcutName: "ProcurBosse EL5"
            artifactName: "ProcurBosse-v${{ env.APP_VERSION }}-ia32-Setup.exe"
          asar: true
          compression: maximum
          EBEOF

      - name: Build ia32 EXE
        shell: bash
        run: npx electron-builder build --config eb-ia32.yml --win --ia32 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: List output
        shell: bash
        run: find release-ia32 -name "*.exe" 2>/dev/null || echo "No EXE found"

      - uses: actions/upload-artifact@v4
        with:
          name: exe-ia32-${{ needs.build-web.outputs.build_id }}
          path: release-ia32/*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: "🚀 Publish Release v${{ needs.build-web.outputs.version }}"
    runs-on: ubuntu-latest
    needs: [build-web, build-exe-x64, build-exe-ia32]
    if: always() && needs.build-web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download web ZIP
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.build-web.outputs.build_id }}
          path: artifacts/web/
        continue-on-error: true

      - name: Download x64 EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-x64-${{ needs.build-web.outputs.build_id }}
          path: artifacts/exe-x64/
        continue-on-error: true

      - name: Download ia32 EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-ia32-${{ needs.build-web.outputs.build_id }}
          path: artifacts/exe-ia32/
        continue-on-error: true

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts/web -name "*.zip" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/exe-x64 -name "*.exe" -exec cp {} release-files/ \; 2>/dev/null || true
          find artifacts/exe-ia32 -name "*.exe" -exec cp {} release-files/ \; 2>/dev/null || true
          echo "=== Release files ==="
          ls -lh release-files/ 2>/dev/null || echo "No files collected"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.build-web.outputs.version }}"
          name: "🏥 ProcurBosse v${{ needs.build-web.outputs.version }} — EL5 MediProcure FullRelease"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            # 🏥 ProcurBosse v${{ needs.build-web.outputs.version }} — EL5 MediProcure

            **Embu Level 5 Hospital · Embu County Government · Kenya**
            **Build:** `${{ needs.build-web.outputs.build_id }}`

            ## ✨ v9.6.0 Highlights

            ### 🔧 New ERP Engines
            - **NotificationEngine** — realtime Supabase push + browser notifications
            - **SyncEngine** — background 5-min reference data sync
            - **ValidationEngine** — form validation for all 8 ERP entity types
            - **PrintEngine** — unified print: POs, Requisitions, GRNs, all Vouchers
            - **WorkflowEngine** — approval state machine with DB notifications
            - **FormEngine** — reusable state, validation, autosave

            ### 💾 3-Tier Cache Layer
            - ERPCache: Memory → IndexedDB → localStorage with TTL
            - OfflineEngine: offline mutation queue, auto-replay on reconnect
            - 30+ cached ERP API functions

            ### 🗄️ Database Enhancements
            - Auto-numbers: RQN/LPO/GRN/TDR/PV/RV/JV/PUV/SV/BDG/FA/NC
            - Audit log triggers on 15 tables
            - GRN→inventory trigger, low-stock alerts, workflow notifications
            - Seeds: 35 COA accounts, 19 departments, 15 item categories

            ### 🌐 EdgeOne 404 — Permanently Fixed
            - Bare catch-all route in edgeone.json
            - Custom 404.html with JS redirect
            - SPARouteRestorer with proper useNavigate hook

            ## 📦 Downloads

            | File | Platform |
            |------|----------|
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-x64-Setup.exe` | Windows 10/11 64-bit |
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-ia32-Setup.exe` | Windows 7/8/10 32-bit |
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-Web.zip` | Web deployment |

            ## 🏥 Facilities
            EL5H Main · Runyenjes · Ishiara · Mitheru · Kagaari · Chogoria · Kiritiri · Embu Annex

            ---
            *Embu County Government Health Division*
          files: |
            release-files/*.exe
            release-files/*.zip
          fail_on_unmatched_files: false
        continue-on-error: true
