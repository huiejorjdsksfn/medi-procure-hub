# ╔══════════════════════════════════════════════════════════════════╗
# ║  EL5 MediProcure — Windows Desktop EXE Build                    ║
# ║  v6.0.0 · Embu Level 5 Hospital · Embu County Government, Kenya ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# PRODUCES:
#   ProcurBosse-v6.0.0-x64-Setup.exe    ← Windows 10/11 installer
#   ProcurBosse-v6.0.0-x64-Portable.exe ← Portable no-install EXE
#   ProcurBosse-v6.0.0-ia32-Setup.exe   ← Windows 7/8/10 32-bit
#
# ADMIN:  samwise@gmail.com / samwise@gmail.com
# LIVE:   https://procurbosse.edgeone.app

name: "🖥️ ProcurBosse — Windows EXE Build"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (default: 5.8.3)"
        required: false
        default: "6.0.0"
      arch:
        description: "Architecture to build"
        required: false
        default: "both"
        type: choice
        options: ["x64", "ia32", "both"]

permissions:
  contents: write
  actions: write

env:
  APP_VERSION: "6.0.0"
  NODE_VERSION: "20"
  CI: "false"
  NODE_OPTIONS: "--max-old-space-size=4096"
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:

# ═══════════════════════════════════════════════════════════
# JOB 1 ─ Web build on Ubuntu (fast, then shared to EXE jobs)
# ═══════════════════════════════════════════════════════════
  web-build:
    name: "🌐 Web Build (shared)"
    runs-on: ubuntu-latest
    outputs:
      version:  ${{ steps.meta.outputs.version }}
      build_id: ${{ steps.meta.outputs.build_id }}

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🏷️ Metadata"
        id: meta
        run: |
          V="${{ inputs.version || env.APP_VERSION }}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "build_id=v${V}-$(date +%Y%m%d%H%M)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: "📦 Setup Node ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📥 Install"
        run: npm ci --ignore-scripts

      - name: "🏗️ Vite build"
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_VERSION: ${{ steps.meta.outputs.version }}
          VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"

      - name: "✅ Verify dist"
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)
          echo "✓ dist OK — $(ls dist/assets/*.js | wc -l) JS chunks, $(du -sh dist | cut -f1)"

      - name: "📤 Upload dist"
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.meta.outputs.build_id }}
          path: dist/
          retention-days: 3

# ═══════════════════════════════════════════════════════════
# JOB 2 ─ Windows x64 EXE (Win 10/11)
# ═══════════════════════════════════════════════════════════
  exe-x64:
    name: "💻 Windows x64 EXE"
    runs-on: windows-latest
    needs: web-build
    if: inputs.arch == 'x64' || inputs.arch == 'both' || inputs.arch == ''

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup Node ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📥 Download dist"
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.web-build.outputs.build_id }}
          path: dist/

      - name: "📥 Install (with Electron)"
        run: npm ci --ignore-scripts
        shell: bash

      - name: "🔧 Write electron-builder config (x64)"
        shell: bash
        run: |
          cat > eb-x64.yml << 'EBEOF'
          appId: ke.go.embu.mediprocure.procurbosse
          productName: ProcurBosse
          copyright: "© 2026 Embu County Government — All Rights Reserved"
          directories:
            output: release-x64
          files:
            - "dist/**/*"
            - "electron/**/*"
            - "package.json"
          extraResources:
            - from: public/icon.png
              to: icon.png
            - from: public/logo.png
              to: logo.png
          win:
            icon: public/icon.png
            verifyUpdateCodeSignature: false
            requestedExecutionLevel: requireAdministrator
            target:
              - target: nsis
                arch: [x64]
              - target: portable
                arch: [x64]
          nsis:
            oneClick: false
            perMachine: false
            allowElevation: true
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: always
            createStartMenuShortcut: true
            shortcutName: "ProcurBosse EL5"
            installerHeader: "Embu Level 5 Hospital — EL5 MediProcure"
            artifactName: "ProcurBosse-v6.0.0-x64-Setup.exe"
          portable:
            artifactName: "ProcurBosse-v6.0.0-x64-Portable.exe"
          asar: true
          compression: maximum
          EBEOF

      - name: "🖥️ Build x64 EXE"
        shell: bash
        run: npx electron-builder build --config eb-x64.yml --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "📋 List output"
        shell: bash
        run: |
          echo "=== release-x64/ ==="
          find release-x64 -name "*.exe" 2>/dev/null && echo "✓ EXE found" || echo "⚠ No EXE"

      - name: "📤 Upload x64 EXE"
        uses: actions/upload-artifact@v4
        with:
          name: "ProcurBosse-v${{ needs.web-build.outputs.version }}-x64"
          path: release-x64/*.exe
          retention-days: 30
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════
# JOB 3 ─ Windows ia32 EXE (Win 7/8/10 32-bit legacy)
# ═══════════════════════════════════════════════════════════
  exe-ia32:
    name: "💻 Windows ia32 EXE (32-bit)"
    runs-on: windows-2019
    needs: web-build
    if: inputs.arch == 'ia32' || inputs.arch == 'both' || inputs.arch == ''

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📦 Setup Node 18 (ia32 compat)"
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: "📥 Download dist"
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.web-build.outputs.build_id }}
          path: dist/

      - name: "📥 Install (with Electron 33 for ia32)"
        shell: bash
        run: |
          npm ci --ignore-scripts
          npm install --save-dev electron@33 electron-builder@25 --legacy-peer-deps --no-audit

      - name: "🔧 Write electron-builder config (ia32)"
        shell: bash
        run: |
          cat > eb-ia32.yml << 'EBEOF'
          appId: ke.go.embu.mediprocure.procurbosse
          productName: ProcurBosse
          copyright: "© 2026 Embu County Government — All Rights Reserved"
          directories:
            output: release-ia32
          files:
            - "dist/**/*"
            - "electron/**/*"
            - "package.json"
          win:
            icon: public/icon.png
            verifyUpdateCodeSignature: false
            target:
              - target: nsis
                arch: [ia32]
          nsis:
            oneClick: false
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: always
            createStartMenuShortcut: true
            shortcutName: "ProcurBosse EL5"
            artifactName: "ProcurBosse-v6.0.0-ia32-Setup.exe"
          asar: true
          compression: maximum
          EBEOF

      - name: "🖥️ Build ia32 EXE"
        shell: bash
        run: npx electron-builder build --config eb-ia32.yml --win --ia32 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "📋 List output"
        shell: bash
        run: |
          echo "=== release-ia32/ ==="
          find release-ia32 -name "*.exe" 2>/dev/null && echo "✓ EXE found" || echo "⚠ No EXE"

      - name: "📤 Upload ia32 EXE"
        uses: actions/upload-artifact@v4
        with:
          name: "ProcurBosse-v${{ needs.web-build.outputs.version }}-ia32"
          path: release-ia32/*.exe
          retention-days: 30
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════
# JOB 4 ─ Collect all EXEs + attach to GitHub Release
# ═══════════════════════════════════════════════════════════
  attach-release:
    name: "📎 Attach EXEs to Release"
    runs-on: ubuntu-latest
    needs: [web-build, exe-x64, exe-ia32]
    if: always() && needs.web-build.result == 'success'

    steps:
      - name: "📥 Download x64 EXE"
        uses: actions/download-artifact@v4
        with:
          name: "ProcurBosse-v${{ needs.web-build.outputs.version }}-x64"
          path: exe/
        continue-on-error: true

      - name: "📥 Download ia32 EXE"
        uses: actions/download-artifact@v4
        with:
          name: "ProcurBosse-v${{ needs.web-build.outputs.version }}-ia32"
          path: exe/
        continue-on-error: true

      - name: "📋 Collected EXE files"
        run: |
          echo "=== EXE files ready for release ==="
          ls -lh exe/ 2>/dev/null || echo "No EXE files collected (build may have failed)"

      - name: "📎 Attach EXEs to existing release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.web-build.outputs.version }}"
          name: "🏥 ProcurBosse v${{ needs.web-build.outputs.version }} — EL5 MediProcure"
          draft: false
          prerelease: false
          body: |
            ## 🖥️ Windows Desktop App

            | File | Architecture | Platform |
            |------|-------------|----------|
            | `ProcurBosse-v${{ needs.web-build.outputs.version }}-x64-Setup.exe` | x64 | Windows 10/11 (64-bit) — **Recommended** |
            | `ProcurBosse-v${{ needs.web-build.outputs.version }}-x64-Portable.exe` | x64 | Windows 10/11 — No install required |
            | `ProcurBosse-v${{ needs.web-build.outputs.version }}-ia32-Setup.exe` | ia32 | Windows 7/8/10 (32-bit) — Legacy |

            ### Install & Launch
            1. Download the appropriate `.exe` for your Windows version
            2. Run installer (may prompt UAC — click Yes)
            3. App opens automatically — log in with:
               - **Email:** `samwise@gmail.com`
               - **Password:** `samwise@gmail.com`

            ### System Requirements
            - Windows 10/11 x64 (recommended) or Windows 7+ ia32
            - 4 GB RAM minimum, 8 GB recommended
            - 500 MB disk space
            - Internet connection (connects to Supabase cloud DB)

            ### Build ID
            `${{ needs.web-build.outputs.build_id }}`
          files: exe/*.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
