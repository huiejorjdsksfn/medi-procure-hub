# ProcurBosse — Windows EXE Builder
# Installs electron separately only for desktop builds
name: "Windows EXE Build"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 22.0.0)"
        required: true
        default: "22.0.0"

permissions:
  contents: write

jobs:
  build-x64:
    name: "Windows x64"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }

      - name: Install web deps + electron
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@41 electron-builder@26 --legacy-peer-deps
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build web assets
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Windows EXE x64
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ github.event.inputs.version }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ProcurBosse-Windows-x64-v${{ github.event.inputs.version }}
          path: dist-electron/*.exe
          retention-days: 90

  build-ia32:
    name: "Windows ia32 (32-bit)"
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18", cache: npm }

      - name: Install web deps + electron
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@33 electron-builder@25 --legacy-peer-deps
        env:
          CI: "false"

      - name: Build web assets
        run: npm run build
        env:
          CI: "false"

      - name: Build Windows EXE ia32
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ github.event.inputs.version }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ProcurBosse-Windows-ia32-v${{ github.event.inputs.version }}
          path: dist-electron/*.exe
          retention-days: 90
