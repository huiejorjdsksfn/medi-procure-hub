# ProcurBosse v6.0 — Build & Release
# Produces: web ZIP + kiosk ZIP + Windows x64 EXE + Windows ia32 EXE + portable ZIPs
name: "Build & Release v6"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  CI: "false"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:

  # ── 1. Build web app ────────────────────────────────────────────
  build-web:
    name: "Build Web App"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - id: ver
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Install
        run: npm install --legacy-peer-deps --no-audit

      - name: Build
        run: npm run build

      - name: Create web ZIP
        run: |
          cd dist
          zip -r ../ProcurBosse-v${{ steps.ver.outputs.version }}-web.zip .
          cd ..

      - name: Create installer ZIP (scripts + web)
        run: |
          mkdir -p release-pkg
          cp -r dist release-pkg/web
          cp -r installers release-pkg/
          cp -r install release-pkg/
          cp README.md release-pkg/ 2>/dev/null || true
          cd release-pkg
          zip -r ../ProcurBosse-v${{ steps.ver.outputs.version }}-installer-package.zip .
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: |
            dist/
            ProcurBosse-v${{ steps.ver.outputs.version }}-web.zip
            ProcurBosse-v${{ steps.ver.outputs.version }}-installer-package.zip
          retention-days: 1

  # ── 2. Build kiosk app ──────────────────────────────────────────
  build-kiosk:
    name: "Build Kiosk App"
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Install + Build kiosk
        run: |
          cd kiosk-app
          npm install --legacy-peer-deps --no-audit
          npm run build || true
          if [ -d dist ]; then
            cd dist
            zip -r ../../ProcurBosse-v${{ needs.build-web.outputs.version }}-kiosk.zip .
          fi
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: kiosk-dist
          path: "ProcurBosse-v${{ needs.build-web.outputs.version }}-kiosk.zip"
          retention-days: 1
        continue-on-error: true

  # ── 3. Windows x64 EXE ─────────────────────────────────────────
  build-exe-x64:
    name: "Windows x64 EXE"
    runs-on: windows-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }

      - name: Download web dist
        uses: actions/download-artifact@v4
        with: { name: web-dist }

      - name: Install + Electron
        shell: bash
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@41 electron-builder@26 --legacy-peer-deps

      - name: Build EXE x64
        shell: bash
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename output
        shell: bash
        run: |
          mkdir -p release-exe
          find dist-electron -name "*.exe" | while read f; do
            fname=$(basename "$f")
            cp "$f" "release-exe/ProcurBosse-v${{ needs.build-web.outputs.version }}-x64-Setup.exe"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: exe-x64
          path: release-exe/*.exe
          retention-days: 1

  # ── 4. Windows ia32 EXE ────────────────────────────────────────
  build-exe-ia32:
    name: "Windows ia32 EXE"
    runs-on: windows-2019
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18" }

      - name: Download web dist
        uses: actions/download-artifact@v4
        with: { name: web-dist }

      - name: Install + Electron 32-bit
        shell: bash
        run: |
          npm install --legacy-peer-deps --no-audit
          npm install --save-dev electron@33 electron-builder@25 --legacy-peer-deps

      - name: Build EXE ia32
        shell: bash
        run: npx electron-builder --win --ia32 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename output
        shell: bash
        run: |
          mkdir -p release-exe
          find dist-electron -name "*.exe" | while read f; do
            cp "$f" "release-exe/ProcurBosse-v${{ needs.build-web.outputs.version }}-ia32-Setup.exe"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: exe-ia32
          path: release-exe/*.exe
          retention-days: 1

  # ── 5. Publish Release ─────────────────────────────────────────
  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [build-web, build-kiosk, build-exe-x64, build-exe-ia32]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: List release files
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.build-web.outputs.version }}"
          name: "ProcurBosse v${{ needs.build-web.outputs.version }} — Dashboard Module Tiles"
          body: |
            ## ProcurBosse v${{ needs.build-web.outputs.version }} — EL5 MediProcure
            **Embu Level 5 Hospital** · Embu County Government

            ### What's New in v6.0.0
            - New D365 CRM-style **module tile dashboard** — click tiles to navigate
            - **Role-based tiles** — only your permitted modules are shown
            - **Reception & Communications** available to ALL roles (every user)
            - Redesigned **404 error page** with quick navigation links
            - New **Power BI-style Reports** page with sidebar, KPI tiles, tabular data
            - Removed dashboard graphs/charts and ERP wheel replaced with tiles
            - All routes for Reception, SMS, Telephony, Email, Inbox open to all users
            - Version bumped to v6.0.0

            ### Downloads

            | File | Description |
            |------|-------------|
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-x64-Setup.exe` | Windows 10/11 64-bit installer |
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-ia32-Setup.exe` | Windows 7/8/10 32-bit installer |
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-web.zip` | Web deployment package |
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-installer-package.zip` | Installer scripts + web build |
            | `ProcurBosse-v${{ needs.build-web.outputs.version }}-kiosk.zip` | Department kiosk station |

            **Build:** `${{ github.run_number }}` · **Commit:** `${{ github.sha }}`
          files: |
            artifacts/exe-x64/*.exe
            artifacts/exe-ia32/*.exe
            artifacts/web-dist/ProcurBosse-v${{ needs.build-web.outputs.version }}-web.zip
            artifacts/web-dist/ProcurBosse-v${{ needs.build-web.outputs.version }}-installer-package.zip
            artifacts/kiosk-dist/ProcurBosse-v${{ needs.build-web.outputs.version }}-kiosk.zip
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
