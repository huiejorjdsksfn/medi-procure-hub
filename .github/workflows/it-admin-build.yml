# ============================================================
# ProcurBosse IT Admin App — Build & Release
# Builds the IT Admin Electron desktop app
# Auto-starts at system login, system tray integration
# Embu Level 5 Hospital | Kenya
# ============================================================
name: "IT Admin App Build"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "IT Admin version"
        required: true
        default: "1.0.0"
  push:
    paths:
      - "admin-app/**"
    branches: [main]

permissions:
  contents: write

jobs:
  build-it-admin-x64:
    name: "IT Admin Windows x64"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }

      - name: Install admin-app deps
        run: |
          cd admin-app
          npm install --legacy-peer-deps

      - name: Build React app
        run: |
          cd admin-app
          npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build IT Admin EXE (x64)
        run: |
          cd admin-app
          npx electron-builder --win --x64 --config electron-builder.json
        env:
          APP_VERSION: ${{ github.event.inputs.version || '1.0.0' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload x64
        uses: actions/upload-artifact@v4
        with:
          name: itadmin-x64-${{ github.event.inputs.version || '1.0.0' }}
          path: admin-app/dist-electron/*.exe
          retention-days: 30

  build-it-admin-ia32:
    name: "IT Admin Windows ia32"
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "18" }

      - name: Install admin-app deps
        run: |
          cd admin-app
          npm install --legacy-peer-deps

      - name: Build React app
        run: |
          cd admin-app
          npm run build

      - name: Build IT Admin EXE (ia32)
        run: |
          cd admin-app
          npx electron-builder --win --ia32 --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ia32
        uses: actions/upload-artifact@v4
        with:
          name: itadmin-ia32-${{ github.event.inputs.version || '1.0.0' }}
          path: admin-app/dist-electron/*.exe
          retention-days: 30

  publish-it-admin-release:
    name: "Publish IT Admin Release"
    runs-on: ubuntu-latest
    needs: [build-it-admin-x64, build-it-admin-ia32]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: itadmin-x64-${{ github.event.inputs.version || '1.0.0' }}
          path: release/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: itadmin-ia32-${{ github.event.inputs.version || '1.0.0' }}
          path: release/
        continue-on-error: true

      - name: Publish IT Admin Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "itadmin-v${{ github.event.inputs.version || '1.0.0' }}"
          name: "ProcurBosse IT Admin v${{ github.event.inputs.version || '1.0.0' }}"
          body: |
            # ProcurBosse IT Admin v${{ github.event.inputs.version || '1.0.0' }}
            **Full System Control Desktop App**
            EL5 MediProcure · Embu Level 5 Hospital · Embu County Government

            ## Features
            - 📊 **Live Overview** — Real-time KPIs: pending reqs, POs, vouchers, low stock, users
            - 👥 **User Management** — View all users, reset passwords, suspend accounts
            - 📋 **Audit Log** — Full 50-entry live audit trail with action types
            - 🚀 **Deploy Control** — Trigger GitHub Actions deploy, view commit history
            - 🗄️ **Database** — SQL query runner, quick queries, exec_sql RPC
            - ⚙️ **Settings** — System config, external service links, restart, logs
            - 🔔 **System Tray** — Runs in background, live stats in tray menu
            - 🖥️ **Auto-start** — Starts at Windows login (configurable)
            - 📢 **Broadcast** — Push messages to all logged-in web app users
            - 🔗 **Quick Links** — Supabase, GitHub, EdgeOne, Twilio, all in one click

            ## Installation
            1. Download `ProcurBosse-ITAdmin-v*.exe`
            2. Run as Administrator
            3. App installs and auto-starts at next login
            4. Access from system tray or Desktop shortcut

            ## Requirements
            - Windows 10+ (x64) or Windows 7+ (ia32)
            - Internet connection for live stats
            - IT Admin credentials for Supabase

            ## Files
            | File | For |
            |---|---|
            | `*-x64-Setup.exe` | Modern 64-bit systems (recommended) |
            | `*-ia32-Setup.exe` | Older 32-bit systems |
          files: release/*.exe
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
