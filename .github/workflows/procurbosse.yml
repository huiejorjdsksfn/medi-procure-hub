            ## 🏗️ Stack
            React 18 + TypeScript + Vite 5 + Supabase + Tailwind CSS + Electron
          files: |
            ProcurBosse-v11.0.0-Web.zip
            release-exe/*.exe
            release-exe/**/*.exe
            release-exe/*.bat
            release-exe/*.txt
        continue-on-error: true
