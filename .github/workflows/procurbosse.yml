name: "ProcurBosse — Build, Deploy & Release"

on:
  push:
    branches: [main]
    tags:     ["v*"]
  workflow_dispatch:
    inputs:
      build_exe:
        description: "Build Windows EXE"
        default: "false"
        type: boolean
      publish_release:
        description: "Publish GitHub Release"
        default: "false"
        type: boolean

# Cancel any in-progress run for the same branch/ref so pushes don't stack
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions:  write
  packages: write

env:
  NODE_VER:   "22"
  APP_VER:    "11.12.0"
  SUPA_URL:   "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_ANON:  "${{ secrets.SUPABASE_ANON_KEY }}"
  SUPA_REF:   "yvjfehnzbzjliizjvuhq"
  SUPA_PAT:   "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
  TWILIO_ACCT:  "${{ secrets.TWILIO_ACCOUNT_SID }}"
  TWILIO_TOKEN: "${{ secrets.TWILIO_AUTH_TOKEN }}"
  TWILIO_SMS:   "${{ secrets.TWILIO_SMS_NUMBER }}"
  TWILIO_WA:    "${{ secrets.TWILIO_WA_NUMBER }}"
  TWILIO_MG:    "${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}"
  TWILIO_VA:    "${{ secrets.TWILIO_VERIFY_SERVICE_SID }}"
  GITHUB_PAT:   "${{ secrets.RELEASE_PAT }}"
  EDGEONE_API_TOKEN: "${{ secrets.EDGEONE_API_TOKEN }}"
  EDGEONE_PROJECT:   "procurbosse"
  EDGEONE_SITE_URL:  "https://procurbosse.edgeone.app"

jobs:

  # ── 1. Web build — runs on every push to main ──────────────────────────────
  web:
    name: "Web Build"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      ver: ${{ steps.meta.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "ver=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }

      - name: Sync lock version
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - run: npm ci --no-audit --legacy-peer-deps

      - name: Write .env
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPA_ANON }}
          VITE_SUPABASE_PROJECT_ID=${{ env.SUPA_REF }}
          VITE_APP_VERSION=${{ env.APP_VER }}
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=${{ env.TWILIO_SMS }}
          VITE_WHATSAPP_NUMBER=${{ env.TWILIO_WA }}
          VITE_TWILIO_MG_SID=${{ env.TWILIO_MG }}
          EOF

      - run: npx tsc --noEmit --skipLibCheck -p tsconfig.app.json 2>&1 | head -30 || true
        continue-on-error: true
        # Informational full dump. NOTE: the root tsconfig.json has an
        # empty "files": [] and only wires up project references, so a
        # bare `npx tsc --noEmit` (no -p) here used to check ZERO files
        # and always exit clean, regardless of real errors in src/ — that
        # silently no-op'd step was the actual reason the 'Filter is not
        # defined' and 'session is not defined' ReferenceErrors reached
        # production on 2026-07-21, not just the continue-on-error/head
        # piping. Pointing at tsconfig.app.json (the config with the real
        # "include": ["src"]) makes this step check real files again.

      - name: Guard - TDZ / hook-ordering check
        run: npm run audit:tdz
        # Hard gate, not continue-on-error: this exact bug class (a useMemo/
        # useCallback referencing a const declared later in the same file)
        # crashed 100% of visits to /users on 2026-07-18. It's a real
        # ReferenceError at render time, not a lint nit, and the check has
        # had zero false positives — safe to block the build on.

      - name: Guard - undefined reference check
        run: npm run audit:refs
        # Hard gate: TS2304/TS2552/TS2593 ("Cannot find name") errors mean
        # an identifier is used but never declared/imported anywhere in
        # scope — a guaranteed runtime ReferenceError if that code path
        # executes, not a strictness nitpick. Caught two real, then-live
        # production bugs the day this check was added: a dropped `Filter`
        # icon import in AdminDatabasePage.tsx (crashed 100% of visits to
        # /admin/database) and a stray `session` reference in
        # AdminPanelPage.tsx (would have crashed the scheduled-forms-email
        # feature the first time anyone used it). Deliberately scoped to
        # only these "identifier does not exist at all" codes, not the
        # rest of the project's TS output — see check-undefined-refs.mjs.

      - name: Guard - schema drift check (informational)
        run: npm run audit:schema
        continue-on-error: true
        # Advisory only: flags insert/update/upsert payload keys that don't
        # match scripts/schema-snapshot.json, but the regex can't tell a
        # top-level column from a key nested inside a jsonb column, so it
        # has known false positives. Read the output in the Actions log
        # rather than gating the build on it. Regenerate the snapshot after
        # schema changes (see comment at the top of check-schema-drift.mjs).

      - name: Build
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - run: "[ -f dist/index.html ] || (echo 'FATAL: Missing dist/index.html' && exit 1)"

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.meta.outputs.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ── 2. Edge functions — runs on every push ─────────────────────────────────
  functions:
    name: "Edge Functions"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Install Supabase CLI
        run: npm install -g supabase --force 2>&1 | tail -5
        # npm install is reliable in CI; the GitHub-release tarball download
        # redirects through release-assets.githubusercontent.com which can be
        # blocked by some network egress policies — npm avoids that entirely.

      - name: Set secrets
        run: |
          supabase secrets set \
            TWILIO_ACCOUNT_SID="${{ env.TWILIO_ACCT }}" \
            TWILIO_AUTH_TOKEN="${{ env.TWILIO_TOKEN }}" \
            TWILIO_PHONE_NUMBER="${{ env.TWILIO_SMS }}" \
            TWILIO_MESSAGING_SERVICE_SID="${{ env.TWILIO_MG }}" \
            TWILIO_VERIFY_SERVICE_SID="${{ env.TWILIO_VA }}" \
            TWILIO_WA_NUMBER="${{ env.TWILIO_WA }}" \
            EDGEONE_API_TOKEN="${{ env.EDGEONE_API_TOKEN }}" \
            --project-ref ${{ env.SUPA_REF }} 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

      - name: Deploy edge functions
        id: fn_deploy
        run: |
          ok=0; fail=0; failed_list=""
          for fn in send-sms send-email send-whatsapp whatsapp-bot whatsapp-webhook \
                    ai-agent verify-role notify-requisition make-call twilio-engine \
                    notify-api google-forms-api github-releases notification-hub edgeone-stats \
                    analyze-document theme-extract; do
            [ -d "supabase/functions/$fn" ] || continue
            echo "→ Deploying $fn"
            if supabase functions deploy $fn --project-ref ${{ env.SUPA_REF }} --no-verify-jwt 2>&1 | tail -5; then
              ok=$((ok+1))
            else
              fail=$((fail+1)); failed_list="$failed_list $fn"
            fi
          done
          echo "deployed_ok=$ok"   >> $GITHUB_OUTPUT
          echo "deployed_fail=$fail" >> $GITHUB_OUTPUT
          echo "failed_list=$failed_list" >> $GITHUB_OUTPUT
          echo ""
          echo "=== Summary: $ok succeeded, $fail failed ==="
          [ -n "$failed_list" ] && echo "::warning::Edge functions failed to deploy:$failed_list"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

      - name: Smoke test
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ env.SUPA_ANON }}" \
            -H "Content-Type: application/json" \
            -d '{"to":"+254116647894","message":"ProcurBosse v11.12.0 deployed.","module":"ci_deploy"}' \
            "${{ env.SUPA_URL }}/functions/v1/send-sms" | python3 -m json.tool || true
        continue-on-error: true

  # ── 3. DB migrations — runs on every push ──────────────────────────────────
  db:
    name: "DB Migrations"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Install Supabase CLI
        run: npm install -g supabase --force 2>&1 | tail -5

      - name: Push migrations
        id: db_push
        run: |
          echo "=== Latest migrations ===" && ls supabase/migrations/ | tail -8
          set +e
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::warning::SUPABASE_DB_PASSWORD secret is not set. 'supabase db push' requires a direct Postgres connection password (separate from SUPABASE_ACCESS_TOKEN, which only authenticates Management API calls like edge function deploys). Add it in Settings → Secrets → Actions, using your project's database password from Supabase Dashboard → Project Settings → Database → Connection string."
            echo "status=no_password" >> $GITHUB_OUTPUT
            exit 0
          fi
          # --include-all: the live DB has baseline tables (profiles, items, etc.)
          # created outside migration tracking (Lovable/dashboard bootstrap before
          # migrations began), so the remote migration history and local files can
          # legitimately diverge on old entries. --include-all pushes any migration
          # not yet recorded as applied, regardless of that historical gap.
          OUTPUT=$(supabase db push --project-ref ${{ env.SUPA_REF }} \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}" \
            --include-all --yes 2>&1)
          CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$CODE" >> $GITHUB_OUTPUT
          if echo "$OUTPUT" | grep -qi "Remote database is up to date\|No migrations\|migration history is clean"; then
            echo "status=up_to_date" >> $GITHUB_OUTPUT
          elif [ $CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
          exit 0
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"

      - name: Migration push summary
        run: |
          case "${{ steps.db_push.outputs.status }}" in
            success)    echo "✅ supabase db push applied new migrations successfully (exit ${{ steps.db_push.outputs.exit_code }})" ;;
            up_to_date) echo "✅ Remote database already up to date — nothing new to push" ;;
            no_password) echo "⏭️  Skipped — SUPABASE_DB_PASSWORD secret not configured (see warning above)" ;;
            *)          echo "::warning::supabase db push reported a non-zero exit (${{ steps.db_push.outputs.exit_code }}). Check the 'Push migrations' step output above for the specific failing statement and migration file." ;;
          esac
        continue-on-error: true

  # ── 4. EdgeOne CDN deploy — runs on every push ─────────────────────────────
  edgeone:
    name: "EdgeOne CDN Deploy"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - run: "[ -f dist/index.html ] || (echo 'FATAL: Missing index.html' && exit 1)"

      - name: Install EdgeOne CLI
        run: npm install -g edgeone --prefer-online 2>&1 | tail -3 || true

      - name: Deploy to EdgeOne Pages
        id: eo_deploy
        run: |
          npx edgeone pages deploy dist/ \
            -n "${{ env.EDGEONE_PROJECT }}" \
            -t "${{ env.EDGEONE_API_TOKEN }}" \
            -e production 2>&1
          echo "deploy_exit=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Wait + health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.EDGEONE_SITE_URL }}" || echo "000")
          echo "HTTP $STATUS — ${{ env.EDGEONE_SITE_URL }}"
          [ "$STATUS" = "200" ] && echo "✅ Site healthy" || echo "⚠️ HTTP $STATUS"
        continue-on-error: true

      - name: Summary
        run: |
          echo "SHA=${{ needs.web.outputs.sha }} VER=${{ needs.web.outputs.ver }}"
          echo "Deploy exit=${{ steps.eo_deploy.outputs.deploy_exit }}"

  # ── 5. Windows EXE — only on tags OR explicit workflow_dispatch ────────────
  exe:
    name: "Windows EXE"
    runs-on: windows-latest
    needs: web
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_exe == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - name: Sync lock version
        shell: bash
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - run: npm ci --no-audit --legacy-peer-deps

      - name: Install electron-packager
        shell: bash
        run: npm install --no-save @electron/packager --legacy-peer-deps

      - name: Prepare electron assets
        shell: bash
        run: |
          mkdir -p electron build dist-electron
          cat > electron/main.js << 'MAINEOF'
          const{app,BrowserWindow,ipcMain,shell}=require("electron");
          const path=require("path");
          app.disableHardwareAcceleration();
          let win;
          function create(){
            win=new BrowserWindow({
              width:1440,height:900,minWidth:1024,minHeight:700,
              title:"ProcurBosse v11.12.0 - EL5 MediProcure",
              backgroundColor:"#f8fafc",show:false,
              webPreferences:{nodeIntegration:false,contextIsolation:true,
                preload:path.join(__dirname,"preload.js")}});
            win.loadFile(path.join(__dirname,"..","dist","index.html"))
              .catch(()=>win.loadURL("https://procurbosse.edgeone.app"));
            win.once("ready-to-show",()=>{win.show();win.maximize();});
            win.on("closed",()=>{win=null;});
            win.webContents.setWindowOpenHandler(({url})=>{
              shell.openExternal(url);return{action:"deny"};});
          }
          app.whenReady().then(create);
          app.on("window-all-closed",()=>{if(process.platform!=="darwin")app.quit();});
          ipcMain.handle("app-version",()=>app.getVersion());
          MAINEOF
          cat > electron/preload.js << 'PREEOF'
          const{contextBridge,ipcRenderer}=require("electron");
          contextBridge.exposeInMainWorld("electronAPI",{
            getVersion:()=>ipcRenderer.invoke("app-version"),
            platform:process.platform
          });
          PREEOF
          node -e "const b=Buffer.alloc(1406);b.writeUInt16LE(0,0);b.writeUInt16LE(1,2);b.writeUInt16LE(1,4);require('fs').writeFileSync('build/icon.ico',b);"

      - name: Package x64 + ia32
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          COMMON="--platform=win32 --out=dist-electron --app-version=$VER --overwrite --prune --no-asar"
          IGNORE='--ignore=\.github --ignore=supabase --ignore=^/src --ignore=^/web --ignore=android --ignore=ios --ignore=test --ignore=docs'
          npx electron-packager . "ProcurBosse" $COMMON --arch=x64  $IGNORE 2>&1 | tail -10
          npx electron-packager . "ProcurBosse" $COMMON --arch=ia32 $IGNORE 2>&1 | tail -10
          find dist-electron -name "ProcurBosse.exe" 2>/dev/null | head -5 || true
        continue-on-error: true

      - name: Zip archives
        shell: pwsh
        run: |
          $VER = (node -p "require('./package.json').version")
          foreach ($dir in (Get-ChildItem dist-electron -Directory -ErrorAction SilentlyContinue)) {
            $arch = if ($dir.Name -match "ia32") { "ia32" } else { "x64" }
            $zip  = "dist-electron\ProcurBosse-v$VER-win-$arch.zip"
            Compress-Archive -Path "$($dir.FullName)\*" -DestinationPath $zip -Force
            Write-Host "Created $zip ($([math]::Round((Get-Item $zip).Length/1MB,1)) MB)"
          }
          Set-Content -Path "dist-electron\launch.bat" -Encoding ASCII -Value "@echo off`r`nstart `"`" `"https://procurbosse.edgeone.app`""
        continue-on-error: true

      - name: Checksums
        shell: pwsh
        run: |
          $sums = Get-ChildItem dist-electron -Recurse -Include "*.exe","*.zip" |
            ForEach-Object { "$($(Get-FileHash $_.FullName -Algorithm SHA256).Hash)  $($_.Name)" }
          ($sums -join "`n") | Out-File -Encoding ASCII "dist-electron\SHA256SUMS.txt"
          Get-Content "dist-electron\SHA256SUMS.txt"
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: exe-${{ needs.web.outputs.sha }}
          path: |
            dist-electron/*.zip
            dist-electron/*.bat
            dist-electron/*.txt
          retention-days: 14
          if-no-files-found: warn

  # ── 6. GitHub Release — only on tags OR explicit dispatch ──────────────────
  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [web, functions, db, edgeone]
    if: |
      always() &&
      needs.web.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
      )
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Verify release version
        run: |
          VER="${{ needs.web.outputs.ver }}"
          if ! [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::package.json version '$VER' is not valid semver (X.Y.Z) — bump the version before releasing."
            exit 1
          fi
          if git rev-parse "v$VER" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n1 "v$VER")
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "::error::Tag v$VER already points to a different commit ($TAG_SHA). Bump the version in package.json before publishing a new release."
              exit 1
            fi
            echo "Tag v$VER already exists and matches HEAD — re-publishing the same release."
          else
            echo "Tag v$VER is new — proceeding."
          fi

      - uses: actions/download-artifact@v4
        with:
          name: "web-dist-${{ needs.web.outputs.sha }}"
          path: release-web/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: "exe-${{ needs.web.outputs.sha }}"
          path: release-exe/
        continue-on-error: true

      - name: Package web zip
        run: |
          if [ -d release-web ]; then
            cd release-web && zip -r ../ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip . && cd ..
            echo "Web zip: $(du -h ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip | cut -f1)"
          fi
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   "v${{ needs.web.outputs.ver }}"
          name:       "ProcurBosse v${{ needs.web.outputs.ver }}"
          draft:      false
          prerelease: false
          token:      ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          make_latest: true
          body: |
            # ProcurBosse v${{ needs.web.outputs.ver }}
            **EL5 MediProcure · Embu Level 5 Hospital · Embu County · Kenya**

            🌐 Live: https://procurbosse.edgeone.app
            📦 Commit: `${{ needs.web.outputs.sha }}`

            ## Downloads
            | File | Description |
            |---|---|
            | `ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip` | Web build |
            | `ProcurBosse-v${{ needs.web.outputs.ver }}-win-x64.zip` | Windows 64-bit |
            | `ProcurBosse-v${{ needs.web.outputs.ver }}-win-ia32.zip` | Windows 32-bit |
            | `SHA256SUMS.txt` | Checksums |

            ## Demo login
            URL: https://procurbosse.edgeone.app
            Email: `samwise@gmail.com` · Password: `samwise@gmail.com`
          files: |
            ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip
            release-exe/*.zip
            release-exe/*.bat
            release-exe/*.txt
        continue-on-error: true
