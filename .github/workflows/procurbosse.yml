name: "ProcurBosse v11.0 — Build & Release"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_exe:
        description: "Skip EXE build"
        default: "false"
        type: boolean
      skip_release:
        description: "Skip release"
        default: "false"
        type: boolean

permissions:
  contents: write
  actions: write
  packages: write

env:
  NODE_VER:     "20"
  APP_VER:      "11.0.0"
  SUPA_URL:     "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_ANON:    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
  SUPA_REF:     "yvjfehnzbzjliizjvuhq"
  SUPA_PAT:     "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
  TWILIO_ACCT:  "REDACTED_TWILIO_ACCOUNT_SID"
  TWILIO_TOKEN: "REDACTED_TWILIO_AUTH_TOKEN"
  TWILIO_SMS:   "+16812972643"
  TWILIO_WA:    "+14155238886"
  TWILIO_MG:    "REDACTED_TWILIO_MESSAGING_SID"
  TWILIO_VA:    "REDACTED_TWILIO_VERIFY_SID"
  GITHUB_PAT:   "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"

jobs:

  web:
    name: "Web Build — Vite"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      ver: ${{ steps.meta.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER=$(node -p "require('./package.json').version")
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Sync lock version
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - name: Install
        run: npm ci --no-audit --legacy-peer-deps

      - name: Write .env
        run: |
          cat > .env << ENVEOF
          VITE_SUPABASE_URL=${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPA_ANON }}
          VITE_SUPABASE_PROJECT_ID=${{ env.SUPA_REF }}
          VITE_APP_VERSION=${{ env.APP_VER }}
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=${{ env.TWILIO_SMS }}
          VITE_WHATSAPP_NUMBER=${{ env.TWILIO_WA }}
          VITE_TWILIO_MG_SID=${{ env.TWILIO_MG }}
          ENVEOF

      - run: npx tsc --noEmit --skipLibCheck 2>&1 | head -30 || true
        continue-on-error: true

      - name: Build web (dist)
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - run: "[ -f dist/index.html ] || (echo 'FATAL: Missing dist/index.html' && exit 1)"

      - name: Build web (EdgeOne /web dir)
        run: npx vite build --outDir web
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.meta.outputs.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  exe:
    name: "Windows EXE — Electron"
    runs-on: windows-latest
    needs: web
    if: github.event.inputs.skip_exe != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - name: Sync lock version
        shell: bash
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - name: Install deps
        run: npm ci --no-audit --legacy-peer-deps

      - name: Install electron + packager
        shell: bash
        run: npm install --no-save @electron/packager --legacy-peer-deps

      - name: Prepare electron assets
        shell: bash
        run: |
          mkdir -p electron build dist-electron
          cat > electron/main.js << 'MAINJS'
          const{app,BrowserWindow,ipcMain,shell}=require("electron");
          const path=require("path");
          app.disableHardwareAcceleration();
          let win;
          function create(){
            win=new BrowserWindow({
              width:1440,height:900,minWidth:1024,minHeight:700,
              title:"ProcurBosse v11.0.0 - EL5 MediProcure",
              backgroundColor:"#f8fafc",show:false,
              webPreferences:{nodeIntegration:false,contextIsolation:true,
                preload:path.join(__dirname,"preload.js")}});
            win.loadFile(path.join(__dirname,"..","dist","index.html"))
              .catch(()=>win.loadURL("https://procurbosse.edgeone.app"));
            win.once("ready-to-show",()=>{win.show();win.maximize();});
            win.on("closed",()=>{win=null;});
            win.webContents.setWindowOpenHandler(({url})=>{
              shell.openExternal(url);return{action:"deny"};});
          }
          app.whenReady().then(create);
          app.on("window-all-closed",()=>{if(process.platform!=="darwin")app.quit();});
          ipcMain.handle("app-version",()=>app.getVersion());
          MAINJS
          cat > electron/preload.js << 'PREJS'
          const{contextBridge,ipcRenderer}=require("electron");
          contextBridge.exposeInMainWorld("electronAPI",{
            getVersion:()=>ipcRenderer.invoke("app-version"),
            platform:process.platform
          });
          PREJS
          node -e "const b=Buffer.alloc(1406);b.writeUInt16LE(0,0);b.writeUInt16LE(1,2);b.writeUInt16LE(1,4);require('fs').writeFileSync('build/icon.ico',b);"

      - name: Package x64 + ia32
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          COMMON="--platform=win32 --out=dist-electron --app-version=$VER --overwrite --prune --no-asar"
          IGNORE='--ignore=\.github --ignore=supabase --ignore=^/src --ignore=^/web --ignore=kiosk-app --ignore=admin-app --ignore=test --ignore=e2e --ignore=docs'
          
          echo "=== Building x64 ==="
          npx electron-packager . "ProcurBosse" $COMMON --arch=x64 $IGNORE 2>&1 | tail -20
          echo "x64 exit: $?"
          
          echo "=== Building ia32 ==="
          npx electron-packager . "ProcurBosse" $COMMON --arch=ia32 $IGNORE 2>&1 | tail -20
          echo "ia32 exit: $?"
          
          echo "=== dist-electron contents ==="
          ls -la dist-electron/ 2>/dev/null || echo "MISSING dist-electron"
          find dist-electron -name "ProcurBosse.exe" 2>/dev/null | head -5
        continue-on-error: true

      - name: Zip portable archives
        shell: pwsh
        run: |
          $VER = (node -p "require('./package.json').version")
          $out = "dist-electron"
          New-Item -Force -ItemType Directory -Path $out | Out-Null
          Write-Host "=== dist-electron dirs ==="
          Get-ChildItem $out -Directory | ForEach-Object { Write-Host $_.FullName }
          foreach ($dir in (Get-ChildItem $out -Directory)) {
            $arch = if ($dir.Name -match "ia32") { "ia32" } else { "x64" }
            $zip  = Join-Path $out "ProcurBosse-v$VER-win-$arch.zip"
            Compress-Archive -Path (Join-Path $dir.FullName "*") -DestinationPath $zip -Force
            $mb = [math]::Round((Get-Item $zip).Length / 1MB, 1)
            Write-Host "Created: $zip ($mb MB)"
          }
        continue-on-error: true

      - name: Create .bat launchers
        shell: pwsh
        run: |
          $out = "dist-electron"
          New-Item -Force -ItemType Directory -Path $out | Out-Null

          Set-Content -Path "$out\launch.bat" -Encoding ASCII -Value (@'
          @echo off
          title EL5 MediProcure v11.0.0 - ProcurBosse
          echo.
          echo   ProcurBosse v11.0.0 - EL5 MediProcure
          echo   Embu Level 5 Hospital
          echo.
          echo   [1] Run x64 (64-bit)
          echo   [2] Run ia32 (32-bit)
          echo   [3] Open Web App
          echo   [4] Exit
          echo.
          set /p c="Choice (1-4): "
          if "%c%"=="1" for /r "%~dp0" %%e in (ProcurBosse-win32-x64\ProcurBosse.exe) do start "" "%%e"
          if "%c%"=="2" for /r "%~dp0" %%e in (ProcurBosse-win32-ia32\ProcurBosse.exe) do start "" "%%e"
          if "%c%"=="3" start "" "https://procurbosse.edgeone.app"
          '@)

          Set-Content -Path "$out\open-web.bat" -Encoding ASCII -Value (@'
          @echo off
          start "" "https://procurbosse.edgeone.app"
          '@)

          Set-Content -Path "$out\run-x64.bat" -Encoding ASCII -Value (@'
          @echo off
          for /r "%~dp0" %%e in (ProcurBosse-win32-x64\ProcurBosse.exe) do start "" "%%e"
          '@)

          Set-Content -Path "$out\run-ia32.bat" -Encoding ASCII -Value (@'
          @echo off
          for /r "%~dp0" %%e in (ProcurBosse-win32-ia32\ProcurBosse.exe) do start "" "%%e"
          '@)

          Write-Host "=== Bat files created ==="
          Get-ChildItem $out -Filter "*.bat"

      - name: Checksums
        shell: pwsh
        run: |
          $out = "dist-electron"
          $sums = @()
          Get-ChildItem $out -Recurse -Include "*.exe","*.zip" | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            $sums += "$h  $($_.Name)"
          }
          if ($sums.Count -gt 0) {
            $sums | Out-File -Encoding ASCII "$out\SHA256SUMS.txt"
          } else {
            "No binaries produced" | Out-File -Encoding ASCII "$out\SHA256SUMS.txt"
          }
          Get-Content "$out\SHA256SUMS.txt"
          Write-Host "=== Final dist-electron ==="
          Get-ChildItem $out | Select-Object Name, @{N="Size";E={[math]::Round($_.Length/1KB)+"KB"}} | Format-Table

      - uses: actions/upload-artifact@v4
        with:
          name: exe-${{ needs.web.outputs.sha }}
          path: |
            dist-electron/*.zip
            dist-electron/*.bat
            dist-electron/*.txt
          retention-days: 7
          if-no-files-found: warn

  functions:
    name: "Edge Functions + Secrets"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase 2>/dev/null || \
          npm install -g supabase --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true

      - name: Set secrets
        run: |
          supabase secrets set \
            TWILIO_ACCOUNT_SID="${{ env.TWILIO_ACCT }}" \
            TWILIO_AUTH_TOKEN="${{ env.TWILIO_TOKEN }}" \
            TWILIO_PHONE_NUMBER="${{ env.TWILIO_SMS }}" \
            TWILIO_MESSAGING_SERVICE_SID="${{ env.TWILIO_MG }}" \
            TWILIO_VERIFY_SERVICE_SID="${{ env.TWILIO_VA }}" \
            TWILIO_WA_NUMBER="${{ env.TWILIO_WA }}" \
            --project-ref ${{ env.SUPA_REF }} 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

      - name: Deploy edge functions
        run: |
          for fn in send-sms send-email send-whatsapp whatsapp-bot whatsapp-webhook ai-agent verify-role notify-requisition make-call twilio-engine notify-api; do
            [ -d "supabase/functions/$fn" ] || continue
            echo "Deploying $fn..."
            supabase functions deploy $fn \
              --project-ref ${{ env.SUPA_REF }} \
              --no-verify-jwt 2>&1 || echo "warn: $fn deploy attempted"
          done
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

      - name: Smoke test SMS
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ env.SUPA_ANON }}" \
            -H "Content-Type: application/json" \
            -d '{"to":"+254116647894","message":"ProcurBosse v11.0.0 deployed. WhatsApp Hub live.","module":"ci_deploy"}' \
            "${{ env.SUPA_URL }}/functions/v1/send-sms" | python3 -m json.tool || true
        continue-on-error: true

  db:
    name: "DB Migrations"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase 2>/dev/null || \
          npm install -g supabase --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true
      - run: |
          echo "=== Latest migrations ===" && ls supabase/migrations/ | tail -10
          supabase db push --project-ref ${{ env.SUPA_REF }} 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

  release:
    name: "Release v11.0.0"
    runs-on: ubuntu-latest
    needs: [web, exe, functions, db]
    if: always() && needs.web.result == 'success' && github.event.inputs.skip_release != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: "web-dist-${{ needs.web.outputs.sha }}"
          path: release-web/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: "exe-${{ needs.web.outputs.sha }}"
          path: release-exe/
        continue-on-error: true

      - name: Package web zip
        run: |
          if [ -d release-web ]; then
            cd release-web && zip -r ../ProcurBosse-v11.0.0-Web.zip . && cd ..
          fi
        continue-on-error: true

      - name: List release artifacts
        run: |
          echo "=== Web ===" && ls -lh release-web/ 2>/dev/null || echo "(none)"
          echo "=== EXE ===" && ls -lh release-exe/ 2>/dev/null || echo "(none)"
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v11.0.0"
          name: "ProcurBosse v11.0.0 — WhatsApp Pro"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            # ProcurBosse v11.0.0 — WhatsApp Pro
            **Embu Level 5 Hospital · Embu County Government · Kenya**

            ## WhatsApp Business Workflow Hub (NEW)
            8-tab full integration: Sessions · Compose · Broadcast · Templates · Approvals · Workflows · History · Settings

            Reply-based approvals: text **APPROVE** or **REJECT reason** on WhatsApp to update ERP status automatically.

            Webhook: `https://yvjfehnzbzjliizjvuhq.supabase.co/functions/v1/whatsapp-webhook`
            Join sandbox: send `join bad-machine` to `+1 415 523 8886`

            ## Downloads
            | File | Description |
            |---|---|
            | `ProcurBosse-v11.0.0-Web.zip` | Web build |
            | `ProcurBosse-v11.0.0-win-x64.zip` | Windows 64-bit portable |
            | `ProcurBosse-v11.0.0-win-ia32.zip` | Windows 32-bit portable |
            | `launch.bat` | Interactive launcher menu |
            | `run-x64.bat` | Run x64 directly |
            | `run-ia32.bat` | Run ia32 directly |
            | `open-web.bat` | Open web app |
            | `SHA256SUMS.txt` | Integrity checksums |

            ## Login
            URL: https://procurbosse.edgeone.app  
            Email: `samwise@gmail.com` · Password: `samwise@gmail.com`
          files: |
            ProcurBosse-v11.0.0-Web.zip
            release-exe/*.zip
            release-exe/*.bat
            release-exe/*.txt
        continue-on-error: true
