name: "ProcurBosse — Build, Deploy & Release"

on:
  push:
    branches: [main]
    tags:     ["v*"]
  workflow_dispatch:
    inputs:
      build_exe:
        description: "Build Windows EXE"
        default: "false"
        type: boolean
      publish_release:
        description: "Publish GitHub Release"
        default: "false"
        type: boolean

# Cancel any in-progress run for the same branch/ref so pushes don't stack
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions:  write
  packages: write

env:
  NODE_VER:   "22"
  APP_VER:    "11.12.0"
  SUPA_URL:   "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_ANON:  "${{ secrets.SUPABASE_ANON_KEY }}"
  SUPA_REF:   "yvjfehnzbzjliizjvuhq"
  SUPA_PAT:   "${{ secrets.SUPABASE_ACCESS_TOKEN }}"
  TWILIO_ACCT:  "REDACTED_TWILIO_ACCOUNT_SID"
  TWILIO_TOKEN: "REDACTED_TWILIO_AUTH_TOKEN"
  TWILIO_SMS:   "+16812972643"
  TWILIO_WA:    "+14155238886"
  TWILIO_MG:    "REDACTED_TWILIO_MESSAGING_SID"
  TWILIO_VA:    "REDACTED_TWILIO_VERIFY_SID"
  GITHUB_PAT:   "${{ secrets.RELEASE_PAT }}"
  EDGEONE_API_TOKEN: "REDACTED_EDGEONE_TOKEN"
  EDGEONE_PROJECT:   "procurbosse"
  EDGEONE_SITE_URL:  "https://procurbosse.edgeone.app"

jobs:

  # ── 1. Web build — runs on every push to main ──────────────────────────────
  web:
    name: "Web Build"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      ver: ${{ steps.meta.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "ver=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }

      - name: Sync lock version
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - run: npm ci --no-audit --legacy-peer-deps

      - name: Write .env
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPA_ANON }}
          VITE_SUPABASE_PROJECT_ID=${{ env.SUPA_REF }}
          VITE_APP_VERSION=${{ env.APP_VER }}
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=${{ env.TWILIO_SMS }}
          VITE_WHATSAPP_NUMBER=${{ env.TWILIO_WA }}
          VITE_TWILIO_MG_SID=${{ env.TWILIO_MG }}
          EOF

      - run: npx tsc --noEmit --skipLibCheck 2>&1 | head -30 || true
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - run: "[ -f dist/index.html ] || (echo 'FATAL: Missing dist/index.html' && exit 1)"

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.meta.outputs.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ── 2. Edge functions — runs on every push ─────────────────────────────────
  functions:
    name: "Edge Functions"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase 2>/dev/null || true
        continue-on-error: true

      - name: Set secrets
        run: |
          supabase secrets set \
            TWILIO_ACCOUNT_SID="${{ env.TWILIO_ACCT }}" \
            TWILIO_AUTH_TOKEN="${{ env.TWILIO_TOKEN }}" \
            TWILIO_PHONE_NUMBER="${{ env.TWILIO_SMS }}" \
            TWILIO_MESSAGING_SERVICE_SID="${{ env.TWILIO_MG }}" \
            TWILIO_VERIFY_SERVICE_SID="${{ env.TWILIO_VA }}" \
            TWILIO_WA_NUMBER="${{ env.TWILIO_WA }}" \
            EDGEONE_API_TOKEN="${{ env.EDGEONE_API_TOKEN }}" \
            --project-ref ${{ env.SUPA_REF }} 2>&1 || true
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

      - name: Deploy edge functions
        run: |
          for fn in send-sms send-email send-whatsapp whatsapp-bot whatsapp-webhook \
                    ai-agent verify-role notify-requisition make-call twilio-engine \
                    notify-api google-forms-api github-releases notification-hub edgeone-stats; do
            [ -d "supabase/functions/$fn" ] || continue
            echo "→ Deploying $fn"
            supabase functions deploy $fn \
              --project-ref ${{ env.SUPA_REF }} \
              --no-verify-jwt 2>&1 | tail -3 || echo "  warn: $fn deploy attempted"
          done
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

      - name: Smoke test
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ env.SUPA_ANON }}" \
            -H "Content-Type: application/json" \
            -d '{"to":"+254116647894","message":"ProcurBosse v11.12.0 deployed.","module":"ci_deploy"}' \
            "${{ env.SUPA_URL }}/functions/v1/send-sms" | python3 -m json.tool || true
        continue-on-error: true

  # ── 3. DB migrations — runs on every push ──────────────────────────────────
  db:
    name: "DB Migrations"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase 2>/dev/null || true
        continue-on-error: true

      - name: Push migrations
        run: |
          echo "=== Latest migrations ===" && ls supabase/migrations/ | tail -5
          supabase db push --project-ref ${{ env.SUPA_REF }} 2>&1 | tail -20 || true
        env:
          SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}"
        continue-on-error: true

  # ── 4. EdgeOne CDN deploy — runs on every push ─────────────────────────────
  edgeone:
    name: "EdgeOne CDN Deploy"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - run: "[ -f dist/index.html ] || (echo 'FATAL: Missing index.html' && exit 1)"

      - name: Install EdgeOne CLI
        run: npm install -g edgeone --prefer-online 2>&1 | tail -3 || true

      - name: Deploy to EdgeOne Pages
        id: eo_deploy
        run: |
          npx edgeone pages deploy dist/ \
            -n "${{ env.EDGEONE_PROJECT }}" \
            -t "${{ env.EDGEONE_API_TOKEN }}" \
            -e production 2>&1
          echo "deploy_exit=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Wait + health check
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.EDGEONE_SITE_URL }}" || echo "000")
          echo "HTTP $STATUS — ${{ env.EDGEONE_SITE_URL }}"
          [ "$STATUS" = "200" ] && echo "✅ Site healthy" || echo "⚠️ HTTP $STATUS"
        continue-on-error: true

      - name: Summary
        run: |
          echo "SHA=${{ needs.web.outputs.sha }} VER=${{ needs.web.outputs.ver }}"
          echo "Deploy exit=${{ steps.eo_deploy.outputs.deploy_exit }}"

  # ── 5. Windows EXE — only on tags OR explicit workflow_dispatch ────────────
  exe:
    name: "Windows EXE"
    runs-on: windows-latest
    needs: web
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_exe == 'true')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm }

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - name: Sync lock version
        shell: bash
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - run: npm ci --no-audit --legacy-peer-deps

      - name: Install electron-packager
        shell: bash
        run: npm install --no-save @electron/packager --legacy-peer-deps

      - name: Prepare electron assets
        shell: bash
        run: |
          mkdir -p electron build dist-electron
          cat > electron/main.js << 'MAINEOF'
          const{app,BrowserWindow,ipcMain,shell}=require("electron");
          const path=require("path");
          app.disableHardwareAcceleration();
          let win;
          function create(){
            win=new BrowserWindow({
              width:1440,height:900,minWidth:1024,minHeight:700,
              title:"ProcurBosse v11.12.0 - EL5 MediProcure",
              backgroundColor:"#f8fafc",show:false,
              webPreferences:{nodeIntegration:false,contextIsolation:true,
                preload:path.join(__dirname,"preload.js")}});
            win.loadFile(path.join(__dirname,"..","dist","index.html"))
              .catch(()=>win.loadURL("https://procurbosse.edgeone.app"));
            win.once("ready-to-show",()=>{win.show();win.maximize();});
            win.on("closed",()=>{win=null;});
            win.webContents.setWindowOpenHandler(({url})=>{
              shell.openExternal(url);return{action:"deny"};});
          }
          app.whenReady().then(create);
          app.on("window-all-closed",()=>{if(process.platform!=="darwin")app.quit();});
          ipcMain.handle("app-version",()=>app.getVersion());
          MAINEOF
          cat > electron/preload.js << 'PREEOF'
          const{contextBridge,ipcRenderer}=require("electron");
          contextBridge.exposeInMainWorld("electronAPI",{
            getVersion:()=>ipcRenderer.invoke("app-version"),
            platform:process.platform
          });
          PREEOF
          node -e "const b=Buffer.alloc(1406);b.writeUInt16LE(0,0);b.writeUInt16LE(1,2);b.writeUInt16LE(1,4);require('fs').writeFileSync('build/icon.ico',b);"

      - name: Package x64 + ia32
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          COMMON="--platform=win32 --out=dist-electron --app-version=$VER --overwrite --prune --no-asar"
          IGNORE='--ignore=\.github --ignore=supabase --ignore=^/src --ignore=^/web --ignore=android --ignore=ios --ignore=test --ignore=docs'
          npx electron-packager . "ProcurBosse" $COMMON --arch=x64  $IGNORE 2>&1 | tail -10
          npx electron-packager . "ProcurBosse" $COMMON --arch=ia32 $IGNORE 2>&1 | tail -10
          find dist-electron -name "ProcurBosse.exe" 2>/dev/null | head -5 || true
        continue-on-error: true

      - name: Zip archives
        shell: pwsh
        run: |
          $VER = (node -p "require('./package.json').version")
          foreach ($dir in (Get-ChildItem dist-electron -Directory -ErrorAction SilentlyContinue)) {
            $arch = if ($dir.Name -match "ia32") { "ia32" } else { "x64" }
            $zip  = "dist-electron\ProcurBosse-v$VER-win-$arch.zip"
            Compress-Archive -Path "$($dir.FullName)\*" -DestinationPath $zip -Force
            Write-Host "Created $zip ($([math]::Round((Get-Item $zip).Length/1MB,1)) MB)"
          }
          Set-Content -Path "dist-electron\launch.bat" -Encoding ASCII -Value "@echo off`r`nstart `"`" `"https://procurbosse.edgeone.app`""
        continue-on-error: true

      - name: Checksums
        shell: pwsh
        run: |
          $sums = Get-ChildItem dist-electron -Recurse -Include "*.exe","*.zip" |
            ForEach-Object { "$($(Get-FileHash $_.FullName -Algorithm SHA256).Hash)  $($_.Name)" }
          ($sums -join "`n") | Out-File -Encoding ASCII "dist-electron\SHA256SUMS.txt"
          Get-Content "dist-electron\SHA256SUMS.txt"
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: exe-${{ needs.web.outputs.sha }}
          path: |
            dist-electron/*.zip
            dist-electron/*.bat
            dist-electron/*.txt
          retention-days: 14
          if-no-files-found: warn

  # ── 6. GitHub Release — only on tags OR explicit dispatch ──────────────────
  release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: [web, functions, db, edgeone]
    if: |
      always() &&
      needs.web.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: "web-dist-${{ needs.web.outputs.sha }}"
          path: release-web/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: "exe-${{ needs.web.outputs.sha }}"
          path: release-exe/
        continue-on-error: true

      - name: Package web zip
        run: |
          if [ -d release-web ]; then
            cd release-web && zip -r ../ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip . && cd ..
            echo "Web zip: $(du -h ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip | cut -f1)"
          fi
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   "v${{ needs.web.outputs.ver }}"
          name:       "ProcurBosse v${{ needs.web.outputs.ver }}"
          draft:      false
          prerelease: false
          token:      ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          make_latest: true
          body: |
            # ProcurBosse v${{ needs.web.outputs.ver }}
            **EL5 MediProcure · Embu Level 5 Hospital · Embu County · Kenya**

            🌐 Live: https://procurbosse.edgeone.app
            📦 Commit: `${{ needs.web.outputs.sha }}`

            ## Downloads
            | File | Description |
            |---|---|
            | `ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip` | Web build |
            | `ProcurBosse-v${{ needs.web.outputs.ver }}-win-x64.zip` | Windows 64-bit |
            | `ProcurBosse-v${{ needs.web.outputs.ver }}-win-ia32.zip` | Windows 32-bit |
            | `SHA256SUMS.txt` | Checksums |

            ## Demo login
            URL: https://procurbosse.edgeone.app
            Email: `samwise@gmail.com` · Password: `samwise@gmail.com`
          files: |
            ProcurBosse-v${{ needs.web.outputs.ver }}-Web.zip
            release-exe/*.zip
            release-exe/*.bat
            release-exe/*.txt
        continue-on-error: true
