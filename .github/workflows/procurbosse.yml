name: "🏥 ProcurBosse v11.0 — Build & Release"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_exe: { description: "Skip EXE build", default: "false", type: boolean }
      skip_release: { description: "Skip release", default: "false", type: boolean }

permissions:
  contents: write
  actions: write
  packages: write

env:
  NODE_VER:     "20"
  APP_VER:      "11.0.0"
  SUPA_URL:     "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_ANON:    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
  SUPA_REF:     "yvjfehnzbzjliizjvuhq"
  SUPA_PAT:     "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
  TWILIO_ACCT:  "REDACTED_TWILIO_ACCOUNT_SID"
  TWILIO_TOKEN: "REDACTED_TWILIO_AUTH_TOKEN"
  TWILIO_SMS:   "+16812972643"
  TWILIO_WA:    "+14155238886"
  TWILIO_MG:    "REDACTED_TWILIO_MESSAGING_SID"
  TWILIO_VA:    "REDACTED_TWILIO_VERIFY_SID"
  GITHUB_PAT:   "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"

jobs:
  # ─────────────────────────────────────────────────────────────────
  web:
    name: "🌐 Web Build — Vite"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      ver: ${{ steps.meta.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER=$(node -p "require('./package.json').version")
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "::notice::ProcurBosse v$VER — $SHA"

      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }

      - name: "🔧 Sync lock version"
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - name: "📦 Install"
        run: npm ci --no-audit --legacy-peer-deps

      - name: "⚙️ Write .env"
        run: |
          cat > .env << ENVEOF
          VITE_SUPABASE_URL=${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPA_ANON }}
          VITE_SUPABASE_PROJECT_ID=${{ env.SUPA_REF }}
          VITE_APP_VERSION=${{ env.APP_VER }}
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=${{ env.TWILIO_SMS }}
          VITE_WHATSAPP_NUMBER=${{ env.TWILIO_WA }}
          VITE_TWILIO_MG_SID=${{ env.TWILIO_MG }}
          ENVEOF

      - run: npx tsc --noEmit --skipLibCheck 2>&1 | head -30 || true
        continue-on-error: true

      - name: "🏗️ Build web"
        run: npm run build
        env: { CI: "false", NODE_OPTIONS: "--max-old-space-size=4096" }

      - run: "[ -f dist/index.html ] || (echo 'FATAL: Missing dist/index.html' && exit 1)"

      - name: "🏗️ Build web → /web (EdgeOne)"
        run: npx vite build --outDir web
        env: { CI: "false", NODE_OPTIONS: "--max-old-space-size=4096" }
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.meta.outputs.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  exe:
    name: "💻 Windows EXE — Electron (x64 + ia32)"
    runs-on: windows-latest
    needs: web
    if: github.event.inputs.skip_exe != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - name: "🔧 Sync lock version"
        shell: bash
        run: |
          P=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const l=JSON.parse(fs.readFileSync('package-lock.json'));l.version='$P';if(l.packages&&l.packages[''])l.packages[''].version='$P';fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));"

      - name: "📦 Install all deps"
        run: npm ci --no-audit --legacy-peer-deps

      - name: "📦 Install electron + builder fresh"
        run: npm install --no-save electron@latest electron-builder@latest --legacy-peer-deps

      - name: "🔧 Ensure electron assets exist"
        shell: bash
        run: |
          mkdir -p electron build public
          # Ensure main.js has correct version reference
          if [ -f electron/main.js ]; then
            sed -i "s/ProcurBosse v[0-9.]*/ProcurBosse v11.0.0/g" electron/main.js || true
          else
            cat > electron/main.js << 'MJS'
          const{app,BrowserWindow,ipcMain,shell,Menu}=require('electron');
          const path=require('path'),fs=require('fs'),os=require('os');
          app.disableHardwareAcceleration();
          app.commandLine.appendSwitch('disable-gpu');
          app.commandLine.appendSwitch('use-gl','swiftshader');
          let win;
          function create(){
            win=new BrowserWindow({width:1440,height:900,minWidth:1024,minHeight:700,
              title:'ProcurBosse v11.0.0 — EL5 MediProcure',
              webPreferences:{nodeIntegration:false,contextIsolation:true,
                preload:path.join(__dirname,'preload.js')},
              show:false,backgroundColor:'#f8fafc'});
            const distPath=path.join(__dirname,'../dist/index.html');
            const resPath=path.join(process.resourcesPath||'','app','index.html');
            const loadFile=fs.existsSync(resPath)?resPath:distPath;
            win.loadFile(loadFile).catch(()=>{
              win.loadURL('https://procurbosse.edgeone.app');
            });
            win.once('ready-to-show',()=>{win.show();win.maximize();});
            win.on('closed',()=>{win=null;});
            win.webContents.setWindowOpenHandler(({url})=>{shell.openExternal(url);return{action:'deny'};});
            win.webContents.on('did-fail-load',(_,code,desc,url)=>{
              if(code===-6||url.startsWith('file:')){
                win.loadURL('https://procurbosse.edgeone.app');
              }
            });
          }
          app.whenReady().then(create);
          app.on('window-all-closed',()=>{if(process.platform!=='darwin')app.quit();});
          app.on('activate',()=>{if(!win)create();});
          ipcMain.handle('app-version',()=>app.getVersion());
          ipcMain.handle('get-system-info',()=>({platform:process.platform,arch:process.arch,node:process.versions.node,os:os.release(),mem:os.totalmem(),hostname:os.hostname()}));
          MJS
          fi
          # Ensure preload.js exists
          if [ ! -f electron/preload.js ]; then
            cat > electron/preload.js << 'PJS'
          const{contextBridge,ipcRenderer}=require('electron');
          contextBridge.exposeInMainWorld('electronAPI',{
            getVersion:()=>ipcRenderer.invoke('app-version'),
            getSystemInfo:()=>ipcRenderer.invoke('get-system-info'),
            platform:process.platform
          });
          PJS
          fi
          # Ensure icon exists (minimal valid ICO if missing)
          if [ ! -f build/icon.ico ]; then
            # Copy from public if available, else create minimal
            [ -f public/favicon.ico ] && cp public/favicon.ico build/icon.ico || \
            printf '\x00\x00\x01\x00\x01\x00\x10\x10\x00\x00\x01\x00\x18\x00\x68\x03\x00\x00\x16\x00\x00\x00' > build/icon.ico
          fi
          # Ensure installer.nsh exists
          if [ ! -f build/installer.nsh ]; then
            cat > build/installer.nsh << 'NSH'
          !macro customHeader
            RequestExecutionLevel user
          !macroend
          !macro customInit
          !macroend
          !macro customInstall
          !macroend
          !macro customUnInstall
          !macroend
          NSH
          fi

      - name: "🏗️ Build Windows EXE (x64 + ia32)"
        shell: bash
        run: npx electron-builder build --win --x64 --ia32 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        continue-on-error: true

      - name: "🏗️ Build portable EXE (fallback)"
        shell: bash
        run: npx electron-builder build --win portable --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        continue-on-error: true

      - name: "🔍 Find built EXE files"
        shell: bash
        run: |
          echo "=== dist-electron contents ==="
          ls -lh dist-electron/ 2>/dev/null || echo "(empty or missing)"
          echo "=== Searching all .exe files ==="
          find . -name "*.exe" -not -path "./node_modules/*" 2>/dev/null | head -20
          echo "=== electron-builder output dir ==="
          ls -lh out/ 2>/dev/null || echo "(no out/ dir)"
          ls -lh release/ 2>/dev/null || echo "(no release/ dir)"
        continue-on-error: true

      - name: "📦 Collect EXEs into dist-electron"
        shell: bash
        run: |
          mkdir -p dist-electron
          # electron-builder may output to several dirs — collect them all
          for dir in dist-electron out release "dist-electron/win-unpacked" "dist-electron/win-ia32-unpacked"; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 2 -name "*.exe" | while read f; do
              fname=$(basename "$f")
              [ -f "dist-electron/$fname" ] || cp "$f" "dist-electron/" && echo "Collected: $fname"
            done
          done
          echo "=== Final dist-electron ==="
          ls -lh dist-electron/
        continue-on-error: true

      - name: "📝 Create launcher .bat files"
        shell: pwsh
        run: |
          $outDir = "dist-electron"
          if (-not (Test-Path $outDir)) { New-Item -ItemType Directory -Path $outDir | Out-Null }

          # launch.bat — runs the installer
          @"
          @echo off
          title EL5 MediProcure v11.0.0 - ProcurBosse Launcher
          echo.
          echo  ============================================================
          echo   EL5 MediProcure v11.0.0 - ProcurBosse
          echo   Embu Level 5 Hospital Procurement System
          echo  ============================================================
          echo.
          echo  Choose an option:
          echo  [1] Install ProcurBosse (x64)
          echo  [2] Install ProcurBosse (ia32 - older PCs)
          echo  [3] Open Web App in Browser
          echo  [4] Exit
          echo.
          set /p choice="Enter choice (1-4): "
          if "%choice%"=="1" (
            for %%f in ("%~dp0*x64*.exe") do start "" "%%f"
          ) else if "%choice%"=="2" (
            for %%f in ("%~dp0*ia32*.exe") do start "" "%%f"
          ) else if "%choice%"=="3" (
            start "" "https://procurbosse.edgeone.app"
          )
          "@ | Out-File -Encoding ascii "$outDir\launch.bat"

          # open-web.bat — direct web shortcut
          @"
          @echo off
          title EL5 MediProcure - Opening Web App
          start "" "https://procurbosse.edgeone.app"
          "@ | Out-File -Encoding ascii "$outDir\open-web.bat"

          # install-x64.bat
          @"
          @echo off
          title EL5 MediProcure - Install x64
          for %%f in ("%~dp0*Setup*x64*.exe") do start "" "%%f"
          for %%f in ("%~dp0*x64*Setup*.exe") do start "" "%%f"
          "@ | Out-File -Encoding ascii "$outDir\install-x64.bat"

          # install-ia32.bat
          @"
          @echo off
          title EL5 MediProcure - Install ia32
          for %%f in ("%~dp0*Setup*ia32*.exe") do start "" "%%f"
          for %%f in ("%~dp0*ia32*Setup*.exe") do start "" "%%f"
          "@ | Out-File -Encoding ascii "$outDir\install-ia32.bat"

          Write-Host "Created launcher bat files in $outDir"
          Get-ChildItem $outDir

      - name: "🔢 Compute SHA256 checksums"
        shell: pwsh
        run: |
          $outDir = "dist-electron"
          if (-not (Test-Path $outDir)) { New-Item -ItemType Directory -Path $outDir | Out-Null }
          $files = Get-ChildItem $outDir -Filter "*.exe" -Recurse
          if ($files) {
            $files | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              "$hash  $($_.Name)" | Out-File -Append -Encoding ascii "$outDir\SHA256SUMS.txt"
            }
            Write-Host "Checksums computed:"
            Get-Content "$outDir\SHA256SUMS.txt"
          } else {
            "No EXE files found in dist-electron" | Out-File -Encoding ascii "$outDir\SHA256SUMS.txt"
            Write-Host "WARNING: No EXE files found"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: exe-${{ needs.web.outputs.sha }}
          path: |
            dist-electron/*.exe
            dist-electron/**/*.exe
            dist-electron/*.bat
            dist-electron/*.txt
            dist-electron/*.zip
          retention-days: 7
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  functions:
    name: "⚡ Edge Functions + Secrets"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: "🛠️ Install Supabase CLI"
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase 2>/dev/null || \
          npm install -g supabase --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true

      - name: "🔑 Set ALL Secrets"
        run: |
          supabase secrets set \
            TWILIO_ACCOUNT_SID="${{ env.TWILIO_ACCT }}" \
            TWILIO_AUTH_TOKEN="${{ env.TWILIO_TOKEN }}" \
            TWILIO_PHONE_NUMBER="${{ env.TWILIO_SMS }}" \
            TWILIO_MESSAGING_SERVICE_SID="${{ env.TWILIO_MG }}" \
            TWILIO_VERIFY_SERVICE_SID="${{ env.TWILIO_VA }}" \
            TWILIO_WA_NUMBER="${{ env.TWILIO_WA }}" \
            --project-ref ${{ env.SUPA_REF }} 2>&1 || echo "⚠️ Secrets step attempted"
        env: { SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}" }
        continue-on-error: true

      - name: "🚀 Deploy All Edge Functions"
        run: |
          for fn in send-sms send-email send-whatsapp whatsapp-bot whatsapp-webhook verify-role notify-requisition make-call twilio-engine notify-api; do
            [ -d "supabase/functions/$fn" ] || continue
            echo "→ Deploying $fn..."
            supabase functions deploy $fn \
              --project-ref ${{ env.SUPA_REF }} \
              --no-verify-jwt 2>&1 || echo "⚠️ $fn deploy attempted"
          done
        env: { SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}" }
        continue-on-error: true

      - name: "📱 Smoke test — SMS"
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ env.SUPA_ANON }}" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"+254116647894\",\"message\":\"ProcurBosse v11.0.0 deployed. WhatsApp Hub live. EL5 MediProcure operational.\",\"module\":\"ci_deploy\"}" \
            "${{ env.SUPA_URL }}/functions/v1/send-sms" | python3 -m json.tool || echo "SMS test attempted"
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  db:
    name: "🗄️ DB Migrations"
    runs-on: ubuntu-latest
    needs: web
    if: always() && needs.web.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase 2>/dev/null || \
          npm install -g supabase --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true
      - run: |
          echo "=== Migrations ===" && ls supabase/migrations/ | tail -10
          supabase db push --project-ref ${{ env.SUPA_REF }} 2>&1 || echo "⚠️ Migration attempted"
        env: { SUPABASE_ACCESS_TOKEN: "${{ env.SUPA_PAT }}" }
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  release:
    name: "🚀 Release v11.0.0"
    runs-on: ubuntu-latest
    needs: [web, exe, functions, db]
    if: always() && needs.web.result == 'success' && github.event.inputs.skip_release != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: "web-dist-${{ needs.web.outputs.sha }}"
          path: release-web/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: "exe-${{ needs.web.outputs.sha }}"
          path: release-exe/
        continue-on-error: true

      - name: "📦 Package web zip"
        run: |
          if [ -d release-web ]; then
            cd release-web && zip -r ../ProcurBosse-v11.0.0-Web.zip . && cd ..
            echo "✓ Web zip created"
          fi
        continue-on-error: true

      - name: "📋 List release artifacts"
        run: |
          echo "=== Web ==="
          ls -lh release-web/ 2>/dev/null || echo "(none)"
          echo "=== EXE ==="
          ls -lh release-exe/ 2>/dev/null || echo "(none)"
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v11.0.0"
          name: "🏥 ProcurBosse v11.0.0 — WhatsApp Pro"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            # 🏥 ProcurBosse v11.0.0 — WhatsApp Pro
            **Embu Level 5 Hospital · Embu County Government · Kenya**

