            | Sessions | Live 72h session tracking, QR sandbox join, re-invite expired users |
            | Compose | Template-driven single message with live WhatsApp preview |
            | Broadcast | Bulk send to comma/newline/semicolon-separated list |
            | Templates | 16 procurement templates (PO, GRN, Payment, Alert, etc.) |
            | Approvals | WhatsApp reply-based approval queue |
            | Workflows | 7 toggle-able automation rules (procure-to-pay) |
            | History | Full outbound WA log with status badges |
            | Settings | Webhook config, QR code, test connection, delivery stats |

            ## 🤖 WhatsApp Reply Approvals
            Approvers text **APPROVE** or **REJECT reason** — system auto-updates DB status, logs to audit trail, notifies requestor.

            **Webhook URL:**
            ```
            https://yvjfehnzbzjliizjvuhq.supabase.co/functions/v1/whatsapp-webhook
            ```

            ## 📡 Communications
            | Channel | Details |
            |---|---|
            | WhatsApp | +14155238886 · Join: send `join bad-machine` |
            | SMS | +16812972643 via MGd547 Messaging Service |
            | Email | Resend API + SMTP fallback |
            | Voice/IVR | Twilio Voice from +16812972643 |
            | OTP | Twilio Verify VA692606 |

            ## 📥 Downloads
            | File | Description |
            |---|---|
            | `ProcurBosse-v11.0.0-Web.zip` | Web build (deploy anywhere) |
            | `*x64*Setup*.exe` | Windows 64-bit installer (recommended) |
            | `*ia32*Setup*.exe` | Windows 32-bit installer |
            | `*Portable*.exe` | No-install portable version |
            | `launch.bat` | Interactive launcher menu |
            | `open-web.bat` | Opens https://procurbosse.edgeone.app |
            | `install-x64.bat` | Silent x64 installer launcher |
            | `install-ia32.bat` | Silent ia32 installer launcher |
            | `SHA256SUMS.txt` | File integrity checksums |

            ## 🔑 Default Login
            - **URL:** https://procurbosse.edgeone.app
            - **Email:** `samwise@gmail.com`
            - **Password:** `samwise@gmail.com`
            - **Role:** Admin (full access)

            ## 🏗️ Stack
            React 18 + TypeScript + Vite 5 + Supabase + Tailwind CSS + Electron
          files: |
            ProcurBosse-v11.0.0-Web.zip
            release-exe/*.zip
            release-exe/*.bat
            release-exe/*.txt
        continue-on-error: true
