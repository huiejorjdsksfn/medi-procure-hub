name: Deploy ProcurBosse to EdgeOne

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify web/ build artifacts
        run: |
          echo "=== Verifying build artifacts ==="
          ls -la web/
          echo ""
          echo "=== Checking critical files ==="
          [ -f web/index.html ]     && echo "✅ index.html" || echo "❌ MISSING index.html"
          [ -f web/_worker.js ]     && echo "✅ _worker.js" || echo "❌ MISSING _worker.js"
          [ -f web/_routes.json ]   && echo "✅ _routes.json" || echo "❌ MISSING _routes.json"
          [ -f web/_redirects ]     && echo "✅ _redirects" || echo "❌ MISSING _redirects"
          [ -f web/sw.js ]          && echo "✅ sw.js" || echo "❌ MISSING sw.js"
          [ -f web/404.html ]       && echo "✅ 404.html" || echo "❌ MISSING 404.html"
          [ -d web/assets ]         && echo "✅ assets/" || echo "❌ MISSING assets/"
          echo ""
          echo "=== Asset count ==="
          ls web/assets/ | wc -l
          echo ""
          echo "=== SW version check ==="
          grep "CACHE_V" web/sw.js
          echo ""
          echo "=== Worker version check ==="
          grep "X-Worker-Version" web/_worker.js

      - name: Deploy to EdgeOne Pages
        uses: TencentEdgeOne/edgeone-pages-action@v1
        with:
          project-name: procurbosse
          directory: web
          edge-functions-directory: web
          token: ${{ secrets.EDGEONE_API_TOKEN }}
