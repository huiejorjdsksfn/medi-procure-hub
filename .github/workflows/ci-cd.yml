            - TypeScript — 0 errors
            - Duplicate JS style key scan — 0 errors
            - Route coverage — 49/49 routes verified
            - Build — clean, no warnings

            ### 📦 Web Deployment
            Download `procurbosse-v${{ needs.web-build.outputs.version }}-web.zip` and deploy the contents to:
            - **EdgeOne** — upload `web/` folder
