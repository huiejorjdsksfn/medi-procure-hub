# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  EL5 MediProcure — ProcurBosse CI/CD MASTER PIPELINE                    ║
# ║  Embu Level 5 Hospital · Embu County Government · Kenya                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝
name: "🏥 ProcurBosse — CI/CD Master"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_desktop:
        description: "Build Electron EXE (Windows)"
        required: false
        default: "true"
        type: boolean
      deploy_functions:
        description: "Deploy Supabase Edge Functions"
        required: false
        default: "true"
        type: boolean
      run_migrations:
        description: "Run DB Migrations"
        required: false
        default: "true"
        type: boolean
      create_release:
        description: "Create GitHub Release"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

env:
  APP_VERSION: "5.8.0"
  NODE_VERSION: "20"
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  VITE_SUPABASE_PROJECT_ID: "yvjfehnzbzjliizjvuhq"
  VITE_APP_VERSION: "5.8.0"
  VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
  VITE_SYSTEM_NAME: "EL5 MediProcure"
  VITE_TWILIO_PHONE: "+16812972643"
  VITE_WHATSAPP_NUMBER: "+14155238886"
  VITE_TWILIO_MSG_SID: "VA692606d4faea3c18432a857f111dbfad"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Web Build (Vite + TypeScript)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  web-build:
    name: "🌐 Web Build — Vite + TypeScript"
    runs-on: ubuntu-latest
    outputs:
      build-id: ${{ steps.meta.outputs.build_id }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🏷️ Build metadata"
        id: meta
        run: |
          BUILD_ID="v${{ env.APP_VERSION }}-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "version=${{ env.APP_VERSION }}" >> $GITHUB_OUTPUT
          echo "::notice::🏥 Building ProcurBosse $BUILD_ID"

      - name: "⚙️ Setup Node ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: "🔧 Sync package-lock version"
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          LOCK_VER=$(node -p "require('./package-lock.json').version")
          if [ "$PKG_VER" != "$LOCK_VER" ]; then
            echo "Patching package-lock.json: $LOCK_VER → $PKG_VER"
            node -e "
              const fs=require('fs');
              const l=JSON.parse(fs.readFileSync('package-lock.json'));
              l.version='$PKG_VER';
              if(l.packages&&l.packages[''])l.packages[''].version='$PKG_VER';
              fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));
            "
          fi
          echo "✅ Version sync: $PKG_VER"

      - name: "📦 Install dependencies"
        run: npm ci --no-audit --legacy-peer-deps

      - name: "📝 Write .env"
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL=https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PROJECT_ID=yvjfehnzbzjliizjvuhq
          VITE_APP_VERSION=5.8.0
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=+16812972643
          VITE_WHATSAPP_NUMBER=+14155238886
          VITE_TWILIO_MSG_SID=VA692606d4faea3c18432a857f111dbfad
          EOF

      - name: "🔍 TypeScript check (non-blocking)"
        run: npx tsc --noEmit --skipLibCheck 2>&1 | head -50 || true
        continue-on-error: true

      - name: "🏗️ Vite production build"
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: "✅ Verify dist output"
        run: |
          echo "--- dist contents ---"
          ls -lh dist/
          [ -f dist/index.html ] && echo "✅ index.html present" || (echo "❌ Missing index.html" && exit 1)
          echo "Total size: $(du -sh dist/ | cut -f1)"

      - name: "📤 Upload web artifact"
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-web-${{ steps.meta.outputs.build_id }}
          path: dist/
          retention-days: 30
          if-no-files-found: error

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Desktop EXE (Electron + Windows)
# ══════════════════════════════════════════════════════════════════════════════
  desktop-build:
    name: "💻 Desktop EXE — Electron Windows"
    runs-on: windows-latest
    needs: web-build
    if: github.event_name == 'push' || github.event.inputs.build_desktop != 'false'

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: "📥 Download web dist"
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-web-${{ needs.web-build.outputs.build-id }}
          path: dist/

      - name: "🔧 Sync package-lock version"
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          node -e "
            const fs=require('fs');
            const l=JSON.parse(fs.readFileSync('package-lock.json'));
            l.version='$PKG_VER';
            if(l.packages&&l.packages[''])l.packages[''].version='$PKG_VER';
            fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));
          "

      - name: "📦 Install deps + Electron"
        run: |
          npm ci --no-audit --legacy-peer-deps
          npm install --no-save electron electron-builder --legacy-peer-deps

      - name: "🛠️ Ensure Electron main + preload"
        shell: bash
        run: |
          mkdir -p electron public
          if [ ! -f electron/main.js ]; then
            cat > electron/main.js << 'EOF'
          const { app, BrowserWindow, ipcMain, shell } = require('electron');
          const path = require('path');
          const fs = require('fs');
          app.disableHardwareAcceleration();
          app.commandLine.appendSwitch('disable-gpu');
          app.commandLine.appendSwitch('use-gl', 'swiftshader');
          let mainWindow;
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1400, height: 900, minWidth: 1024, minHeight: 768,
              title: 'ProcurBosse — EL5 MediProcure v5.8',
              webPreferences: {
                nodeIntegration: false, contextIsolation: true,
                preload: path.join(__dirname, 'preload.js')
              },
              show: false, backgroundColor: '#0f172a'
            });
            const rp = path.join(process.resourcesPath || '', 'app', 'index.html');
            const dp = path.join(__dirname, '../dist/index.html');
            mainWindow.loadURL(fs.existsSync(rp) ? 'file://' + rp : 'file://' + dp);
            mainWindow.once('ready-to-show', () => { mainWindow.show(); mainWindow.maximize(); });
            mainWindow.on('closed', () => { mainWindow = null; });
            mainWindow.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url); return { action: 'deny' };
            });
          }
          app.whenReady().then(() => {
            createWindow();
            app.on('activate', () => { if (!BrowserWindow.getAllWindows().length) createWindow(); });
          });
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          ipcMain.handle('app-version', () => app.getVersion());
          EOF
          fi
          if [ ! -f electron/preload.js ]; then
            cat > electron/preload.js << 'EOF'
          const { contextBridge, ipcRenderer } = require('electron');
          contextBridge.exposeInMainWorld('electronAPI', {
            getVersion: () => ipcRenderer.invoke('app-version'),
            platform: process.platform
          });
          EOF
          fi
          # Minimal favicon placeholder
          if [ ! -f public/favicon.ico ]; then
            printf '\x00\x00\x01\x00\x01\x00\x01\x01\x00\x00\x01\x00\x18\x00' > public/favicon.ico
          fi

      - name: "📋 Write electron-builder config"
        shell: bash
        run: |
          cat > eb-ci.yml << 'EOF'
          appId: ke.go.embu.mediprocure.procurbosse
          productName: ProcurBosse
          copyright: "Copyright 2025 Embu County Government"
          directories:
            output: release
          files:
            - "dist/**/*"
            - "electron/**/*"
          win:
            target:
              - target: nsis
                arch: [x64, ia32]
              - target: portable
                arch: [x64]
            requestedExecutionLevel: requireAdministrator
          nsis:
            oneClick: false
            perMachine: true
            allowElevation: true
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: true
            createStartMenuShortcut: true
            shortcutName: "ProcurBosse v5.8"
          asar: true
          extraResources:
            - from: dist
              to: app
              filter: ["**/*"]
          EOF

      - name: "🏗️ Build Windows EXE (x64 + ia32)"
        shell: bash
        run: npx electron-builder build --config eb-ci.yml --win --x64 --ia32 --publish never
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        continue-on-error: true

      - name: "📋 List release artifacts"
        shell: bash
        run: ls -lh release/ 2>/dev/null || echo "⚠️ No release dir produced"

      - name: "📤 Upload EXE artifact"
        uses: actions/upload-artifact@v4
        with:
          name: procurbosse-exe-${{ needs.web-build.outputs.build-id }}
          path: |
            release/*.exe
            release/*.zip
            release/*.yml
          retention-days: 30
          if-no-files-found: warn

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Supabase Edge Functions
# ══════════════════════════════════════════════════════════════════════════════
  supabase-functions:
    name: "⚡ Deploy Edge Functions"
    runs-on: ubuntu-latest
    needs: web-build
    if: always() && needs.web-build.result == 'success' && (github.event_name == 'push' || github.event.inputs.deploy_functions != 'false')

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🛠️ Install Supabase CLI"
        run: npm install -g supabase@latest --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true

      - name: "🚀 Deploy edge functions"
        run: |
          for fn in send-email send-sms notify-requisition; do
            echo "⚡ Deploying $fn..."
            supabase functions deploy $fn \
              --project-ref yvjfehnzbzjliizjvuhq \
              --no-verify-jwt 2>&1 && echo "✅ $fn deployed" || echo "⚠️ $fn skipped"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: "✅ Functions deploy complete"
        run: echo "Edge functions step done — Project yvjfehnzbzjliizjvuhq"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4 — DB Migrations
# ══════════════════════════════════════════════════════════════════════════════
  db-migrations:
    name: "🗄️ Database Migrations"
    runs-on: ubuntu-latest
    needs: web-build
    if: always() && needs.web-build.result == 'success' && (github.event_name == 'push' || github.event.inputs.run_migrations != 'false')

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🛠️ Install Supabase CLI"
        run: npm install -g supabase@latest --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true

      - name: "📋 List migrations"
        run: ls -la supabase/migrations/ 2>/dev/null || echo "No migrations directory found"

      - name: "🚀 Push DB migrations"
        run: |
          supabase db push --project-ref yvjfehnzbzjliizjvuhq 2>&1 \
            && echo "✅ Migrations applied" \
            || echo "⚠️ Migration push attempted (may already be up to date)"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: "✅ Migrations complete"
        run: echo "DB migrations step done"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 5 — GitHub Release
# ══════════════════════════════════════════════════════════════════════════════
  create-release:
    name: "🚀 GitHub Release v${{ needs.web-build.outputs.version }}"
    runs-on: ubuntu-latest
    needs: [web-build, desktop-build, supabase-functions, db-migrations]
    if: always() && needs.web-build.result == 'success' && (github.event_name == 'push' || github.event.inputs.create_release != 'false')

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📥 Download web dist"
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-web-${{ needs.web-build.outputs.build-id }}
          path: release-web/
        continue-on-error: true

      - name: "📥 Download EXE artifacts"
        uses: actions/download-artifact@v4
        with:
          name: procurbosse-exe-${{ needs.web-build.outputs.build-id }}
          path: release-exe/
        continue-on-error: true

      - name: "📦 Package web dist as ZIP"
        run: |
          if [ -d release-web ]; then
            cd release-web && zip -r ../ProcurBosse-v${{ env.APP_VERSION }}-Web.zip . && cd ..
            echo "✅ Web ZIP created: $(du -sh ProcurBosse-v${{ env.APP_VERSION }}-Web.zip | cut -f1)"
          else
            echo "⚠️ No web dist to package"
          fi
        continue-on-error: true

      - name: "🏷️ Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.APP_VERSION }}"
          name: "🏥 ProcurBosse v${{ env.APP_VERSION }} — EL5 MediProcure Health Procurement ERP"
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.RELEASE_PAT }}
          body: |
            # 🏥 ProcurBosse v${{ env.APP_VERSION }} — EL5 MediProcure

            **Embu Level 5 Hospital · Embu County Government · Kenya**

            ## ✨ v5.8 Highlights
            - Accountant workspace — invoice matching, GL journal, payment vouchers
            - Twilio SMS + WhatsApp integration (Africa-ready messaging)
            - Rebuilt notification system with bulk actions & realtime push
            - SMTP via Supabase Edge Functions + Resend
            - Windows EXE installer (x64 + ia32) with NSIS + Portable builds
            - Multi-location support for 8 Embu County health facilities
            - Dark navy UI with GUI CSS editor

            ## 🏥 Supported Facilities
            Runyenjes · Ishiara · Mitheru · Kagaari · Chogoria · Kiritiri · Embu Annex · EL5H Main

            ## 📡 Messaging
            | Channel | Value |
            |---------|-------|
            | SMS | +16812972643 |
            | WhatsApp | +14155238886 (join **bad-machine**) |
            | Messaging SID | VA692606d4faea3c18432a857f111dbfad |

            ## 🛠️ Tech Stack
            React 18 · TypeScript · Vite 5 · Supabase (PostgreSQL) · Electron 28 · Tailwind CSS · Twilio

            ## 📦 Downloads
            - `ProcurBosse-v${{ env.APP_VERSION }}-Web.zip` — Web build (deploy to any static host)
            - `*.exe` — Windows installer (x64 recommended, ia32 for legacy)

            ---
            *Built for Embu County Government Health Division*
            *Build ID: ${{ needs.web-build.outputs.build-id }}*
          files: |
            ProcurBosse-v${{ env.APP_VERSION }}-Web.zip
            release-exe/*.exe
            release-exe/*.zip
        continue-on-error: true
