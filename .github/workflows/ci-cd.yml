# ╔══════════════════════════════════════════════════════════════════╗
# ║  EL5 MediProcure — ProcurBosse CI/CD Pipeline                   ║
# ║  v5.8.3 · Embu Level 5 Hospital · Embu County Government, Kenya ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# TRIGGERS:  Every push to main · Manual workflow_dispatch
# PIPELINE:  TypeScript → JS Scan → Web Build → Route Tests
#            → Upload Artifact → GitHub Release (on main push)
#
# ADMIN:     samwise@gmail.com / samwise@gmail.com
# LIVE URL:  https://procurbosse.edgeone.app

name: "🏥 ProcurBosse — Web Build & Release"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version override (default: 5.8.3)"
        required: false
        default: "5.8.3"
      create_release:
        description: "Create GitHub Release"
        required: false
        default: "true"
        type: boolean
      skip_tests:
        description: "Skip tests (emergency deploy only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

env:
  NODE_VERSION: "20"
  APP_VERSION: "5.8.3"
  CI: "false"
  NODE_OPTIONS: "--max-old-space-size=4096"
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:

# ═══════════════════════════════════════════════════════════
# JOB 1 ─ Type Check + JS Error Scan + Web Build + Test
# ═══════════════════════════════════════════════════════════
  web-build:
    name: "🌐 Build & Test"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build_id: ${{ steps.meta.outputs.build_id }}
      chunks: ${{ steps.verify.outputs.chunks }}

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🏷️ Version metadata"
        id: meta
        run: |
          V="${{ inputs.version || env.APP_VERSION }}"
          BUILD_ID="v${V}-$(date +%Y%m%d%H%M)-$(git rev-parse --short HEAD)"
          echo "version=$V"        >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "::notice title=ProcurBosse::Building $BUILD_ID"

      - name: "📦 Setup Node ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📥 Install dependencies"
        run: npm ci --ignore-scripts

      # ── Tests ──────────────────────────────────────────────
      - name: "🔍 TypeScript type check"
        if: inputs.skip_tests != 'true'
        run: npx tsc --noEmit

      - name: "🔎 JS duplicate-key scan"
        if: inputs.skip_tests != 'true'
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, readdirSync, statSync } from 'fs';
          import { join } from 'path';
          let errors = 0;

          function scan(dir) {
            for (const f of readdirSync(dir)) {
              const fp = join(dir, f);
              if (statSync(fp).isDirectory()) { scan(fp); continue; }
              if (!fp.endsWith('.tsx') && !fp.endsWith('.ts')) continue;
              const src = readFileSync(fp, 'utf8');
              src.split('\n').forEach((line, i) => {
                const blocks = line.match(/style=\{\{[^}]+\}\}/g) || [];
                for (const blk of blocks) {
                  const first = (blk.match(/\{\{(\w+):/) || [])[1];
                  const rest  = [...blk.matchAll(/,\s*(\w+):/g)].map(m => m[1]);
                  const all   = first ? [first, ...rest] : rest;
                  const seen  = new Set();
                  for (const k of all) {
                    if (seen.has(k)) {
                      console.error(`DUPLICATE_KEY "${k}" → ${fp}:${i + 1}`);
                      errors++;
                    }
                    seen.add(k);
                  }
                }
              });
            }
          }

          scan('src/pages');
          scan('src/components');

          if (errors > 0) { console.error(`\n${errors} duplicate style key(s) found`); process.exit(1); }
          console.log(`✓ JS scan clean — no duplicate style keys`);
          EOF

      - name: "🧪 Route coverage test"
        if: inputs.skip_tests != 'true'
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync } from 'fs';
          const app = readFileSync('src/App.tsx', 'utf8');
          const ROUTES = [
            '/dashboard','/requisitions','/purchase-orders','/goods-received',
            '/suppliers','/tenders','/bid-evaluations','/contracts','/procurement-planning',
            '/vouchers/payment','/vouchers/receipt','/vouchers/journal',
            '/vouchers/purchase','/vouchers/sales',
            '/financials/dashboard','/financials/chart-of-accounts',
            '/financials/budgets','/financials/fixed-assets',
            '/quality/dashboard','/quality/inspections','/quality/non-conformance',
            '/items','/categories','/departments','/scanner',
            '/email','/notifications','/sms','/telephony','/reception',
            '/users','/settings','/audit-log','/admin/database','/admin/panel',
            '/webmaster','/backup','/odbc','/profile',
            '/accountant','/facilities','/gui-editor','/ip-access',
            '/print-engine','/changelog','/documents','/documents/editor',
            '/db-test','/reports',
          ];
          let pass = 0, fail = 0;
          ROUTES.forEach(r => {
            if (app.includes(JSON.stringify(r))) { pass++; }
            else { console.error(`  MISSING ROUTE: ${r}`); fail++; }
          });
          console.log(`Routes: ${pass}/${ROUTES.length} OK`);
          if (fail > 0) process.exit(1);
          EOF

      # ── Build ──────────────────────────────────────────────
      - name: "🏗️ Vite production build"
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_APP_VERSION: ${{ steps.meta.outputs.version }}
          VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
          VITE_SYSTEM_NAME: "EL5 MediProcure"

      - name: "✅ Verify build output"
        id: verify
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)
          CHUNKS=$(ls dist/assets/*.js | wc -l)
          SIZE=$(du -sh dist/ | cut -f1)
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT
          echo "::notice title=Build OK::${CHUNKS} JS chunks · ${SIZE} total"
          echo "✓ Build verified — ${CHUNKS} chunks, ${SIZE}"

      - name: "📦 Package web zip"
        run: |
          cd dist
          zip -r ../procurbosse-v${{ steps.meta.outputs.version }}-web.zip . -x "*.map"
          cd ..
          echo "Web package: $(du -sh procurbosse-v${{ steps.meta.outputs.version }}-web.zip)"

      - name: "📤 Upload web artifact"
        uses: actions/upload-artifact@v4
        with:
          name: web-v${{ steps.meta.outputs.version }}
          path: |
            dist/
            procurbosse-v${{ steps.meta.outputs.version }}-web.zip
          retention-days: 30

# ═══════════════════════════════════════════════════════════
# JOB 2 ─ GitHub Release (web zip + release notes)
# ═══════════════════════════════════════════════════════════
  release:
    name: "🚀 GitHub Release"
    runs-on: ubuntu-latest
    needs: web-build
    if: >
      always() &&
      needs.web-build.result == 'success' &&
      (github.ref == 'refs/heads/main' || inputs.create_release == 'true')

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "📥 Download web artifact"
        uses: actions/download-artifact@v4
        with:
          name: web-v${{ needs.web-build.outputs.version }}
          path: artifacts/
        continue-on-error: true

      - name: "📋 List artifacts"
        run: ls -lh artifacts/ 2>/dev/null || echo "No artifacts"

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.web-build.outputs.version }}"
          name: "🏥 ProcurBosse v${{ needs.web-build.outputs.version }} — EL5 MediProcure"
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## 🏥 EL5 MediProcure — ProcurBosse v${{ needs.web-build.outputs.version }}

            **Embu Level 5 Hospital · Embu County Government · Kenya**
            **Build:** `${{ needs.web-build.outputs.build_id }}`
            **Chunks:** ${{ needs.web-build.outputs.chunks }} optimised JS chunks

            ---

            ### 🌐 Live Application
            **https://procurbosse.edgeone.app**

            ---

            ### 🔐 Login Credentials

            **Primary Admin**
            > Email: `samwise@gmail.com`
            > Password: `samwise@gmail.com`

            **All Demo Accounts** *(click role buttons on login screen for auto-fill)*

            | Role | Email | Password |
            |------|-------|----------|
            | 🔴 Administrator | `samwise@gmail.com` | `samwise@gmail.com` |
            | 🟠 Proc. Manager | `manager@el5.co.ke` | `Manager@1234` |
            | 🔵 Accountant | `accountant@el5.co.ke` | `Account@1234` |
            | 🟢 Proc. Officer | `officer@el5.co.ke` | `Officer@1234` |
            | 🟣 Requisitioner | `requisitioner@el5.co.ke` | `Req@12345` |
            | 🔵 Warehouse | `warehouse@el5.co.ke` | `Warehouse@1234` |
            | 🟤 Inventory | `inventory@el5.co.ke` | `Inventory@1234` |
            | ⚪ Reception | `reception@el5.co.ke` | `Reception@1234` |
