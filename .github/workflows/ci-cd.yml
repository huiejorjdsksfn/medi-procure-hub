name: "🏥 ProcurBosse CI/CD"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_exe:
        description: "Build Windows EXE"
        required: false
        default: "true"
        type: boolean
      create_release:
        description: "Create GitHub Release"
        required: false
        default: "true"
        type: boolean
      version:
        description: "Release version (e.g. 5.8.3)"
        required: false
        default: "5.8.3"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "20"
  APP_VERSION: "5.8.3"
  CI: "false"
  NODE_OPTIONS: "--max-old-space-size=4096"
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"

jobs:

# ════════════════════════════════════════════
# JOB 1: Type-check + Web Build + Route Tests
# ════════════════════════════════════════════
  web-build:
    name: "🌐 Web Build & Test"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      modules: ${{ steps.buildcheck.outputs.modules }}

    steps:
      - uses: actions/checkout@v4

      - name: "🏷️ Set version"
        id: meta
        run: |
          V="${{ inputs.version || env.APP_VERSION }}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "::notice title=Version::Building v$V"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: "📥 Install"
        run: npm ci --ignore-scripts

      - name: "🔍 TypeScript"
        run: npx tsc --noEmit

      - name: "🔎 JS Error Scan"
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync, readdirSync, statSync } from 'fs';
          import { join } from 'path';
          let errors = 0;
          function scan(dir) {
            for (const f of readdirSync(dir)) {
              const fp = join(dir, f);
              if (statSync(fp).isDirectory()) scan(fp);
              else if (fp.endsWith('.tsx') || fp.endsWith('.ts')) {
                const src = readFileSync(fp, 'utf8');
                src.split('\n').forEach((line, i) => {
                  // Check for actual duplicate literal keys in style objects
                  const styleBlocks = line.match(/style=\{\{[^}]+\}\}/g) || [];
                  for (const blk of styleBlocks) {
                    const keys = [...blk.matchAll(/,\s*(\w+):/g)].map(m=>m[1]);
                    const first = blk.match(/\{\{(\w+):/) ? [blk.match(/\{\{(\w+):/)[1]] : [];
                    const all = [...first, ...keys];
                    const seen = new Set();
                    for (const k of all) {
                      if (seen.has(k)) {
                        console.error(`DUPLICATE_KEY "${k}" in ${fp}:${i+1}`);
                        errors++;
                      }
                      seen.add(k);
                    }
                  }
                });
              }
            }
          }
          scan('src/pages');
          scan('src/components');
          if (errors > 0) { console.error(`${errors} JS errors found`); process.exit(1); }
          else console.log('✓ No duplicate style keys found');
          EOF

      - name: "🏗️ Vite Build"
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: "🧪 Route Coverage Test"
        id: buildcheck
        run: |
          node --input-type=module << 'EOF'
          import { readFileSync } from 'fs';
          const app = readFileSync('src/App.tsx', 'utf8');
          const ROUTES = [
            '/dashboard','/requisitions','/purchase-orders','/goods-received',
            '/suppliers','/tenders','/bid-evaluations','/contracts','/procurement-planning',
            '/vouchers/payment','/vouchers/receipt','/vouchers/journal','/vouchers/purchase','/vouchers/sales',
            '/financials/dashboard','/financials/chart-of-accounts','/financials/budgets','/financials/fixed-assets',
            '/quality/dashboard','/quality/inspections','/quality/non-conformance',
            '/items','/categories','/departments','/scanner',
            '/email','/notifications','/sms','/telephony','/reception',
            '/users','/settings','/audit-log','/admin/database','/admin/panel',
            '/webmaster','/backup','/odbc','/profile',
            '/accountant','/facilities','/gui-editor','/ip-access',
            '/print-engine','/changelog','/documents','/documents/editor','/db-test','/reports',
          ];
          let pass = 0, fail = 0;
          ROUTES.forEach(r => {
            if (app.includes(JSON.stringify(r))) pass++;
            else { console.error('MISSING ROUTE:', r); fail++; }
          });
          console.log(`Routes: ${pass} OK, ${fail} missing`);
          if (fail > 0) process.exit(1);
          EOF
          echo "modules=$(ls dist/assets/*.js | wc -l)" >> $GITHUB_OUTPUT

      - name: "📤 Upload web artifact"
        uses: actions/upload-artifact@v4
        with:
          name: web-v${{ steps.meta.outputs.version }}
          path: dist/
          retention-days: 30

# ════════════════════════════════════════════
# JOB 2: Windows EXE Build
# ════════════════════════════════════════════
  exe-build:
    name: "🖥️ Windows EXE Build"
    needs: web-build
    runs-on: windows-latest
    if: ${{ inputs.build_exe != 'false' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: "📥 Install"
        run: npm ci --ignore-scripts

      - name: "🏗️ Vite Build"
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: "🖥️ Electron Builder — x64"
        run: npx electron-builder --win --x64 --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "📤 Upload EXE"
        uses: actions/upload-artifact@v4
        with:
          name: exe-v${{ needs.web-build.outputs.version }}-x64
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
          retention-days: 30

# ════════════════════════════════════════════
# JOB 3: Package + GitHub Release
# ════════════════════════════════════════════
  release:
    name: "🚀 GitHub Release"
    needs: [web-build, exe-build]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.web-build.result == 'success' && (github.ref == 'refs/heads/main' || inputs.create_release != 'false') }}

    steps:
      - uses: actions/checkout@v4

      - name: "📥 Download web"
        uses: actions/download-artifact@v4
        with:
          name: web-v${{ needs.web-build.outputs.version }}
          path: dist/
        continue-on-error: true

      - name: "📥 Download EXE"
        uses: actions/download-artifact@v4
        with:
          name: exe-v${{ needs.web-build.outputs.version }}-x64
          path: exe/
        continue-on-error: true

      - name: "📦 Zip web release"
        run: |
          cd dist
          zip -r ../procurbosse-v${{ needs.web-build.outputs.version }}-web.zip . -x "*.map"
          cd ..
          echo "Web zip: $(du -sh procurbosse-v${{ needs.web-build.outputs.version }}-web.zip)"

      - name: "🚀 Create Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.web-build.outputs.version }}"
          name: "🏥 ProcurBosse v${{ needs.web-build.outputs.version }} — EL5 MediProcure"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🏥 EL5 MediProcure — ProcurBosse v${{ needs.web-build.outputs.version }}
            **Embu Level 5 Hospital · Embu County Government · Kenya**

            ---

            ### 🌐 Live Application
            **https://procurbosse.edgeone.app**

            ---

            ### 🔐 Sample Login Accounts

            Click role buttons on login screen or use these credentials directly:

            | Role | Email | Password |
            |------|-------|----------|
            | 🔴 Administrator | `samwise@gmail.com` | `samwise@gmail.com` |
            | 🟠 Proc. Manager | `manager@el5.co.ke` | `Manager@1234` |
            | 🔵 Accountant | `accountant@el5.co.ke` | `Account@1234` |
            | 🟢 Proc. Officer | `officer@el5.co.ke` | `Officer@1234` |
            | 🟣 Requisitioner | `requisitioner@el5.co.ke` | `Req@12345` |
            | 🔵 Warehouse | `warehouse@el5.co.ke` | `Warehouse@1234` |
            | 🟤 Inventory | `inventory@el5.co.ke` | `Inventory@1234` |
            | ⚪ Reception | `reception@el5.co.ke` | `Reception@1234` |
            | ⚫ DB Admin | `dbadmin@el5.co.ke` | `DBAdmin@1234` |

            ---

            ### 📋 What's in this release
            - ✅ Zero TypeScript errors
            - ✅ Zero duplicate JS style keys (esbuild clean)
            - ✅ All 54 pages with routes registered
            - ✅ All 9 roles with dashboard quick-actions
            - ✅ Demo accounts panel on login screen
            - ✅ Supabase fallback keys (works without env vars)
            - ✅ AuthContext: parallel fetch + 6s safety timeout
            - ✅ Communications & Accountant nav groups in sidebar
            - ✅ 14 previously missing pages wired to routes

            ### 📦 Downloads
            - **Web** (`*-web.zip`): Deploy `index.html` + `assets/` to any CDN
            - **EXE** (`*.exe`): Windows standalone installer (Electron)

            ### 🛠️ Modules
            Procurement · Finance · Vouchers · Quality · Inventory · Communications · Administration · Accountant Workspace
          files: |
            procurbosse-v${{ needs.web-build.outputs.version }}-web.zip
            exe/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
