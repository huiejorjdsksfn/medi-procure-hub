            Key migration: `20260502200000_samwise_admin.sql` — auto-assigns admin role on signup.
          files: |
            artifacts/procurbosse-v${{ needs.web-build.outputs.version }}-web.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
