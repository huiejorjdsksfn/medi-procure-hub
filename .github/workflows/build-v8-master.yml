name: "🏥 ProcurBosse v5.8 — Master Pipeline"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_desktop:
        description: "Build Electron EXE"
        required: false
        default: "true"
        type: boolean
      deploy_functions:
        description: "Deploy Supabase Edge Functions"
        required: false
        default: "true"
        type: boolean
      run_migrations:
        description: "Run DB Migrations"
        required: false
        default: "true"
        type: boolean
      create_release:
        description: "Create GitHub Release"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

