# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  EL5 MediProcure v5.8 — ProcurBosse MASTER CI/CD PIPELINE                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: "🏥 ProcurBosse v5.8 — Master Pipeline"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_desktop:
        description: "Build Electron EXE"
        required: false
        default: "true"
        type: boolean
      deploy_functions:
        description: "Deploy Supabase Edge Functions"
        required: false
        default: "true"
        type: boolean
      run_migrations:
        description: "Run DB Migrations"
        required: false
        default: "true"
        type: boolean
      create_release:
        description: "Create GitHub Release"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  packages: write
  actions: write

env:
  APP_VERSION: "5.8.0"
  VITE_SUPABASE_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc"
  VITE_SUPABASE_PROJECT_ID: "yvjfehnzbzjliizjvuhq"
  SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
  VITE_APP_VERSION: "5.8.0"
  VITE_HOSPITAL_NAME: "Embu Level 5 Hospital"
  VITE_SYSTEM_NAME: "EL5 MediProcure"
  VITE_TWILIO_PHONE: "+16812972643"
  VITE_WHATSAPP_NUMBER: "+14155238886"
  VITE_TWILIO_MSG_SID: "MG2fffc3a381c44a202c316dcc6400707d"
  GITHUB_AUTH_TOKEN: "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"

jobs:
  # ══════════════════════════════════════════════════════
  # JOB 1 — Web Build
  # ══════════════════════════════════════════════════════
  web-build:
    name: "🌐 Web Build — Vite + TypeScript"
    runs-on: ubuntu-latest
    outputs:
      build-id: ${{ steps.meta.outputs.build_id }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        run: |
          BUILD_ID="v5.8.0-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "version=5.8.0" >> $GITHUB_OUTPUT
          echo "::notice::Building ProcurBosse $BUILD_ID"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: "🔧 Fix package-lock version mismatch"
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          LOCK_VER=$(node -p "require('./package-lock.json').version")
          echo "package.json=$PKG_VER  lock=$LOCK_VER"
          if [ "$PKG_VER" != "$LOCK_VER" ]; then
            echo "Patching package-lock.json $LOCK_VER -> $PKG_VER"
            node -e "
              const fs=require('fs');
              const l=JSON.parse(fs.readFileSync('package-lock.json'));
              l.version='$PKG_VER';
              if(l.packages&&l.packages[''])l.packages[''].version='$PKG_VER';
              fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));
            "
          fi
          echo "✅ Version sync done"

      - name: "📦 Install Dependencies"
        run: npm ci --no-audit --legacy-peer-deps

      - name: "⚙️ Write .env"
        run: |
          cat > .env << 'EOF'
          VITE_SUPABASE_URL=https://yvjfehnzbzjliizjvuhq.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2amZlaG56YnpqbGlpemp2dWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwMDg0NjYsImV4cCI6MjA3NjU4NDQ2Nn0.mkDvC1s90bbRBRKYZI6nOTxEpFrGKMNmWgTENeMTSnc
          VITE_SUPABASE_PROJECT_ID=yvjfehnzbzjliizjvuhq
          VITE_APP_VERSION=5.8.0
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          VITE_TWILIO_PHONE=+16812972643
          VITE_WHATSAPP_NUMBER=+14155238886
          VITE_TWILIO_MSG_SID=MG2fffc3a381c44a202c316dcc6400707d
          EOF

      - name: "🔨 TypeScript check (non-blocking)"
        run: npx tsc --noEmit --skipLibCheck 2>&1 | head -40 || true
        continue-on-error: true

      - name: "🏗️ Vite build"
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: "✅ Verify dist"
        run: |
          ls -lh dist/
          [ -f dist/index.html ] && echo "✅ OK" || (echo "❌ Missing index.html" && exit 1)
          du -sh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-v5.8
          path: dist/
          retention-days: 30
          if-no-files-found: error

  # ══════════════════════════════════════════════════════
  # JOB 2 — Desktop EXE
  # ══════════════════════════════════════════════════════
  desktop-build:
    name: "💻 Desktop EXE — Electron + Windows"
    runs-on: windows-latest
    needs: web-build
    if: github.event.inputs.build_desktop != 'false'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-v5.8
          path: dist/

      - name: "🔧 Fix package-lock version"
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          node -e "
            const fs=require('fs');
            const l=JSON.parse(fs.readFileSync('package-lock.json'));
            l.version='$PKG_VER';
            if(l.packages&&l.packages[''])l.packages[''].version='$PKG_VER';
            fs.writeFileSync('package-lock.json',JSON.stringify(l,null,2));
          "

      - name: "📦 Install + electron-builder"
        run: |
          npm ci --no-audit --legacy-peer-deps
          npm install --no-save electron electron-builder --legacy-peer-deps

      - name: "⚙️ Ensure electron files"
        shell: bash
        run: |
          mkdir -p electron public
          if [ ! -f electron/main.js ]; then
            cat > electron/main.js << 'EMEOF'
          const { app, BrowserWindow, ipcMain, shell } = require('electron');
          const path = require('path');
          const fs = require('fs');
          app.disableHardwareAcceleration();
          app.commandLine.appendSwitch('disable-gpu');
          app.commandLine.appendSwitch('use-gl', 'swiftshader');
          let mainWindow;
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1400, height: 900, minWidth: 1024, minHeight: 768,
              title: 'ProcurBosse — EL5 MediProcure v5.8',
              webPreferences: { nodeIntegration: false, contextIsolation: true,
                preload: path.join(__dirname, 'preload.js') },
              show: false, backgroundColor: '#f8fafc'
            });
            const rp = path.join(process.resourcesPath || '', 'app', 'index.html');
            const dp = path.join(__dirname, '../dist/index.html');
            mainWindow.loadURL(fs.existsSync(rp) ? 'file://'+rp : 'file://'+dp);
            mainWindow.once('ready-to-show', () => { mainWindow.show(); mainWindow.maximize(); });
            mainWindow.on('closed', () => { mainWindow = null; });
            mainWindow.webContents.setWindowOpenHandler(({url}) => { shell.openExternal(url); return { action:'deny' }; });
          }
          app.whenReady().then(() => { createWindow(); app.on('activate', () => { if (!BrowserWindow.getAllWindows().length) createWindow(); }); });
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          ipcMain.handle('app-version', () => app.getVersion());
          EMEOF
          fi
          if [ ! -f electron/preload.js ]; then
            cat > electron/preload.js << 'EPEOF'
          const { contextBridge, ipcRenderer } = require('electron');
          contextBridge.exposeInMainWorld('electronAPI', {
            getVersion: () => ipcRenderer.invoke('app-version'),
            platform: process.platform
          });
          EPEOF
          fi
          # Placeholder favicon if missing
          if [ ! -f public/favicon.ico ]; then
            printf '\x00\x00\x01\x00\x01\x00\x01\x01\x00\x00\x01\x00\x18\x00' > public/favicon.ico
          fi

      - name: "⚙️ Write electron-builder config"
        shell: bash
        run: |
          cat > eb-ci.yml << 'EBEOF'
          appId: ke.go.embu.mediprocure.procurbosse
          productName: ProcurBosse
          copyright: "Copyright 2025 Embu County Government"
          directories:
            output: release
          files:
            - "dist/**/*"
            - "electron/**/*"
          win:
            target:
              - target: nsis
                arch: [x64, ia32]
              - target: portable
                arch: [x64]
            requestedExecutionLevel: requireAdministrator
          nsis:
            oneClick: false
            perMachine: true
            allowElevation: true
            allowToChangeInstallationDirectory: true
            createDesktopShortcut: true
            createStartMenuShortcut: true
            shortcutName: "ProcurBosse v5.8"
          asar: true
          extraResources:
            - from: dist
              to: app
              filter: ["**/*"]
          EBEOF

      - name: "🏗️ Build EXE"
        shell: bash
        run: npx electron-builder build --config eb-ci.yml --win --x64 --ia32 --publish never
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        continue-on-error: true

      - name: "📋 List artifacts"
        shell: bash
        run: ls -lh release/ 2>/dev/null || echo "No release dir"

      - uses: actions/upload-artifact@v4
        with:
          name: procurbosse-exe-v5.8
          path: |
            release/*.exe
            release/*.zip
            release/*.yml
          retention-days: 30
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════
  # JOB 3 — Supabase Edge Functions
  # ══════════════════════════════════════════════════════
  supabase-functions:
    name: "⚡ Supabase Edge Functions Deploy"
    runs-on: ubuntu-latest
    needs: web-build
    if: always() && needs.web-build.result == 'success' && github.event.inputs.deploy_functions != 'false'

    steps:
      - uses: actions/checkout@v4

      - name: "🛠️ Install Supabase CLI"
        run: npm install -g supabase@latest --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true

      - name: "🚀 Deploy functions"
        run: |
          for fn in send-email send-sms notify-requisition; do
            supabase functions deploy $fn \
              --project-ref yvjfehnzbzjliizjvuhq \
              --no-verify-jwt 2>&1 || echo "⚠️ $fn skipped"
          done
        env:
          SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
        continue-on-error: true

      - run: echo "✅ Edge functions deployment step complete"

  # ══════════════════════════════════════════════════════
  # JOB 4 — DB Migrations
  # ══════════════════════════════════════════════════════
  db-migrations:
    name: "🗄️ Database Migrations"
    runs-on: ubuntu-latest
    needs: web-build
    if: always() && needs.web-build.result == 'success' && github.event.inputs.run_migrations != 'false'

    steps:
      - uses: actions/checkout@v4

      - name: "🛠️ Supabase CLI"
        run: npm install -g supabase@latest --legacy-peer-deps 2>/dev/null || true
        continue-on-error: true

      - name: "🚀 Push migrations"
        run: |
          ls supabase/migrations/ 2>/dev/null || echo "No migrations dir"
          supabase db push --project-ref yvjfehnzbzjliizjvuhq 2>&1 || echo "⚠️ Migration attempted"
        env:
          SUPABASE_ACCESS_TOKEN: "sbp_e63e00e4c3a1f7d4d2e5aa3d09f9cf3b25cce9f4"
        continue-on-error: true

      - run: echo "✅ DB migrations step complete"

  # ══════════════════════════════════════════════════════
  # JOB 5 — GitHub Release
  # ══════════════════════════════════════════════════════
  create-release:
    name: "🚀 Create GitHub Release v5.8"
    runs-on: ubuntu-latest
    needs: [web-build, desktop-build, supabase-functions, db-migrations]
    if: always() && github.event.inputs.create_release != 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist-v5.8
          path: release-web/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: procurbosse-exe-v5.8
          path: release-exe/
        continue-on-error: true

      - name: "📦 Package web"
        run: |
          [ -d release-web ] && (cd release-web && zip -r ../ProcurBosse-v5.8-Web.zip .) || true
          ls -lh *.zip 2>/dev/null || true
        continue-on-error: true

      - name: "🏷️ Create Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v5.8.0"
          name: "🏥 ProcurBosse v5.8.0 — EL5 MediProcure Health Procurement ERP"
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.RELEASE_PAT }}
          body: |
            # 🏥 ProcurBosse v5.8.0 — EL5 MediProcure

            **Embu Level 5 Hospital · Embu County Government**

            ## ✨ v5.8 Highlights
            - Accountant workspace (invoice matching, GL journal, payment vouchers)
            - Twilio SMS + WhatsApp integration (EL5H messaging service)
            - Redesigned Notifications with bulk actions & realtime
            - SMTP via Supabase + Resend
            - Windows EXE installer (x64 + ia32) with desktop shortcut

            ## 📡 Twilio
            - SMS: +16812972643
            - WhatsApp: +14155238886 (join **bad-machine**)
            - Messaging SID: MG2fffc3a381c44a202c316dcc6400707d

            ## 🛠 Stack
            React 18 · TypeScript · Vite · Supabase · Electron 28 · Twilio

            ---
            *Built for Embu County Government Health Division*
          files: |
            ProcurBosse-v5.8-Web.zip
            release-exe/*.exe
            release-exe/*.zip
        continue-on-error: true
