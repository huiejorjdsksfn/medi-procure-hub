name: "ProcurBosse — Mobile App Builds (iOS & Android)"

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_ios:
        description: "Skip iOS build"
        default: "false"
        type: boolean
      skip_android:
        description: "Skip Android build"
        default: "false"
        type: boolean

env:
  NODE_VER: "20"
  APP_VER: "11.12.0"
  SUPA_URL: "https://yvjfehnzbzjliizjvuhq.supabase.co"
  SUPA_ANON: "${{ secrets.SUPABASE_ANON_KEY }}"
  GITHUB_PAT: "${{ secrets.RELEASE_PAT }}"

permissions:
  contents: write
  actions: write
  packages: write

jobs:

  # ─── Build Web (required for mobile) ───────────────────────────────────────
  web:
    name: "Web Build"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      ver: ${{ steps.meta.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          VER=$(node -p "require('./package.json').version")
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --legacy-peer-deps

      - name: Write .env
        run: |
          cat > .env << ENVEOF
          VITE_SUPABASE_URL=${{ env.SUPA_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPA_ANON }}
          VITE_SUPABASE_PROJECT_ID=yvjfehnzbzjliizjvuhq
          VITE_APP_VERSION=${{ env.APP_VER }}
          VITE_HOSPITAL_NAME=Embu Level 5 Hospital
          VITE_SYSTEM_NAME=EL5 MediProcure
          ENVEOF

      - name: Build web
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ steps.meta.outputs.sha }}
          path: dist/
          retention-days: 7

  # ─── Android Build ───────────────────────────────────────────────────────────
  android:
    name: "Android APK Build"
    runs-on: ubuntu-latest
    needs: web
    if: github.event.inputs.skip_android != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Initialize Capacitor
        run: npx cap init ProcurBosse "ke.go.embu.mediprocure.procurbosse" --web-dir=dist
        continue-on-error: true

      - name: Sync Capacitor Android
        run: npx cap sync android
        continue-on-error: true

      - name: Copy Google Services (if exists)
        run: |
          if [ -f google-services.json ]; then
            cp google-services.json android/app/
          fi
          if [ -f android/app/google-services.json ]; then
            echo "Google Services found"
          else
            echo "No Google Services - using default config"
          fi
        continue-on-error: true

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50
        continue-on-error: true

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
        continue-on-error: true

      - name: Find APK files
        run: |
          find android -name "*.apk" -type f 2>/dev/null
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.web.outputs.sha }}
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/bundle/**/*.aab
          retention-days: 7
        continue-on-error: true

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          APK_PATH=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APB_PATH" ] && [ -f "$APK_PATH" ]; then
            echo "Uploading $APK_PATH to release"
            gh release upload ${{ github.ref_name }} "$APK_PATH" --clobber 2>&1 || echo "Upload failed"
          fi
        env:
          GH_TOKEN: ${{ env.GITHUB_PAT }}

  # ─── iOS Build ───────────────────────────────────────────────────────────────
  ios:
    name: "iOS App Build"
    runs-on: macos-latest
    needs: web
    if: github.event.inputs.skip_ios != 'true' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ needs.web.outputs.sha }}
          path: dist/

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps

      - name: Initialize Capacitor
        run: npx cap init ProcurBosse "ke.go.embu.mediprocure.procurbosse" --web-dir=dist
        continue-on-error: true

      - name: Sync Capacitor iOS
        run: npx cap sync ios
        continue-on-error: true

      - name: Install iOS dependencies
        run: |
          cd ios/App
          pod install 2>&1 | tail -30
        continue-on-error: true

      - name: Set up code signing
        run: |
          mkdir -p ~/Certificates/ci
          if [ -n "$CERTIFICATES_P12" ]; then
            echo "$CERTIFICATES_P12" | base64 -d > ~/Certificates/ci/cert.p12
          fi
          if [ -n "$PROVISIONING_PROFILE" ]; then
            echo "$PROVISIONING_PROFILE" | base64 -d > ~/Certificates/ci/profile.mobileprovision
          fi
          if [ -f ~/Certificates/ci/cert.p12 ]; then
            security create-keychain -p "" ~/Certificates/ci/keychain.keychain-db
            security unlock-keychain -p "" ~/Certificates/ci/keychain.keychain-db
            security import ~/Certificates/ci/cert.p12 -P "" -A -t cert -f pkcs12 -k ~/Certificates/ci/keychain.keychain-db
            security list-keychain -d user -s ~/Certificates/ci/keychain.keychain-db
          fi
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        continue-on-error: true

      - name: Build iOS (Simulator)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -destination "platform=iOS Simulator,name=iPhone 15" -allowProvisioningUpdates build CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50
        continue-on-error: true

      - name: Create IPA for testing
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive -allowProvisioningUpdates -exportArchive -exportOptionsPlist ../exportOptions.plist CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30
        env:
          CODE_SIGNING_REQUIRED: "NO"
        continue-on-error: true

      - name: Find iOS build artifacts
        run: |
          find ios -name "*.app" -type d 2>/dev/null | head -5
          find ios -name "*.ipa" -type f 2>/dev/null
          ls -la ios/App/build/ 2>/dev/null || echo "No build dir"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ needs.web.outputs.sha }}
          path: |
            ios/App/build/**/*.app
            ios/App/build/**/*.ipa
          retention-days: 7
        continue-on-error: true

  # ─── Release Publication ─────────────────────────────────────────────────────
  release:
    name: "Create Mobile Release"
    runs-on: ubuntu-latest
    needs: [web, android, ios]
    if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.skip_release != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List artifacts
        run: |
          echo "=== Release Artifacts ==="
          find release-artifacts -type f | while read f; do
            echo "$f ($(du -h "$f" | cut -f1))"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ProcurBosse ${{ github.ref_name }} — Mobile + Desktop"
          draft: false
          prerelease: false
          token: ${{ env.GITHUB_PAT }}
          body: |
            # ProcurBosse ${{ github.ref_name }} — Mobile & Desktop Release
            **Embu Level 5 Hospital · Embu County Government · Kenya**

            ## Downloads

            ### Desktop Apps
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Windows | x64 | `.zip` file in `exe-*` artifact |
            | Windows | x86 | `.zip` file in `exe-*` artifact |

            ### Mobile Apps
            | Platform | Download | Notes |
            |----------|----------|-------|
            | Android | `.apk` file in `android-apk-*` artifact | Install directly on Android |
            | iOS | `.ipa` file in `ios-app-*` artifact | Sideload for testing |

            ### Web
            | Type | Description |
            |------|-------------|
            | Web Bundle | Self-hosted web app |

            ## Installation Instructions

            ### Android
            1. Download the `.apk` file
            2. Enable "Install from Unknown Sources" in Settings
            3. Open the APK file to install

            ### iOS (Sideloading for Testing)
            1. Download the `.ipa` file
            2. Use a tool like AltStore or Cydia Impactor
            3. Sign with your Apple Developer account

            ### App Store Submission
            For App Store and Google Play Store submission, use the `.aab` (Android) and `.xcarchive` (iOS) artifacts.

            ## Features
            - ✅ Full EL5 MediProcure ERP functionality
            - ✅ Offline-capable with local data
            - ✅ Push notifications
            - ✅ Auto-update support
            - ✅ Works on mobile and desktop
          files: |
            release-artifacts/**/*.apk
            release-artifacts/**/*.aab
            release-artifacts/**/*.ipa
        continue-on-error: true
