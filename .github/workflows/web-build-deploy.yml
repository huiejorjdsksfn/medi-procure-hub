# ProcurBosse — Web + Kiosk Auto Release
name: "Web & Kiosk Release"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: "Build Web + Kiosk → Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install main app deps
        run: npm install --legacy-peer-deps --no-audit
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build main app
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Zip main app dist
        run: cd dist && zip -r ../procurbosse-web.zip . && cd ..

      - name: Install kiosk deps
        run: cd kiosk-app && npm install --legacy-peer-deps --no-audit && cd ..
        env: { CI: "false" }

      - name: Build kiosk app
        run: cd kiosk-app && npm run build && cd ..
        env: { CI: "false" }

      - name: Zip kiosk dist
        run: cd kiosk-app/dist && zip -r ../../kiosk-request-station.zip . && cd ../..

      - name: Get version
        id: ver
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}-build-${{ github.run_number }}"
          name: "ProcurBosse v${{ steps.ver.outputs.version }} — Build ${{ github.run_number }}"
          body: |
            ## 🏥 ProcurBosse EL5 MediProcure — v${{ steps.ver.outputs.version }}

            ### Downloads

            | File | Description |
            |------|-------------|
            | `procurbosse-web.zip` | Main ERP web app — deploy to EdgeOne or any web server |
            | `kiosk-request-station.zip` | Department Request Station — no login needed |

            ### What's in v22.0
            - ✅ **EdgeOne white screen FIXED** — electron removed from web deps
            - 🔑 **Login Page** — Blue gradient glassmorphism, Embu logo
            - 🏠 **Dashboard** — D365 coloured module tiles, role-filtered, admin-only KPIs
            - 📧 **Email** — Gmail-style 3-column layout, compose, star, reply
            - 🗄️ **DB Admin** — Power BI style, table explorer, SQL editor, health check
            - 📋 **Kiosk App** — Department request station, Twilio SMS, real-time popups
            - 🔧 **BAT Installer** — VC++ redistributable, Node.js, desktop shortcuts

            **Commit:** ${{ github.sha }}
          files: |
            procurbosse-web.zip
            kiosk-request-station.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
