<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" type="image/png" href="/icons/icon-32.png" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800&display=swap" rel="stylesheet" />
  <title>ProcurBosse Admin — EL5 MediProcure</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f0f1a; }
    #root { min-height: 100vh; }
    #app-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f0f1a; z-index: 9999; gap: 16px;
    }
    .loader-ring {
      width: 48px; height: 48px; border: 4px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: #a5b4fc; font-size: 14px; font-weight: 500; letter-spacing: 0.05em; }
    .loader-badge {
      background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8; font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-badge">Admin Portal</div>
    <div class="loader-ring"></div>
    <div class="loader-text">ProcurBosse · Loading Admin...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
