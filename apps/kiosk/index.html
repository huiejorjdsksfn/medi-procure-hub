<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#065f46" />
  <link rel="icon" type="image/png" href="/icons/icon-32.png" />
  <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800&display=swap" rel="stylesheet" />
  <title>ProcurBosse Kiosk — EL5 MediProcure</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body { font-family: 'Inter', sans-serif; background: #022c22; touch-action: manipulation; }
    #root { min-height: 100vh; }
    #app-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #022c22; z-index: 9999; gap: 20px;
    }
    .loader-ring {
      width: 56px; height: 56px; border: 5px solid rgba(16,185,129,0.2);
      border-top-color: #10b981; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: #6ee7b7; font-size: 16px; font-weight: 600; }
    .loader-badge {
      background: rgba(16,185,129,0.15); border: 2px solid rgba(16,185,129,0.4);
      color: #34d399; font-size: 12px; font-weight: 700; padding: 5px 16px;
      border-radius: 30px; letter-spacing: 0.1em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-badge">🏥 Kiosk Mode</div>
    <div class="loader-ring"></div>
    <div class="loader-text">Loading Kiosk...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
