project_id = "yvjfehnzbzjliizjvuhq"

[auth]
site_url = "https://procurbosse.edgeone.app"
additional_redirect_urls = [
  "https://procurbosse.edgeone.app/reset-password",
  "https://procurbosse.edgeone.app/login",
  "http://localhost:8080/reset-password",
  "http://localhost:8080/login"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup      = false
double_confirm_changes = true
enable_confirmations   = false
secure_password_change = true

[auth.email.smtp]
enabled  = true
host     = "smtp.gmail.com"
port     = 587
user     = "noreply@embu.go.ke"
pass     = "env(SMTP_PASS)"
admin_email = "admin@embu.go.ke"
sender_name = "EL5 MediProcure"

[auth.email.template.recovery]
subject = "EL5 MediProcure - Reset Your Password"
content_path = "./supabase/email-templates/recovery.html"

[auth.email.template.invite]
subject = "You have been invited to EL5 MediProcure"
content_path = "./supabase/email-templates/invite.html"

[auth.email.template.magic_link]
subject = "EL5 MediProcure - Your Login Link"
content_path = "./supabase/email-templates/magic-link.html"

[auth.email.template.email_change]
subject = "EL5 MediProcure - Confirm Email Change"
content_path = "./supabase/email-templates/email-change.html"

[functions.notify-requisition]
verify_jwt = false

[functions.send-email]
verify_jwt = false

[functions.send-sms]
verify_jwt = false

[functions.session-validate]
verify_jwt = false

[functions.role-check]
verify_jwt = false
