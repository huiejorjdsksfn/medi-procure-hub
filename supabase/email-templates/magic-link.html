<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Login Link</title></head>
<body style="margin:0;padding:0;background:#f0f4f8;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4f8;padding:40px 20px;">
    <tr><td align="center">
      <table width="500" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10);">
        <tr><td style="background:linear-gradient(135deg,#0a2558,#1a3a6b);padding:32px 40px;text-align:center;">
          <h1 style="margin:0;color:#fff;font-size:22px;font-weight:800;">EL5 MediProcure</h1>
        </td></tr>
        <tr><td style="padding:40px;">
          <h2 style="margin:0 0 16px;color:#1a1a2e;">Your Login Link</h2>
          <p style="color:#4b5563;font-size:14px;line-height:1.6;margin:0 0 24px;">Click the button below to sign in. This link expires in 1 hour.</p>
          <div style="text-align:center;margin-bottom:24px;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#0a2558,#1a3a6b);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:14px;">Sign In</a>
          </div>
          <p style="margin:0;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px;font-size:11px;color:#374151;word-break:break-all;">{{ .ConfirmationURL }}</p>
        </td></tr>
        <tr><td style="background:#f9fafb;padding:16px 40px;border-top:1px solid #e5e7eb;text-align:center;">
          <p style="margin:0;font-size:11px;color:#9ca3af;">Embu County Government &bull; Health Procurement Division</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
