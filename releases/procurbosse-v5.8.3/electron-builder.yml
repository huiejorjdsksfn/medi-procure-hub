# ================================================================
# ProcurBosse v5.8.3 — Electron Builder Configuration
# Standalone Windows Desktop App
# Embu Level 5 Hospital · Embu County Government · Kenya
# ================================================================

appId: ke.go.embu.mediprocure.procurbosse
productName: ProcurBosse
copyright: "© 2026 Embu County Government — All Rights Reserved"

directories:
  buildResources: build
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!.github/**/*"
  - "!supabase/**/*"

extraResources:
  - from: public/icon.png
    to: icon.png
  - from: public/logo.png
    to: logo.png
  - from: public/embu-county-logo.jpg
    to: embu-county-logo.jpg

win:
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: requireAdministrator
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ProcurBosse EL5
  displayLanguageSelector: false
  license: null
  artifactName: "ProcurBosse-v${version}-Windows-Setup.exe"

portable:
  artifactName: "ProcurBosse-v${version}-Windows-Portable.exe"

publish:
  provider: github
  releaseType: release
