  <script>
    /* ProcurBosse SPA Hash Fix v5 — runs before React mounts
       Converts any bare pathname to hash form:
         /admin/panel     → /#/admin/panel
         /requisitions    → /#/requisitions
         /#/anything      → no-op (already correct)
    */
    (function(){
      var loc  = window.location;
      var path = loc.pathname;
      var hash = loc.hash;
      // Already on hash route - no action needed
      if(hash && hash.length > 2 && hash.charAt(1)==='/') return;
      // Root with no route - let React handle it
      if(path === '/' && !hash) return;
      // Any real path - redirect to hash form
      if(path !== '/') {
        window.location.replace(loc.origin + '/#' + path + loc.search);
      }
    })();
  </script>

  <script>
    (function(){
      // Restore cached CSS vars + body classes from localStorage before React loads
      try{
        var settings=JSON.parse(localStorage.getItem('el5_theme_cache')||'{}');
        var root=document.documentElement;
        var map={
          primary_color:'--color-primary',accent_color:'--color-accent',
          nav_bg_color:'--color-nav-bg',nav_text_color:'--color-nav-text',
          page_bg_color:'--color-page-bg',card_bg:'--color-card-bg',
          text_primary:'--color-text',text_secondary:'--color-text-muted',
          border_color:'--color-border',success_color:'--color-success',
          warning_color:'--color-warning',danger_color:'--color-danger',
          font_family:'--font-family',font_size_base:'--font-size-base',
          font_size_sm:'--font-size-sm',font_size_lg:'--font-size-lg',
          border_radius:'--border-radius',content_padding:'--content-padding',
          topbar_height:'--topbar-height',nav_height:'--nav-height',
          print_font:'--print-font',print_font_size:'--print-font-size',
        };
        Object.keys(map).forEach(function(k){
          if(settings[k])root.style.setProperty(map[k],settings[k]);
        });
        if(settings.compact_tables==='true')document.body.classList.add('compact-tables');
        if(settings.show_logo_nav==='false')document.body.classList.add('hide-logo-nav');
        if(settings.show_search_bar==='false')document.body.classList.add('hide-search-bar');
        if(settings.show_kpi_tiles==='false')document.body.classList.add('hide-kpi-tiles');
        if(settings.show_status_chips==='false')document.body.classList.add('hide-status-chips');
      }catch(e){}
    })();
  </script>

  <script>
    // ── Offline/online detection ──────────────────────────────────────────────
    function setOnlineState(){
      document.body.classList.toggle('offline',!navigator.onLine);
    }
    setOnlineState();
    window.addEventListener('online',  setOnlineState);
    window.addEventListener('offline', setOnlineState);

    // ── Splash removal ────────────────────────────────────────────────────────
    window.addEventListener('load',function(){
      var s=document.getElementById('splash');
      if(!s)return;
      // Remove splash when React has rendered (#root has children) or after 3s
      var check=setInterval(function(){
        var root=document.getElementById('root');
        if(root&&root.children.length>0){
          clearInterval(check);
          s.classList.add('out');
          setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},420);
        }
      },50);
      setTimeout(function(){
        clearInterval(check);
        s.classList.add('out');
        setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},420);
      },4000);
    });

  </script>
