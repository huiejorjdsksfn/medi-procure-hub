<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EL5 MediProcure</title>
  <script>
    /* Fallback: if EdgeOne serves this 404.html, redirect to hash URL */
    (function(){
      var path = window.location.pathname;
      var search = window.location.search;
      window.location.replace(
        window.location.origin + '/#' + (path === '/' ? '/' : path) + search
      );
    })();
  </script>
</head>
<body></body>
</html>
