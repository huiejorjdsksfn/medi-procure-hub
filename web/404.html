<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EL5 MediProcure — Redirecting...</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a1628;font-family:'Segoe UI',system-ui,sans-serif;
      display:flex;align-items:center;justify-content:center;height:100vh;
      flex-direction:column;gap:14px;color:#fff}
    .logo{width:56px;height:56px;border-radius:14px;
      background:linear-gradient(135deg,#0d3b7a,#1a5ca8);
      display:flex;align-items:center;justify-content:center}
    .bar{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:4px}
    .fill{height:100%;background:linear-gradient(90deg,#0078d4,#38bdf8);
      animation:fill .6s ease-in-out forwards}
    @keyframes fill{0%{width:0}100%{width:100%}}
    p{font-size:12px;opacity:.4;letter-spacing:.06em}
  </style>
  <script>
    /**
     * ProcurBosse 404 Fallback v6
     * EdgeOne shows this page when worker doesn't intercept.
     * Immediately redirect to correct hash URL.
     *
     * /dashboard        → /#/dashboard
     * /requisitions     → /#/requisitions
     * /admin/panel      → /#/admin/panel
     * / or empty        → /#/dashboard
     */
    (function () {
      try {
        var loc    = window.location;
        var path   = loc.pathname;
        var search = loc.search;

        // Already a hash route somehow — go to dashboard
        if (loc.hash && loc.hash.charAt(1) === '/') {
          window.location.replace(loc.origin + '/');
          return;
        }

        // Build target: strip trailing slash, default to /dashboard
        var route = (path && path !== '/' && path !== '/index.html')
          ? path.replace(/\/$/, '')
          : '/dashboard';

        window.location.replace(loc.origin + '/#' + route + search);
      } catch(e) {
        window.location.replace('/');
      }
    }());
  </script>
</head>
<body>
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="6" fill="rgba(255,255,255,.12)"/>
      <path d="M6 14h16M14 6v16" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </div>
  <p>EL5 MEDIPROCURE</p>
  <div class="bar"><div class="fill"></div></div>
  <p style="font-size:10px;margin-top:4px">Redirecting...</p>
</body>
</html>
