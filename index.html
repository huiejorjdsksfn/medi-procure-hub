<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d3b7a" />
    <meta name="description" content="EL5 MediProcure v5.9 — Health Procurement ERP for Embu Level 5 Hospital. ProcurBosse by Embu County Government." />
    <meta name="application-name" content="ProcurBosse" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ProcurBosse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#0d3b7a" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EL5 MediProcure v5.9 — ProcurBosse" />
    <meta property="og:description" content="Health Procurement ERP — Embu Level 5 Hospital" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <link rel="preconnect" href="https://yvjfehnzbzjliizjvuhq.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://yvjfehnzbzjliizjvuhq.supabase.co" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700,800,900&display=swap" rel="stylesheet" />
    <title>EL5 MediProcure v5.9 — ProcurBosse</title>
    <style>
      *{box-sizing:border-box}
      html,body,#root{height:100%;margin:0;padding:0}
      body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#0a1628}
      .skel{background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:6px}
      @keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
      ::-webkit-scrollbar{width:5px;height:5px}
      ::-webkit-scrollbar-track{background:#0f172a}
      ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
      ::-webkit-scrollbar-thumb:hover{background:#475569}
      /* Loading screen */
      #splash{position:fixed;inset:0;background:#0a1628;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
      #splash.out{opacity:0;pointer-events:none}
      .splash-logo{width:72px;height:72px;border-radius:18px;background:#0d3b7a;display:flex;align-items:center;justify-content:center;animation:splashPulse 1.2s ease-in-out infinite}
      @keyframes splashPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(13,59,122,.4)}50%{transform:scale(1.06);box-shadow:0 0 0 16px rgba(13,59,122,0)}}
    </style>
  </head>
  <body>
    <div id="splash">
      <div style="text-align:center">
        <div class="splash-logo">
          <img src="/icons/icon-48.png" alt="ProcurBosse" style="width:40px;height:40px;object-fit:contain" />
        </div>
        <div style="color:rgba(255,255,255,.5);font-size:11px;margin-top:14px;letter-spacing:.1em;font-family:Inter,sans-serif">EL5 MEDIPROCURE</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load',()=>{
        const s=document.getElementById('splash');
        if(s){setTimeout(()=>{s.classList.add('out');setTimeout(()=>s.remove(),400)},800)}
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
