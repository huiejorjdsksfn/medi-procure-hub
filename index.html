<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32"   href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"   href="/icons/icon-16.png" />
    <link rel="apple-touch-icon" href="/icons/icon-128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0078d4" />
    <meta name="description" content="EL5 MediProcure — Health Procurement ERP, Embu Level 5 Hospital" />
    <title>EL5 MediProcure — ProcurBosse</title>
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body,#root{height:100%;margin:0;padding:0}
      body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0d47a1;min-height:100vh}
      #sp{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1565c0 0%,#0d47a1 35%,#1a237e 65%,#0a1172 100%);display:flex;align-items:center;justify-content:center;transition:opacity .5s ease}
      #sp.out{opacity:0;pointer-events:none}
      .sc{text-align:center;padding:0 20px}
      .sl{width:80px;height:80px;border-radius:20px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:sp-pulse 1.8s ease-in-out infinite}
      @keyframes sp-pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,.2)}50%{transform:scale(1.04);box-shadow:0 0 0 16px rgba(255,255,255,0)}}
      .st{color:#fff;font-size:20px;font-weight:800;letter-spacing:.02em;margin-bottom:6px}
      .ss{color:rgba(255,255,255,.55);font-size:12px;font-weight:500;margin-bottom:24px}
      .sb{width:180px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto;overflow:hidden}
      .sf{height:100%;background:#fff;border-radius:2px;animation:sp-fill 1.6s ease-in-out infinite}
      @keyframes sp-fill{0%{width:0;opacity:1}80%{width:100%;opacity:1}100%{width:100%;opacity:0}}
    </style>
  </head>
  <body>
    <div id="sp">
      <div class="sc">
        <div class="sl">
          <img src="/icons/icon-48.png" alt="" style="width:44px;height:44px;object-fit:contain" onerror="this.style.display='none'" />
        </div>
        <div class="st">EL5 MediProcure</div>
        <div class="ss">Embu Level 5 Hospital &bull; Procurement ERP</div>
        <div class="sb"><div class="sf"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      !function(){
        var s=document.getElementById('sp'),r=document.getElementById('root');
        var o=new MutationObserver(function(){
          if(r.children.length>0){
            s.classList.add('out');
            setTimeout(function(){s&&s.parentNode&&s.parentNode.removeChild(s)},600);
            o.disconnect();
          }
        });
        o.observe(r,{childList:true});
        setTimeout(function(){if(r.children.length===0)window.location.reload()},30000);
      }();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
