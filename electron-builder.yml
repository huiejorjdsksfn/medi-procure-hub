# ProcurBosse v11.0.0 electron-builder config
appId: ke.go.embu.mediprocure.procurbosse
productName: ProcurBosse
copyright: "© 2026 Embu County Government — All Rights Reserved"

directories:
  buildResources: build
  output: dist-electron

files:
  - "dist/**/*"
  - "electron/**/*"
  - "package.json"
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!.github/**/*"
  - "!supabase/**/*"
  - "!web/**/*"
  - "!kiosk-app/**/*"
  - "!admin-app/**/*"

extraResources:
  - from: "public/icon.png"
    to: "icon.png"
  - from: "public/logo.png"
    to: "logo.png"

win:
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: requireAdministrator
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "ProcurBosse EL5"
  artifactName: "ProcurBosse-v${version}-Setup-${arch}.exe"
  unicode: true

portable:
  artifactName: "ProcurBosse-v${version}-Portable-${arch}.exe"

publish:
  provider: github
  owner: huiejorjdsksfn
  repo: medi-procure-hub
  private: false
  releaseType: release

compression: normal
asar: true
