# ProcurBosse — electron-builder v22.6
# Windows 7 SP1 → Windows 11 (x64 + ia32)
appId: ke.go.embu.mediprocure.procurbosse
productName: ProcurBosse
copyright: "© 2026 Embu County Government — All Rights Reserved"

directories:
  buildResources: build
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!.github/**/*"
  - "!supabase/**/*"
  - "!kiosk-app/**/*"

extraResources:
  - from: public/icons/icon-256.png
    to: icon.png
  - from: public/icons/icon-512.png
    to: icon-512.png

win:
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis
      arch:
        - x64
        - ia32

nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "ProcurBosse EL5"
  artifactName: "ProcurBosse-Setup-${arch}.exe"
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeader: build/icon.png
  license: null
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  include: build/installer.nsh

publish:
  provider: github
  owner: huiejorjdsksfn
  repo: medi-procure-hub
  releaseType: release
