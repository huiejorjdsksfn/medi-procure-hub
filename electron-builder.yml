# ─────────────────────────────────────────────────────────────
# ProcurBosse — electron-builder configuration
# Produces: ProcurBosse-v2.0.0-Setup.exe (NSIS installer)
#           ProcurBosse-v1.0.0-Setup.exe (legacy v1 build)
# Targets: Windows 7 SP1 → Windows 11 (x64 + ia32)
# ─────────────────────────────────────────────────────────────

appId: ke.go.embu.mediprocure.procurbosse
productName: ProcurBosse
copyright: "© 2025 Embu County Government — All Rights Reserved"

# App version (overridden per build)
buildVersion: "2.0.0"

directories:
  buildResources: build
  output: dist-electron

# Files to pack into the app.asar
files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!.github/**/*"
  - "!supabase/**/*"

# Extra resources copied alongside the exe (not in asar)
extraResources:
  - from: public/icon.png
    to: icon.png
  - from: public/logo.png
    to: logo.png
  - from: public/manifest.json
    to: manifest.json

# ── Windows ──────────────────────────────────────────────────
win:
  icon: public/icon.png
  # Sign with cert if CSC_LINK env is set, otherwise unsigned
  certificateSubjectName: ""
  verifyUpdateCodeSignature: false
  target:
    - target: nsis      # Full installer with uninstaller
      arch:
        - x64            # Windows 10/11 modern
        - ia32           # Windows 7/8 32-bit compatibility

# ── NSIS Installer Options ────────────────────────────────────
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.png
  uninstallerIcon: public/icon.png
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "ProcurBosse"
  include: build/installer.nsh
  artifactName: "ProcurBosse-v${version}-${arch}-Setup.exe"
  deleteAppDataOnUninstall: false
  # Windows 7 compatibility — disable modern NSIS features
  unicode: true

# ── Auto-Update via GitHub Releases ──────────────────────────
publish:
  provider: github
  owner: huiejorjdsksfn
  repo: medi-procure-hub
  private: false
  releaseType: release

# ── Mac (bonus) ───────────────────────────────────────────────
mac:
  icon: public/icon.png
  target: dmg
  artifactName: "ProcurBosse-v${version}-mac.dmg"
  category: public.app-category.business

# ── Linux (bonus) ─────────────────────────────────────────────
linux:
  icon: public/icon.png
  target: AppImage
  artifactName: "ProcurBosse-v${version}-linux.AppImage"
  category: Office

# ── Build options ─────────────────────────────────────────────
compression: maximum
removePackageScripts: true
