# ProcurBosse — electron-builder configuration
# Targets: Windows 7 SP1 → Windows 11 (x64 + ia32)
appId: ke.go.embu.mediprocure.procurbosse
productName: ProcurBosse
copyright: "© 2026 Embu County Government — All Rights Reserved"

directories:
  buildResources: build
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!.github/**/*"
  - "!supabase/**/*"

extraResources:
  - from: public/icon.png
    to: icon.png
  - from: public/logo.png
    to: logo.png
  - from: public/manifest.json
    to: manifest.json

win:
  icon: public/icon.png
  certificateSubjectName: ""
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64
        - ia32

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.png
  uninstallerIcon: public/icon.png
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "ProcurBosse"
  artifactName: "ProcurBosse-v${version}-${arch}-Setup.exe"
  deleteAppDataOnUninstall: false
  unicode: true
  include: build/installer.nsh

publish:
  provider: github
  owner: huiejorjdsksfn
  repo: medi-procure-hub
  private: false
  releaseType: release

compression: maximum
removePackageScripts: true
